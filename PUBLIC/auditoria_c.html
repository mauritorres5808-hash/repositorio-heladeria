<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Auditoría de Compras</title>
  <script src="js/auth.js"></script>  <!-- Aqui se verifica la autenticacion-->

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }
    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
    }
    .filtros {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }
    input, select {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
	  font-size: 14px;
    }
    button {
      padding: 8px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: red;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #f2f2f2;
    }
    #mensaje {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
	
	td div {
		text-align: left;
		line-height: 1.4;
	}
    .alert-modern{background:#e9f7ef;border-left:6px solid green;padding:10px;border-radius:6px;margin:10px 0}

  </style>
</head>
<body>
  <div class="contenedor">
    <h2>📋 Auditoría de Cambios en Compras</h2>

    <div class="filtros">
      <div>
        <label><b>Fecha:</b></label><br>
        <input type="date" id="fechaFiltro">
      </div>
      <div>
        <label><b>Usuario:</b></label><br>
        <select id="usuarioFiltro">
          <option value="">(Todos)</option>
        </select>
      </div>
      <div>
        <label><b>Tipo de Cambio:</b></label><br>
        <select id="tipoFiltro">
          <option value="">(Todos)</option>
          <option value="FP">FP - Cambio de forma de pago</option>
          <option value="ANU">ANU - Anulación de compra</option>
        </select>
      </div>
      <div style="align-self: end;">
        <button onclick="buscarAuditoria()">🔍 Buscar</button>
		<button onclick="window.location.href='menu-general.html'">&#8617; Volver</button>

      </div>
    </div>

    <div id="mensaje"></div>

<div id="mensajeTipo" class="alert-modern">(*) FP - Cambio de forma de pago &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ANU - Anulación de compra</div>

    <table id="tablaAuditoria">
      <thead>
        <tr>
          <th>Fecha Audit</th>
          <th>Hora Audit</th>
          <th>ID Compra</th>
          <th>Fecha Compra</th>
          <th>Total</th>
          <th>Usuario</th>
          <th>Tipo (*)</th>
          <th>Valor Anterior</th>
          <th>Valor Nuevo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>

verificarSesion();

    // === CARGAR USUARIOS ===
		async function cargarUsuarios() {

			const sel = document.getElementById('usuarioFiltro');

			try {

				const resp = await fetch('/api/usuarios');
				const data = await resp.json();

				if (!data.ok) return;

				data.usuarios.forEach(u => {

					sel.innerHTML += `
						<option value="${u.id_usuario}">
							${u.nombre} (${u.email})
						</option>
					`;

				});

			} catch (error) {

				console.error(error);

			}

		}

    cargarUsuarios();

		// cargar las formas de pago
		async function cargarFormasPago() {
			try {
				const resp = await fetch('/api/fpago');
				const data = await resp.json();

				MAP_FP = {};
				data.formasPago.forEach(fp => {
					MAP_FP[fp.id_fpago] = fp.descripcion;
				});

			} catch (error) {
				console.error("Error cargando formas de pago:", error);
			}
		}

	cargarFormasPago();

    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaFiltro").value = fechaHoy;
	
	
		// === BUSCAR AUDITORÍA ===
		async function buscarAuditoria() {

			const tbody = document.querySelector("#tablaAuditoria tbody");
			const msg = document.getElementById("mensaje");
			tbody.innerHTML = "";
			msg.textContent = "🔎 Buscando registros...";

			const fechaFiltro = document.getElementById("fechaFiltro").value;
			const usuarioFiltro = document.getElementById("usuarioFiltro").value;
			const tipoFiltro = document.getElementById("tipoFiltro").value;

			try {

				const params = new URLSearchParams();

				if (fechaFiltro)
					params.append("fecha", fechaFiltro);

				if (usuarioFiltro)
					params.append("id_usuario", usuarioFiltro);

				if (tipoFiltro)
					params.append("tipo", tipoFiltro);

				const resp = await fetch(`/api/compras/auditoria?${params.toString()}`);

				const data = await resp.json();

				if (!data.ok || data.auditoria.length === 0) {

					msg.textContent =
						"❌ No se encontraron registros.";

					return;
				}

				msg.textContent = "";

				data.auditoria.forEach(d => {

					const tr = document.createElement("tr");

					tr.innerHTML = `
						<td>${formatearFecha(d.fecha)}</td>
						<td>${d.hora}</td>
						<td>${d.id_compra}</td>
						<td>${formatearFecha(d.fecha_compra)}</td>
						<td>$ ${parseFloat(d.total || 0).toFixed(2)}</td>
						<td>${d.usuario}</td>
						<td>${d.tipo}</td>
						<td>${formatearValoresAnterior(d)}</td>
						<td>${formatearValoresNuevo(d)}</td>
					`;

					tbody.appendChild(tr);

				});

			} catch (error) {

				console.error(error);

				msg.textContent =
					"❌ Error buscando auditoría.";

			}

		}

	
function formatearFecha(fecha) {
	if (!fecha) return "";
	const f = new Date(fecha);
	return f.toLocaleDateString('es-AR');
}

function formatearValoresAnterior(d) {
	if (d.tipo === "FP") {
		return `
			<div><b>FPago:</b> ${d.valor_anterior}</div>
		`;
	}
	return "-";
}

function formatearValoresNuevo(d) {
	if (d.tipo === "FP") {
		return `
			<div><b>FPago:</b> ${d.valor_nuevo}</div>
		`;
	}
	return "-";
}


function formatearValoresAnterior(d) {
	if (d.tipo === "FP") {
		const descripcion = MAP_FP[d.valor_anterior] || d.valor_anterior;
		return `
			<div><b>${descripcion}</b></div>
		`;
	}
	return "-";
}

function formatearValoresNuevo(d) {
	if (d.tipo === "FP") {
		const descripcion = MAP_FP[d.valor_nuevo] || d.valor_nuevo;
		return `
			<div><b>${descripcion}</b></div>
		`;
	}
	return "-";
}

  </script>


</body>
</html>
