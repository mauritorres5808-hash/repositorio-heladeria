  <style>

<body>
  <div class="contenedor">
    <h2>📋 Auditoría de Cambios en Compras</h2>

    <div class="filtros">
      <div>
        <label><b>Fecha:</b></label><br>
        <input type="date" id="fechaFiltro">
      </div>
      <div>
        <label><b>Usuario:</b></label><br>
        <select id="usuarioFiltro">
          <option value="">(Todos)</option>
        </select>
      </div>
      <div>
        <label><b>Tipo de Cambio:</b></label><br>
        <select id="tipoFiltro">
          <option value="">(Todos)</option>
          <option value="FP">FP - Cambio de forma de pago</option>
          <option value="ANU">ANU - Anulación de compra</option>
        </select>
      </div>
      <div style="align-self: end;">
        <button onclick="buscarAuditoria()">🔍 Buscar</button>
		<button onclick="window.location.href='menu-general.html'">&#8617; Volver</button>

      </div>
    </div>

    <div id="mensaje"></div>

<div id="mensajeTipo" class="alert-modern">(*) FP - Cambio de forma de pago &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ANU - Anulación de compra</div>

    <table id="tablaAuditoria">
      <thead>
        <tr>
          <th>Fecha Audit</th>
          <th>Hora Audit</th>
          <th>ID Compra</th>
          <th>Fecha Compra</th>
          <th>Total</th>
          <th>Usuario</th>
          <th>Tipo (*)</th>
          <th>Valor Anterior</th>
          <th>Valor Nuevo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>

verificarSesion();

    // === CARGAR USUARIOS ===
    async function cargarUsuarios() {
      const sel = document.getElementById('usuarioFiltro');
      const snap = await db.collection('USUARIOS').orderBy('nombre').get();
      snap.forEach(doc => {
        const d = doc.data();
        sel.innerHTML += `<option value="${d.email}">${d.nombre} (${d.email})</option>`;
      });
    }
    cargarUsuarios();

*/	
	
    // === BUSCAR AUDITORÍA ===
    async function buscarAuditoria() {
      const tbody = document.querySelector("#tablaAuditoria tbody");
      const msg = document.getElementById("mensaje");
      tbody.innerHTML = "";
      msg.textContent = "🔎 Buscando registros...";

      let query = db.collection("COMPRAS_AUDITORIA");
      const fechaFiltro = document.getElementById("fechaFiltro").value;
      const usuarioFiltro = document.getElementById("usuarioFiltro").value;
      const tipoFiltro = document.getElementById("tipoFiltro").value;

      if (fechaFiltro) {
        const [a, m, d] = fechaFiltro.split("-");
        const fechaNorm = `${d}/${m}/${a}`;
        query = query.where("fecha", "==", fechaNorm);
      }
      if (usuarioFiltro) query = query.where("email", "==", usuarioFiltro);
      if (tipoFiltro) query = query.where("tipo", "==", tipoFiltro);

      const snap = await query.orderBy("fecha", "desc").orderBy("hora", "desc").get();

      if (snap.empty) {
        msg.textContent = "❌ No se encontraron registros.";
        return;
      }

      msg.textContent = "";
      snap.forEach(doc => {
        const d = doc.data();
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${d.fecha}</td>
          <td>${d.hora}</td>
          <td>${d.id_compra}</td>
          <td>${d.fecha_compra}</td>
		  <td>$ ${d.valor_anterior?.importe_fp1 ?? "-"}</td>
          <td>${d.email}</td>
          <td>${d.tipo}</td>
			<td>${formatearValores(d.valor_anterior)}</td>
			<td>${formatearValores(d.valor_nuevo)}</td>
        `;
        tbody.appendChild(tr);
      });
    }
	
	function formatearValores(valor) {
		if (!valor) return "-";
		if (typeof valor === "object") {

		// Ordenar las claves del mapa alfabéticamente
		const entradasOrdenadas = Object.entries(valor)
		  .sort(([keyA], [keyB]) => keyA.localeCompare(keyB));

		// Mostrar clave: valor en líneas separadas, pero sin saltos excesivos
		return entradasOrdenadas
		  .map(([k, v]) => `<div><b>${k}</b>: ${v}</div>`)
		  .join("");
		}
		return valor;
	}

  </script>
