<!DOCTYPE html>

<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #8AC0FF;

      max-width: 75%;
      margin: auto;
      background: #fff;
      padding: 20px;

    }

    h2 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;

    .table0 {
      width: 30%;
      margin-top: 20px;
      font-size: 12px;
    }
    .table0 th, td {
      padding: 8px;
      border: 0px solid #0E0D0C;

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;

    th, td {
      padding: 8px;

    th { background-color: #f2f2f2; }

    .total { font-size: 16px; font-weight: bold; background-color: #e8f5e9; }

    button {
      padding: 8px 14px;

    button:hover { background-color: red; color: white; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;

    .modal-content {

.contenedor-botones , .contenedor-botones2 {
  display: flex; /* Convierte el div en un contenedor flexible */

}

      text-align: center;
      margin-top: 15px;
    }
	.tachado {
					background-color:#FF6467;
					color:white;
	}

    .alert-modern{background:#e9f7ef;border-left:6px solid red;padding:10px;border-radius:6px;margin:10px 0; font-style: italic;}

	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;

.sugerencias{
    position:absolute;
    background:white;
    border:1px solid #ccc;
    width:250px;
    z-index:999;

    overflow-y:auto;
}

.sugerencia{
    padding:8px;
    cursor:pointer;
}

.sugerencia:hover{
    background:#eee;
}
 	label { font-weight: bold; margin-right: 10px; }


  </style>
</head>
<body>
  <div class="contenedor">
    <h2>Consulta de Ventas y Formas de Pago</h2>

    <div align="center">
      <label><input type="radio" name="tipoConsulta" value="fecha" checked onchange="cambiarModo()"> Por Fechas</label>
      <label><input type="radio" name="tipoConsulta" value="nro" onchange="cambiarModo()"> Por N° de Venta</label>
    </div>
    <br>

    <!-- 🔹 Filtros por fecha -->
    <div id="filtrosFecha" align="center" class="contenedor-botones">
      <label>Desde: <input  type="date" id="fechaDesde"></label>
      <label>Hasta: <input  type="date" id="fechaHasta"></label>

      <label>Tipo de Venta:
        <select  id="tipoVenta">
          <option value="todas">Todas</option>
          <option value="1">Delivery propio</option>
          <option value="2">Rappi</option>
          <option value="3">PedidosYa</option>
          <option value="4">Mostrador</option>
          <option value="5">Vtas OnLine</option>
        </select>
      </label>

		<div style="position:relative;">
		  <label>Cliente:</label>
		  <input
			  type="text"
			  id="buscarCliente"
			  placeholder="Buscar cliente..."
			  autocomplete="off"
			  style="width:220px;">
		  <div
			  id="sugerenciasClientes"
			  class="sugerencias">
		  </div>
		</div>


    </div>

    <!-- 🔹 Filtro por número -->
    <div id="filtroNro" align="center" style="display:none;">
      <label>N° de Venta: <input style="height: 20px;" type="number" id="nroVenta"></label>
	  <!-- se oculta la seleccion de tipo de venta porque no hace falta mostrarla -->
      <label style="display:none;">Tipo de Venta:
        <select style="height: 25px;" id="tipoVentaNro">
          <option value="todas">Todas</option>
          <option value="1">Delivery propio</option>
          <option value="2">Rappi</option>
          <option value="3">PedidosYa</option>
          <option value="4">Mostrador</option>
          <option value="5">Vtas OnLine</option>
        </select>
      </label>
    </div>

	<table align=center border='none' class="table0">
		<tr>
		<th><label for="chk_detalle">sin detalle de ventas</th>
		<th><label for="chk_cierre">solo Ventas sin cierre</th>
		</tr>
		<tr>
		<th><input  type="checkbox"  checked=true id="chk_detalle"></label></th>
		<th><input  type="checkbox"  checked=true id="chk_cierre"></label></th>
		</tr>
	</table>
	  
    <br>
    <div class="contenedor-botones2">
      <button class="boton-redondeado" onclick="consultarVentas()">&#128269; Consultar</button>
      <button onclick="window.location.href='menu-ventas.html'">&#8617; Volver</button>
    </div>

    <div id="resultado"></div>

<div id="resumenFPContainer" style="display:none; margin-top:20px;"></div>

    <div class="selector-grafico" style="display:none;" id="selectorGrafico">
      <label><input type="radio" name="tipoGrafico" value="fpago" checked onchange="mostrarGrafico()"> Por Forma de Pago</label>
      <label><input type="radio" name="tipoGrafico" value="fecha" onchange="mostrarGrafico()"> Por Fecha</label>
    </div>

    <div id="graficoContainer" style="display:none;">
      <canvas id="graficoTorta"></canvas>
    </div>

    <div id="detalleModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h3 id="encabezado_detalle"></h3>
        <div id="detalleContenido"></div>
      </div>
    </div>
  </div>

  <script>

verificarSesion();

    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaDesde").value = fechaHoy;
    document.getElementById("fechaHasta").value = fechaHoy;

    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

    let chartInstance = null;
    let datosFormaPago = null;
    let datosFecha = null;
	let clienteSeleccionado = 0;

    function cambiarModo() {
      const tipo = document.querySelector('input[name="tipoConsulta"]:checked').value;
      document.getElementById("filtrosFecha").style.display = tipo === "fecha" ? "flex" : "none";
      document.getElementById("filtroNro").style.display = tipo === "nro" ? "block" : "none";
    }

		// ======================================
		// BUSCAR CLIENTE
		// ======================================
		document.getElementById("buscarCliente")
		.addEventListener("input", async function(){

			const texto = this.value.trim();

			if(texto.length < 2){
				document.getElementById("sugerenciasClientes").innerHTML = '';
				clienteSeleccionado = 0;
				return;
			}

			try{

				const resp = await fetch(`/api/clientes/buscar?texto=${encodeURIComponent(texto)}`);
				const data = await resp.json();

				let html = '';

				data.clientes.forEach(c => {
					html += `
					<div
						class="sugerencia"
						onclick="seleccionarCliente(
							${c.id_cliente},
							'${c.nombre.replace(/'/g,"")}'
						)"
					>
						${c.nombre}
					</div>
					`;
				});

				document.getElementById(
					"sugerenciasClientes"
				).innerHTML = html;

			}catch(err){

				console.error(err);
			}
		});

		// ======================================
		// SELECCIONAR CLIENTE
		// ======================================
		function seleccionarCliente(id,nombre){

			clienteSeleccionado = id;

			document.getElementById("buscarCliente")
				.value = nombre;

			document.getElementById(
				"sugerenciasClientes"
			).innerHTML = '';
		}


    function normalizarFecha(fechaStr) {
      if (fechaStr.includes("/")) {
        const [dia, mes, año] = fechaStr.split("/");
        return `${año}-${mes.padStart(2, "0")}-${dia.padStart(2, "0")}`;
      }
      return fechaStr;
    }

async function consultarVentas() {

    const tipoConsulta = document.querySelector('input[name="tipoConsulta"]:checked').value;
    const resultado = document.getElementById("resultado");
    const graficoContainer = document.getElementById("graficoContainer");
    const selectorGrafico = document.getElementById("selectorGrafico");

    graficoContainer.style.display = "none";
    selectorGrafico.style.display = "none";

    resultado.innerHTML = "<p><b>Procesando, por favor espere...</b></p>";

    try {

        let url = '/api/ventas_cab/consulta?';

        const sin_cierre = document.getElementById("chk_cierre").checked;

        const sin_det = document.getElementById("chk_detalle").checked;

        if (tipoConsulta === 'fecha') {
            const desde = document.getElementById("fechaDesde").value;
            const hasta = document.getElementById("fechaHasta").value;
            const tipoVenta = document.getElementById("tipoVenta").value;

			url +=
				`desde=${desde}` +
				`&hasta=${hasta}` +
				`&tipo_venta=${tipoVenta}` +
				`&sin_cierre=${sin_cierre}` +
				`&id_cliente=${clienteSeleccionado}`;


        } else {
            const nro = document.getElementById("nroVenta").value;
            const tipoVenta = document.getElementById("tipoVentaNro").value;
            url += `nro=${nro}&tipo_venta=${tipoVenta}&sin_cierre=${sin_cierre}`;
        }

        const resp = await fetch(url);
        const data = await resp.json();

        if (!data.ok) {
            resultado.innerHTML = `<p style="color:red">${data.error}</p>`;
            return;
        }

        const ventas = data.ventas;

        if (ventas.length === 0) {
            resultado.innerHTML = "<p>No se encontraron ventas.</p>";
            document.getElementById("resumenFPContainer").style.display = "none";
            return;
        }

        // =========================
        // FORMAS PAGO
        // =========================
        const formasPago = {};

        data.formasPago.forEach(f => {
            formasPago[f.id_fpago] = f.descripcion;
        });

        // =========================
        // CLIENTES
        // =========================
        const mapaClientes = {};

        data.clientes.forEach(c => {
            mapaClientes[c.id_cliente] = c;
        });

        let totalGeneral = 0;
        let resumenFP = {};
        let cantidadFP = {};
        let resumenPorFecha = {};
        const agrupadas = {};

        ventas.forEach(v => {
            const fecha =
                new Date(v.fecha)
                    .toISOString()
                    .split('T')[0];

            if (!agrupadas[fecha]) {
                agrupadas[fecha] = [];
            }
            agrupadas[fecha].push(v);
        });

        let html = "";

        for (const fecha of Object.keys(agrupadas).sort()) {

            let totalDia = 0;

            if (!sin_det) {

                html += `<h3>📅 Fecha: ${convertirFechaOK(fecha)}</h3>`;
                html += `<div id="mensajeTipo" class="alert-modern">las ventas en rojo (anuladas) no suman en el Total ni en el grafico.</div>`
                html += `
                <table border='1'>
                <tr>
                    <th>Hora</th>
                    <th>TipoVenta</th>
                    <th>N° Venta</th>
                    <th>Subtotal</th>
                    <th>Descuento</th>
                    <th>Recargo</th>
                    <th>Dtos Promos</th>
                    <th>TOTAL</th>
                    <th>Forma Pago 1</th>
                    <th>Importe 1</th>
                    <th>Forma Pago 2</th>
                    <th>Importe 2</th>
                    <th>Detalle</th>
                    <th>Reimp.</th>
                    <th>Cierre</th>
                </tr>
                `;
            }

            for (const v of agrupadas[fecha]) {

    // =========================
    // datos del CLIENTE
    // =========================
    const cliente = mapaClientes[v.id_cliente] || {};
	
                let TipoVenta = "--";

                if (v.tipo_venta === 1)
                    TipoVenta = "Delivery";

                if (v.tipo_venta === 2)
                    TipoVenta = "Rappi";

                if (v.tipo_venta === 3)
                    TipoVenta = "PedidosYa";

                if (v.tipo_venta === 4)
                    TipoVenta = "Mostrador";

                if (v.tipo_venta === 5)
                    TipoVenta = "Online";

                if (!sin_det) {

                    html += `
                    <tr ${v.anulada ? 'class="tachado"' : ''}>
                        <td>${v.hora}</td>
                        <td>${TipoVenta}</td>
                        <td>${v.id_venta}</td>
                        <td>${formateadorMoneda.format(v.subtotal || 0)}</td>
                        <td>${formateadorMoneda.format(v.descuento || 0)}</td>
                        <td>${formateadorMoneda.format(v.recargo || 0)}</td>
                        <td>${formateadorMoneda.format(v.descuento_promociones || 0)}</td>
                        <td>${formateadorMoneda.format(v.total)}</td>
                        <td>${formasPago[v.f_pago1] || ''}</td>
                        <td>${formateadorMoneda.format(v.importe_fp1 || 0)}</td>
                        <td>${formasPago[v.f_pago2] || ''}</td>
                        <td>${formateadorMoneda.format(v.importe_fp2 || 0)}</td>				
						<td> 
						${ v.tipo_venta == 5 ? 
						`<button onclick="verPedido(${v.id_venta})"> Ver Pedido </button>` 
						: `<button onclick="verDetalle(${v.id_venta})"> Ver </button>` } 
						</td>
                        <td>
						${v.anulada == 0 ?
                            `<button onclick="reimprimirTicket(${v.id_venta})">🖨️</button>`
							: `-` }
						
						</td>
                        <td>${v.id_cierre || "-"}</td>
                    </tr>
                    `;
					    if (v.tipo_venta === 1) {
						html += `
						<tr>
						<th></th>
						<th>Nombre</th>
						<th>Domicilio</th>
						<th>Telefono</th>
						<th>Nota</th>
						</tr>

						<tr>
						<th></th>
						<td>${cliente.nombre || '-'}</td>
						<td>${cliente.domicilio || '-'}</td>
						<td>${cliente.telefono || '-'}</td>
						<td>${cliente.nota || '-'}</td>
						</tr>
						`;}

                }

                if (!v.anulada) {

                    totalDia += parseFloat(v.total || 0);

                    totalGeneral += parseFloat(v.total || 0);

					// Forma pago 1
					if (v.f_pago1 && parseFloat(v.importe_fp1 || 0) > 0) {
						resumenFP[v.f_pago1] = (resumenFP[v.f_pago1] || 0) + parseFloat(v.importe_fp1 || 0);
						cantidadFP[v.f_pago1] = (cantidadFP[v.f_pago1] || 0) + 1;
					}

					// Forma pago 2
					if (v.f_pago2 && parseFloat(v.importe_fp2 || 0) > 0) {
						resumenFP[v.f_pago2] = (resumenFP[v.f_pago2] || 0) + parseFloat(v.importe_fp2 || 0);
						cantidadFP[v.f_pago2] =(cantidadFP[v.f_pago2] || 0) + 1;
					}
                }
            }

            resumenPorFecha[convertirFechaOK(fecha)] = totalDia;

            if (!sin_det) {

                html += `
                <tr class="total">
                    <td colspan="7">
                        Total del día
                    </td>

                    <td>
                        ${formateadorMoneda.format(totalDia)}
                    </td>

                    <td colspan="4"></td>
                </tr>
                </table>
                `;
            }
        }

        html += `
        <h3 style="text-align:center;">
            TOTAL GENERAL: ${formateadorMoneda.format(totalGeneral)}
        </h3>
        `;

        resultado.innerHTML = html;

        // =========================
        // DATOS GRAFICO
        // =========================
        datosFormaPago = {
            etiquetas: Object.keys(resumenFP).map(
                fp => formasPago[fp]
            ),
            valores: Object.values(resumenFP)
        };

        datosFecha = {
            etiquetas: Object.keys(resumenPorFecha),
            valores: Object.values(resumenPorFecha)
        };

        // =========================
        // RESUMEN FP
        // =========================
        let htmlFP = `
        <h3>Totales por Forma de Pago</h3>

        <table>
            <tr>
                <th>Forma de Pago</th>
                <th>Cant. Ventas</th>
                <th>Importe</th>
            </tr>
        `;

        Object.keys(resumenFP).forEach(fp => {

            htmlFP += `
            <tr>
                <td>${formasPago[fp]}</td>

                <td>${cantidadFP[fp] || 0}</td>

                <td>
                    ${formateadorMoneda.format(resumenFP[fp])}
                </td>
            </tr>
            `;
        });

        htmlFP += `</table>`;

        const contFP =
            document.getElementById("resumenFPContainer");

        contFP.innerHTML = htmlFP;

        contFP.style.display = "block";

        selectorGrafico.style.display = "block";

        mostrarGrafico();

    } catch (e) {

        console.error(e);

        resultado.innerHTML =
            `<p style="color:red">${e.message}</p>`;
    }
}


    function mostrarGrafico() {
      const tipoGrafico = document.querySelector('input[name="tipoGrafico"]:checked').value;
      const graficoContainer = document.getElementById("graficoContainer");
      const ctx = document.getElementById("graficoTorta").getContext("2d");

      if (chartInstance) chartInstance.destroy();
      graficoContainer.style.display = "flex";

      if (tipoGrafico === "fpago") {
        chartInstance = new Chart(ctx, {
          type: "pie",
          data: {
            labels: datosFormaPago.etiquetas,
            datasets: [{
              label: "total $ ",
              data: datosFormaPago.valores,
              backgroundColor: ["#007bff","#28a745","#ffc107","#dc3545","#17a2b8","#6f42c1"]
            }]
          },
          options: { plugins: { title: { display: true, text: "Distribución por Forma de Pago" } } }
        });
      } else {
        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: datosFecha.etiquetas,
            datasets: [{
              label: "Total por Fecha",
              data: datosFecha.valores,
              backgroundColor: "#007bff"
            }]
          },
          options: { plugins: { title: { display: true, text: "Totales por Fecha" } } }
        });
      }
    }


async function verDetalle(idVenta) {

    try {

        const resp = await fetch(
            `/api/ventas_det/detalle/${idVenta}`
        );

        const data = await resp.json();

        if (!data.ok) {

            alert(data.error || 'Error obteniendo detalle');
            return;
        }

        const cont =
            document.getElementById("detalleContenido");

        const encabezado =
            document.getElementById("encabezado_detalle");

        encabezado.innerHTML =
            "Detalle de Productos - Venta Nro. " + idVenta;

        if (data.detalle.length === 0) {

            cont.innerHTML =
                "<p>No se encontraron productos.</p>";

            document.getElementById("detalleModal")
                .style.display = "flex";

            return;
        }

        let html = `
        <table>
            <tr>
                <th>Cod Producto</th>
                <th>Descripción</th>
                <th>Precio Unitario</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
            </tr>
        `;

        data.detalle.forEach(d => {

            html += `
            <tr>
                <td>${d.id_producto}</td>

                <td>${d.descripcion || '(Sin descripción)'}</td>

                <td>
                    ${formateadorMoneda.format(d.precio || 0)}
                </td>

                <td>${d.cantidad}</td>

                <td>
                    ${formateadorMoneda.format(d.subtotal || 0)}
                </td>
            </tr>
            `;
        });

        html += "</table>";

        cont.innerHTML = html;

        document.getElementById("detalleModal")
            .style.display = "flex";

    } catch (err) {

        console.error(err);

        alert('Error obteniendo detalle');
    }
}


    function cerrarModal() {
      document.getElementById("detalleModal").style.display = "none";
    }
	

async function reimprimirTicket(idVenta) {

    try {

        const resp = await fetch(
            `/api/ventas_cab/reimpresion/${idVenta}`
        );

        const data = await resp.json();

        if (!data.ok) {

            alert(data.error || 'Error reimprimiendo');
            return;
        }

        const cab = data.cabecera;

        const productos = data.detalle.map(d => ({
            id: d.id_producto,
            nombre: d.descripcion || '(Sin nombre)',
            precio: parseFloat(d.precio || 0),
            cantidad: parseFloat(d.cantidad || 0)
        }));

        await generarComprobanteTermicoPDF(
            idVenta,
            cab,
            productos,
            cab.f_pago1,
            cab.f_pago2,
            cab.importe_fp1,
            cab.importe_fp2,
            data.empresa,
            cab.tipo_venta,
			    // promocionesAplicadas
				[],

				// datosCliente
				{
					nombre: cab.cli_nombre || '',
					domicilio: cab.cli_domicilio || '',
					telefono: cab.cli_telefono || '',
					nota: cab.cli_nota || ''
				}
        );

    } catch (err) {

        console.error(err);

        alert('Error reimprimiendo ticket');
    }
}

async function verPedido(idVenta) {

    try {

        const resp = await fetch(
            `/api/pedidos/venta/${idVenta}`
        );

        const data = await resp.json();

        if (!data.ok) {

            alert(data.error || 'Error obteniendo pedido');
            return;
        }

        const pedido = data.cabecera;

        const detalle = data.detalle;

        const cont =
            document.getElementById("detalleContenido");

        const encabezado =
            document.getElementById("encabezado_detalle");

        encabezado.innerHTML =
            "Pedido Online - Venta Nro. " + idVenta;

        let html = `

        <div class="alert-modern">

            <b>Pedido # </b> ${pedido.id_pedido} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <b>Fecha:</b> ${convertirFechaOK(pedido.fecha)}&nbsp;&nbsp;&nbsp;<b>Hora:</b> ${pedido.hora}
            <br>
            
            <b>Cliente:</b> ${pedido.nombre}
            <br>

            <b>Teléfono:</b> ${pedido.telefono}
            <br>

            <b>Domicilio:</b> ${pedido.domicilio}
            <br>

            <b>Paga con:</b> ${pedido.paga_con || '-'}
            <br>

            <b>Nota:</b> ${pedido.nota || '-'}
            <br>

            <b>Total:</b>
            ${formateadorMoneda.format(pedido.total || 0)}

        </div>

        <table>

            <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Sabores</th>
            </tr>
        `;

        detalle.forEach(d => {

            html += `
            <tr>

                <td>${d.prod_desc}</td>

                <td>
                    ${formateadorMoneda.format(d.prod_precio || 0)}
                </td>

                <td>${d.sabores_desc || '-'}</td>

            </tr>
            `;
        });

        html += `</table>`;

        cont.innerHTML = html;

        document.getElementById("detalleModal")
            .style.display = "flex";

    } catch (err) {

        console.error(err);

        alert('Error obteniendo pedido');
    }
}

// Convertir yyyy-mm-dd → dd/mm/yyyy
function convertirFechaOK(f) {
  if (!f) return "";
  // Si viene como objeto Date
  if (typeof f === "object") {
    f = f.toISOString().split("T")[0];
  }
  // Si viene como string ISO
  if (String(f).includes("T")) {
    f = String(f).split("T")[0];
  }
  const [yyyy, mm, dd] = String(f).split("-");
  return `${dd}/${mm}/${yyyy}`;
}
