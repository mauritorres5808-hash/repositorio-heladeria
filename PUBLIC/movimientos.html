// ======================================================
// NORMALIZAR FECHA
// yyyy-mm-dd -> dd/mm/yyyy
// ======================================================
function normalizarFecha(fechaStr) {

  if (!fechaStr)
    return "";

  if (fechaStr.includes("T")) {
    fechaStr = fechaStr.split("T")[0];
  }

  if (fechaStr.includes("-")) {
    const [año, mes, dia] = fechaStr.split("-");
    return `${dia.padStart(2, "0")}/${mes.padStart(2, "0")}/${año}`;
  }

  return fechaStr;
}
