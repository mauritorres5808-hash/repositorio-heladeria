<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anulación de Ventas</title>

<script src="JS/auth.js"></script>  <!-- Aquí se verifica la autenticacion-->

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 900px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
    }

    .filtros {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    input[type="number"] {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: red;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #0E0D0C;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

    .botones-accion {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 25px;
    }

    .total {
      font-weight: bold;
      background-color: #e8f5e9;
    }

    .mensaje {
      text-align: center;
      margin-top: 15px;
      color: red;
      font-weight: bold;
    }
	
 	label { font-weight: bold; margin-right: 10px; }

	
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>🚫 Anulación de Ventas (sin cierre)</h2>

    <div class="filtros">
      <label>Nro de Venta: <input type="number" id="nroVenta" placeholder="Ingrese N° de venta"></label>
      <button onclick="buscarVenta()">&#128269; Buscar</button>
      <button onclick="window.location.href='menu-ventas.html'">&#8617; Volver</button>
    </div>

    <div id="resultadoCabecera"></div>
    <div id="resultadoDetalle"></div>
    <div class="botones-accion" id="acciones" style="display:none;">
      <button onclick="anularVenta()">&#10060; Anular Venta</button>
    </div>
    <div class="mensaje" id="mensaje"></div>
  </div>

  <script>

verificarSesion();

    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

    let idVentaActual = null;

	async function buscarVenta() {

		const nro = parseInt(document.getElementById("nroVenta").value);

		const resultadoCabecera = document.getElementById("resultadoCabecera");
		const resultadoDetalle = document.getElementById("resultadoDetalle");
		const acciones = document.getElementById("acciones");
		const mensaje = document.getElementById("mensaje");

		resultadoCabecera.innerHTML = "";
		resultadoDetalle.innerHTML = "";
		acciones.style.display = "none";
		mensaje.innerHTML = "";

		if (isNaN(nro) || nro <= 0) {
			mensaje.innerText = "Debe ingresar un numero de venta valido.";
			return;
		}

		// =====================================
		// FORMAS DE PAGO
		// =====================================
		const respFP = await fetch('/api/fpago');
		const dataFP = await respFP.json();
		const formasPago = {};
		dataFP.formasPago.forEach(fp => {formasPago[fp.id_fpago] = fp.descripcion;});
		
		try {

			const resp = await fetch(`/api/ventas_cab/consul_anu/${nro}`);

			const data = await resp.json();

			if (!data.ok) {

				mensaje.innerText = data.error || "Venta no encontrada";
				return;
			}

			const venta = data.venta;
			const detalle = data.detalle;

			idVentaActual = venta.id_venta;

			let tipoVenta = "--indefinida--";

			if (venta.tipo_venta === 1) tipoVenta = "Delivery propio";
			else if (venta.tipo_venta === 2) tipoVenta = "Rappi";
			else if (venta.tipo_venta === 3) tipoVenta = "PedidosYa";
			else if (venta.tipo_venta === 4) tipoVenta = "Mostrador";
			else if (venta.tipo_venta === 5) tipoVenta = "Vta OnLine";

			const fechaTexto = venta.fecha;
			const fechaFormateada =
				fechaTexto.substring(8,10) + "/" +
				fechaTexto.substring(5,7) + "/" +
				fechaTexto.substring(0,4);

			resultadoCabecera.innerHTML = `
				<h3>Cabecera de la Venta</h3>

				<table>
					<tr>
						<th>Fecha</th>
						<th>Hora</th>
						<th>Tipo Venta</th>
						<th>Subtotal</th>
						<th>Descuento</th>
						<th>Recargo</th>
						<th>Costo envio</th>
						<th>Total</th>
						<th>Forma Pago 1</th>
						<th>Importe 1</th>
						<th>Forma Pago 2</th>
						<th>Importe 2</th>
					</tr>

					<tr>
						<td>${fechaFormateada}</td>
						<td>${venta.hora}</td>
						<td>${tipoVenta}</td>
						<td>${formateadorMoneda.format(Number(venta.subtotal || 0))}</td>
						<td>${formateadorMoneda.format(Number(venta.descuento || 0))}</td>
						<td>${formateadorMoneda.format(Number(venta.recargo || 0))}</td>
						<td>${formateadorMoneda.format(Number(venta.costo_envio || 0))}</td>
						<td>${formateadorMoneda.format(Number(venta.total || 0))}</td>

			  <td>${formasPago[venta.f_pago1] || ""}</td>
			  <td>${formateadorMoneda.format(Number(venta.importe_fp1 || 0))}</td>

			  <td>${formasPago[venta.f_pago2] || ""}</td>
			  <td>${formateadorMoneda.format(Number(venta.importe_fp2 || 0))}</td>
						
					</tr>
				</table>
			`;

			// DETALLE
			let html = `
				<h3>Detalle de Productos</h3>

				<table>
					<tr>
						<th>Cod. Producto</th>
						<th>Descripcion</th>
						<th>Cantidad</th>
						<th>Precio</th>
						<th>Subtotal</th>
					</tr>
			`;

			detalle.forEach(det => {

				html += `
					<tr>
						<td>${det.id_producto}</td>
						<td>${det.descripcion || '(No encontrada)'}</td>
						<td>${det.cantidad}</td>
						<td>${formateadorMoneda.format(Number(det.precio || 0))}</td>
						<td>${formateadorMoneda.format(Number(det.subtotal || 0))}</td>
					</tr>
				`;
			});

			html += `</table>`;

			resultadoDetalle.innerHTML = html;

			if (venta.anulada) {

				mensaje.innerText = "!! Esta venta ya se encuentra anulada !!";
				return;
			}

			if (venta.id_cierre && venta.id_cierre !== 0) {

				mensaje.innerText = "!! Esta venta ya no se puede anular porque tiene un cierre de caja !!";
				return;
			}

			acciones.style.display = "flex";

		} catch (error) {

			mensaje.innerText = "Error al buscar venta: " + error.message;
		}
	}

	async function anularVenta() {

		const mensaje = document.getElementById("mensaje");

		if (!idVentaActual) {
			mensaje.innerText = "Debe buscar una venta valida antes de anular.";
			return;
		}

		const confirmar = await mostrarConfirm({
		  mensaje: "¿Está seguro que desea anular esta venta?",
		  textoAceptar: "Sí, anular",
		  textoCancelar: "Cancelar"
		});
		if (!confirmar) {
		  return;
		}

		try {
			const resp = await fetch(`/api/ventas_cab/anular/${idVentaActual}`, {
				method: 'PUT'
			});
			const data = await resp.json();
			if (!data.ok) {
				mensaje.style.color = "red";
				mensaje.innerText = data.error || 'Error anulando venta';
				return;
			}
			mensaje.style.color = "green";
			mensaje.innerText = ">> La venta fue anulada correctamente <<";
			document.getElementById("acciones").style.display = "none";
		} catch (error) {
			mensaje.style.color = "red";
			mensaje.innerText = "Error al anular venta: " + error.message;
		}
	}


  </script>

<script src="JS/modal.js"></script>

</body>
</html>
