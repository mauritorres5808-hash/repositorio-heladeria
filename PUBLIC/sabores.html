<body>
  <div class="contenedor">
    <h2>Mantenimiento de Sabores</h2>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="id_sabor">Codigo de Sabor</label>
        <input class="input-pequeno" type="number" id="id_sabor" placeholder="Ingrese código" />
        <button id="btnVerificar">&#9989; Verificar</button>
        <button id="btnBuscar">&#128269; Buscar</button>
		<button id="btnVaciar" onclick="limpiarCampos()">&#9851; Limpiar</button>
      </div>
    </div>
<div>
  <label for="tipo_sabor">Tipo de Sabor</label>
  <select id="tipo_sabor"></select>
</div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" />
      </div>
      <div>
        <label for="contenido">Contenido</label>
        <input type="text" id="contenido" />
      </div>
	  <div>
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
	  </div>
    </div>

    <br>
    <div>
      <button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
      <button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
    </div>

    <div id="listado">    </div>

    <!-- Modal de busqueda -->
    <div id="modalBusqueda">
      <div id="contenidoModal" align="center">
        <h3>Buscar Sabor por descripcion</h3>
        <input type="text" id="txtBuscarNombre" placeholder="Ingrese parte de la descripcion" />
        <button id="btnBuscarSabor">Buscar</button>
        <table id="tablaResultados">
          <thead>
            <tr><th>ID</th><th>Descripcion</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <br>
        <button id="btnCerrarModal">Cerrar</button>
      </div>
    </div>
  </div>

  <script>

verificarSesion();

<script src="JS/permisos.js"></script>

<script>
// control de permisos
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(11)) {
		if (btn) btn.disabled = true;
		btn.title = "No tiene permiso para usar esta funcion";
		if (btn2) btn2.disabled = true;
		btn2.title = "No tiene permiso para usar esta funcion";
    }
};

let tiposSabores = [];

 cargarTiposSabores();
ArmarTabla();

    const idSabor = document.getElementById("id_sabor");
    const descripcion = document.getElementById("descripcion");
    const contenido = document.getElementById("contenido");

    // --- Verificar existencia ---
document.getElementById("btnVerificar").onclick = async () => {

  const codigo = parseInt(idSabor.value);

  if (!codigo)
    return alert("Ingrese un codigo valido.");

  const resp = await fetch(`/api/sabores/${codigo}`);
  const data = await resp.json();

  if (data.error) {
    alert("Sabor no encontrado.");
    limpiarCampos();
    return;
  }

  descripcion.value = data.descripcion || "";
  contenido.value = data.contenido || "";

  document.getElementById("deshabili").checked =
    data.deshabilitado == 1;

  document.getElementById("tipo_sabor").value =
    data.id_tipo_sabor || "";
};

    // --- Alta ---
document.getElementById("btnAlta").onclick = async () => {

  if (idSabor.value)
    return alert(
      "Para dar de alta NO debe ingresar un codigo.\n" +
        "Este se genera automaticamente.\nBorrar el codigo y volver a intentar."
    );

  if (!await validarCampos())
    return;

  const resp = await fetch('/api/sabores', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({

      id_tipo_sabor: parseInt(
        document.getElementById("tipo_sabor").value
      ),

      descripcion: descripcion.value.trim(),

      contenido: contenido.value.trim()
    })
  });

  const data = await resp.json();

  if (!data.ok) {
    alert("Error guardando sabor");
    return;
  }

  alert(`Sabor agregado con codigo ${data.id}`);

  limpiarCampos();

  ArmarTabla();
};


    // --- Modificar ---
document.getElementById("btnModificar").onclick = async () => {

  const codigo = parseInt(idSabor.value);

  if (!codigo)
    return alert("Ingrese un codigo valido.");

  if (!await validarCampos())
    return;

  const resp = await fetch(`/api/sabores/${codigo}`, {

    method: 'PUT',

    headers: {
      'Content-Type': 'application/json'
    },

    body: JSON.stringify({

      id_tipo_sabor: parseInt(
        document.getElementById("tipo_sabor").value
      ),

      descripcion: descripcion.value.trim(),

      contenido: contenido.value.trim(),

      deshabilitado:
        document.getElementById("deshabili").checked ? 1 : 0
    })
  });

  const data = await resp.json();

  if (!data.ok) {
    alert("Error actualizando sabor");
    return;
  }

  alert("Sabor actualizado correctamente.");

  limpiarCampos();

  ArmarTabla();
};


    async function validarCampos() {
      if (!descripcion.value.trim()) { 
		alert("Ingrese la descripcion."); 
		return false; 
		}
	 if (!document.getElementById("tipo_sabor").value) {
		alert("Seleccione el tipo de sabor.");
		return false;
	  }
      return true;
    }

    function limpiarCampos() {
      idSabor.value = "";
      descripcion.value = "";
      contenido.value = "";
      document.getElementById("deshabili").checked = false;
	  document.getElementById("tipo_sabor").value = "";
    }

    // --- Modal busqueda ---
    const modal = document.getElementById("modalBusqueda");
    document.getElementById("btnBuscar").onclick = () => modal.style.display = "flex";
    document.getElementById("btnCerrarModal").onclick = () => modal.style.display = "none";

    document.getElementById("btnBuscarSabor").onclick = async () => {

	  const texto =
		document.getElementById("txtBuscarNombre")
		  .value
		  .trim()
		  .toLowerCase();

	  if (!texto)
		return alert("Ingrese texto a buscar.");

	  const tablaBody =
		document.querySelector("#tablaResultados tbody");

	  tablaBody.innerHTML = "";

	  const resp = await fetch('/api/sabores');
	  const data = await resp.json();

	  data.forEach((item) => {

		if (
		  item.descripcion.toLowerCase().includes(texto)
		) {

		  const fila = document.createElement("tr");

		  fila.innerHTML = `
			<td>${item.id_sabor}</td>
			<td>${item.descripcion}</td>
		  `;

		  fila.onclick = () => {

			idSabor.value = item.id_sabor;
			descripcion.value = item.descripcion || "";
			contenido.value = item.contenido || "";
			document.getElementById("deshabili").checked = item.deshabilitado == 1;
			document.getElementById("tipo_sabor").value = item.id_tipo_sabor || "";

			modal.style.display = "none";
		  };

		  tablaBody.appendChild(fila);
		}
	  });
	};
	
	// listado de los sabores
 async function ArmarTabla() {

  try {

    const resp = await fetch('/api/sabores');
    const data = await resp.json();

    let html = "";

    if (!data || data.length === 0) {

      html += "<p>No se encontraron sabores.</p>";

    } else {

      html += `
        <table>
          <tr>
            <th>Codigo</th>
            <th>Descripcion</th>
            <th>Contenido</th>
            <th>Tipo</th>
            <th>Deshabilitado</th>
          </tr>
      `;

      let cant = 0;

      data.forEach((item) => {

        const tipoDesc =
          item.desc_tipo_sabor || "";

        html += `
          <tr>
            <td>${item.id_sabor}</td>
            <td>${item.descripcion}</td>
            <td>${item.contenido || ""}</td>
            <td>${tipoDesc}</td>
			<td style="${item.deshabilitado == 1 ? 'background-color:#FF6467;color:white;' : ''}">
				${item.deshabilitado == 1 ? 'S' : 'N'}
			</td>
          </tr>
        `;

        cant++;

      });

      html += `
        <tr class="total-row"
            style="font-weight:bold;background:#f2f2f2">

          <td colspan="1">CANTIDAD</td>
          <td>${cant}</td>
          <td></td>
          <td></td>
          <td></td>

        </tr>
      `;

      html += "</table>";
    }

    document.getElementById("listado").innerHTML = html;

  } catch (error) {

    console.error("Error buscando sabores:", error);

  }
}


async function cargarTiposSabores() {

  const resp = await fetch('/api/tipo-sabores');
  const data = await resp.json();

  const combo = document.getElementById("tipo_sabor");

  combo.innerHTML = `
    <option value="">
      Seleccione tipo...
    </option>
  `;

  tiposSabores = [];

  data.forEach(item => {

    tiposSabores.push(item);

    combo.innerHTML += `
      <option value="${item.id_tipo_sabor}">
        ${item.descripcion}
      </option>
    `;
  });
}

  </script>
