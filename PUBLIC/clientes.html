  <script>

function volver() {
    const back = localStorage.getItem("paginaAnterior");
    if (back) {
		localStorage.removeItem("paginaAnterior"); // ← la borro acá
        window.location.href = back;
    } else {
        history.back(); // por si no hay nada guardado
    }
}
	
//agregado para recibir el parametro del id del cliente
document.addEventListener('DOMContentLoaded', () => {
	aplicarPermisos();
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id'); // ejemplo '123' o null

  if (idParam) {
    // Seteo el campo id_cliente con el valor recibido
    document.getElementById("id_cliente").value = idParam;

    // Opcional: ejecutar directamente la búsqueda
    document.getElementById("btnVerificar").click();
  }

});
</script>

<script src="js/permisos.js"></script>

<script>
// control de permisos
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(13)) {
        //if (btn) btn.style.display = "none";
		if (btn) btn.disabled = true;
		btn.title = "No tiene permiso para usar esta funcion";
		if (btn2) btn2.disabled = true;
		btn2.title = "No tiene permiso para usar esta funcion";
    }
};

const idCliente = document.getElementById("id_cliente");
    const nombre = document.getElementById("nombre");
    const domicilio = document.getElementById("domicilio");
    const telefono = document.getElementById("telefono");

    // --- Verificar existencia ---
    document.getElementById("btnVerificar").onclick = async () => {
	
	 const msg = document.getElementById("msgValidacionDom");
	 msg.textContent = "";
	 
      const codigo = parseInt(idCliente.value);
      if (!codigo) return alert("Ingrese un código válido.");
      //const docSnap = await db.collection("CLIENTES").doc(String(codigo)).get();
		const q = await db.collection("CLIENTES")
		  .where("id_cliente", "==", codigo)
		  .get();

	if (!q.empty) {
        const data = q.docs[0].data();
        nombre.value = data.nombre;
        domicilio.value = data.domicilio;
        telefono.value = data.telefono;
        document.getElementById("deshabili").checked = (data.deshabilitado === "S");
        nota.value = data.nota;		
      } else {
        alert("Cliente no encontrado.");
        limpiarCampos();
      }
    };

    // --- Alta ---
    document.getElementById("btnAlta").onclick = async () => {

      if (idCliente.value)
        return alert("Para dar de alta NO debe ingresar un codigo."+"\n"+"Este se genera automaticamente."+"\n"+"Borrarlo y volver a presionar el boton de ALTA");;
      if (!await validarCampos()) return;

	// VALIDAR DIRECCIÓN
	const direccionValida = await validarDireccion(domicilio.value.trim());
	if (!direccionValida) {
		const seguir = confirm(
			"La dirección no fue validada.\n¿Desea continuar igualmente?"
		);
		if (!seguir) {
			return; // Detener el guardado
		}
	}

      const snapshot = await db.collection("CLIENTES")
        .orderBy("id_cliente", "desc").limit(1).get();
      let nuevoId = 1;
      if (!snapshot.empty) nuevoId = snapshot.docs[0].data().id_cliente + 1;

      await db.collection("CLIENTES").doc(String(nuevoId)).set({
        id_cliente: nuevoId,
        nombre: nombre.value.trim(),
        domicilio: domicilio.value.trim(),
        telefono: telefono.value.trim(),
        deshabilitado: document.getElementById("deshabili").checked ? "S" : "N",
        nota: nota.value.trim()
      });

      alert(`Cliente agregado con código ${nuevoId}`);
      limpiarCampos();
    };

    // --- Modificar ---
    document.getElementById("btnModificar").onclick = async () => {
	
	// VALIDAR DIRECCIÓN
	const direccionValida = await validarDireccion(domicilio.value.trim());
	if (!direccionValida) {
		const seguir = confirm(
			"La dirección no fue validada.\n¿Desea continuar igualmente?"
		);
		if (!seguir) {
			return; // Detener el guardado
		}
	}

      const codigo = parseInt(idCliente.value);
      if (!codigo) return alert("Ingrese un código de cliente válido.");
      if (!await validarCampos()) return;

      const deshab = document.getElementById("deshabili").checked ? "S" : "N";

		// 1) Buscar el documento cuyo campo id_cliente = codigo
		const q = await db.collection("CLIENTES")
		  .where("id_cliente", "==", codigo)
		  .get();

		if (q.empty) {
		  alert("Cliente no encontrado.");
		  return;
		}

		// 2) Obtener ID real del documento
		const docRef = q.docs[0].ref;

		// 3) Actualizar por ID real
		await docRef.update({
		  nombre: nombre.value.trim(),
		  domicilio: domicilio.value.trim(),
		  telefono: telefono.value.trim(),
		  deshabilitado: deshab,
		  nota: nota.value.trim()
		});

		alert("Cliente actualizado correctamente.");
		limpiarCampos();

    };

    async function validarCampos() {
      if (!nombre.value.trim()) { alert("Ingrese el nombre."); return false; }
      if (!domicilio.value.trim()) { alert("Ingrese el domicilio."); return false; }
      if (!telefono.value.trim()) { alert("Ingrese el teléfono."); return false; }
      return true;
    }

    function limpiarCampos() {
      idCliente.value = "";
      nombre.value = "";
      domicilio.value = "";
      telefono.value = "";
      document.getElementById("deshabili").checked = false;
      nota.value = "";
    }



async function validarDireccion(direccion) {
    try {
        const resp = await fetch("/api/verificar-direccion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ direccion })
        });

        const data = await resp.json();
        return data.ok && data.resultados.length > 0;

    } catch (err) {
        console.error("Error verificando dirección:", err);
        return false;
    }
}

document.getElementById("btnValidarDom").onclick = async () => {
    const dom = document.getElementById("domicilio").value.trim();
    const msg = document.getElementById("msgValidacionDom");

    if (!dom) {
        msg.style.color = "red";
        msg.textContent = "Ingrese un domicilio a validar.";
        return;
    }

    msg.style.color = "blue";
    msg.textContent = "Validando domicilio...";

    const ok = await validarDireccion(dom);

    if (ok) {
        msg.style.color = "green";
        msg.textContent = "✓ Domicilio válido";
    } else {
        msg.style.color = "red";
        msg.textContent = "✗ No se pudo validar este domicilio";
    }
};


// mostrar el mapa del domicilio del cliente
async function distancia() {

    // Espera el resultado ANTES de seguir
    const info = await obtenerDatosEmpresa();
    if (!info) {
        alert("No se pudo obtener el domicilio de la empresa");
        return;
    }

    const origen = info.domicilio;
    const destino = document.getElementById('domicilio').value;
//mostrarMapaDistancia('liniers 89, CABA', 'av albarellos 2500, Buenos Aires');
mostrarMapaDistancia(origen, destino);
    };

async function obtenerDatosEmpresa() {
    try {
        const snap = await db.collection("EMPRESA").get();

        if (snap.empty) {
            console.warn("No se encontró documento en EMPRESA");
            return null;
        }

        const data = snap.docs[0].data();

        return {
            nombre: data.nombre_empresa,
            domicilio: data.domicilio
        };

    } catch (err) {
        console.error("Error obteniendo datos de EMPRESA:", err);
        return null;
    }
}

    // --- Modal búsqueda ---
    const modal = document.getElementById("modalBusqueda");
    document.getElementById("btnBuscar").onclick = () => modal.style.display = "flex";
    document.getElementById("btnCerrarModal").onclick = () => modal.style.display = "none";

    document.getElementById("btnBuscarCliente").onclick = async () => {
      const texto = document.getElementById("txtBuscarNombre").value.trim().toLowerCase();
      if (!texto) return alert("Ingrese texto a buscar.");

      const tablaBody = document.querySelector("#tablaResultados tbody");
      tablaBody.innerHTML = "";

      const snapshot = await db.collection("CLIENTES").get();
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.nombre.toLowerCase().includes(texto)) {
          const fila = document.createElement("tr");
          fila.innerHTML = `<td>${data.id_cliente}</td><td>${data.nombre}</td>`;
          fila.onclick = () => {
            idCliente.value = data.id_cliente;
            nombre.value = data.nombre;
            domicilio.value = data.domicilio;
            telefono.value = data.telefono;
            document.getElementById("deshabili").checked = (data.deshabilitado === "S");
            nota.value = data.nota;
            modal.style.display = "none";
          };
          tablaBody.appendChild(fila);
        }
      });
    };
  </script>
