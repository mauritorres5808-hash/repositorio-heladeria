<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cierre de Caja</title>

<script src="JS/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->

  <style>
    body { font-family: Arial; background-color: #8AC0FF; margin:0; padding:20px; }
    .contenedor { background:#fff;border-radius:10px;max-width:800px;margin:0 auto;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.2); }
    h2 { text-align:center;background-color:#8AC0FF;border-radius:8px;padding:10px;margin-bottom:25px; }

    button {
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
	   font-size: 15px;
    }
    button:hover { background:red;color:white; }
	
    table { width:100%; border-collapse:collapse; margin-top:15px; font-size:15px; }
    th,td { border:1px solid #0E0D0C; padding:8px; text-align:center; }
    th { background:#BDC2CB; }
    .confirmar { text-align:center;margin-top:18px; }
    #mensaje { text-align:center;margin-top:12px;font-weight:bold; }
    .subtitulo { background:#d0ebff; padding:6px; border-radius:6px; text-align:center; margin-top:30px; font-weight:bold; }
    .subtitulo2 { background:#e8f5e9; padding:6px; border-radius:6px; text-align:left; margin-top:30px; font-weight:bold; }
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>Cierre de Caja</h2>

  <div style="text-align:center; font-size:18px;">
    Usuario conectado: <b><span id="userLabel"></span></b>
  </div>

	<br>
    <div style="text-align:center; margin-bottom:15px;">
      <button onclick="calcularCierre()">&#128269; Calcular Cierre Actual</button>
    </div>

    <div id="resultado"></div>
    <div id="mensaje"></div>

    <div style="margin-top:18px;display:flex;justify-content:center;gap:10px;">
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>
    </div>
  </div>

  <script>

verificarSesion();
document.getElementById("userLabel").textContent = localStorage.getItem("usuarioEmail");

    const formateadorMoneda = new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" });
    let datosCierre = null;


    function normalizarFecha2(fechaStr) {
      if (fechaStr.includes("-")) {
        const [año, mes,dia] = fechaStr.split("-");
        return `${dia.padStart(2, "0")}/${mes.padStart(2, "0")}/${año}`;
      }
      return fechaStr;
    }

    // Función principal
    async function calcularCierre() {
      const resDiv = document.getElementById("resultado");
      const msgDiv = document.getElementById("mensaje");
      resDiv.innerHTML = "<p><b>Procesando, por favor espere...</b></p>";
      msgDiv.innerHTML = "";

      try {
        // Buscar apertura abierta
		const responseApertura = await fetch("/api/aperturas/abierta");
		const apertura = await responseApertura.json();
		if (!apertura) {
		  resDiv.innerHTML =
			"<p style='color:red'>No existe ninguna caja abierta actualmente.</p>";
		  return;
		}

		// ======================================
		// Obtener próximo ID de cierre
		// ======================================
		const responseId = await fetch("/api/cierres/proximo-id");
		const dataId = await responseId.json();
		if (!dataId.ok) {
			alert("Error obteniendo próximo ID de cierre");
			return;
		}
		const idCierre = dataId.proximo;
		

        // Traer formas de pago
		const responseFP = await fetch("/api/fpago");
		const fpData = await responseFP.json();
		if (!fpData.ok) {
			alert(fpData.mensaje || "Error obteniendo formas de pago");
			return;
		}
		const formasPago = {};
		fpData.formasPago.forEach(x => {formasPago[x.id_fpago] = x.descripcion;});

        // Ventas sin id_cierre
		// =======================
		const responseVentas = await fetch("/api/ventas_cab/sin_cierre");
		const ventas = await responseVentas.json();
	
        // Movimientos sin id_cierre
		// =======================
		const responseMov = await fetch("/api/movimientos/sin_cierre");
		const movimientos = await responseMov.json();

		// COMPRAS SIN CIERRE
		// =======================
		const responseCompras = await fetch("/api/compras_cab/sin_cierre");
		const compras = await responseCompras.json();
		
		// Agrupar compras por forma de pago
		const comprasPorFP = {};
		let totalCompras = 0;

		compras.forEach(c => {
		  const fp = c.f_pago1 || 0; 

		  if (!comprasPorFP[fp]) comprasPorFP[fp] = 0;

		  comprasPorFP[fp] += Number(c.total || 0);
		  totalCompras += Number(c.total || 0);
		});


        if (ventas.length === 0 && movimientos.length === 0 && compras.length === 0) {
          resDiv.innerHTML = "<p>No hay Ventas ni Movimientos ni Compras pendientes para cerrar.</p>";
          return;
        }

        // Calcular totales
        const resumenPorTipo = {};
        const resumenPorForma = {};
		const cantidadPorForma = {}; 
		
        let totalVentas = 0;

        ventas.forEach(v => {
          const tipo = v.tipo_venta || 0;
          //if (!resumenPorTipo[tipo]) resumenPorTipo[tipo] = { formasPago: {}, total: 0 };
		  if (!resumenPorTipo[tipo]) {
			resumenPorTipo[tipo] = {
			  formasPago: {},
			  cantidades: {}, 
			  total: 0
			};
		  }
  
          const addPago = (idfp, imp) => {
            if (!idfp) return;
			  // Importes
			  resumenPorTipo[tipo].formasPago[idfp] = (resumenPorTipo[tipo].formasPago[idfp] || 0) + (parseFloat(imp) || 0);
			  resumenPorForma[idfp] = (resumenPorForma[idfp] || 0) + (parseFloat(imp) || 0);
			  // Cantidades por tipo
			  resumenPorTipo[tipo].cantidades[idfp] = (resumenPorTipo[tipo].cantidades[idfp] || 0) + 1;
			  // Cantidades generales
			  cantidadPorForma[idfp] = (cantidadPorForma[idfp] || 0) + 1;
          };
		  
          addPago(v.f_pago1, v.importe_fp1);
          addPago(v.f_pago2, v.importe_fp2);
          resumenPorTipo[tipo].total += parseFloat(v.total || 0);
          totalVentas += parseFloat(v.total || 0);
        });

        // Clasificar movimientos
		const ingresos = movimientos.filter(m => m.tipo === 'I' || m.tipo === 'S');

        const egresos = movimientos.filter(m => m.tipo === 'E');
        const totalIngresos = ingresos.reduce((acc,m)=>acc+parseFloat(m.importe||0),0);
        const totalEgresos = egresos.reduce((acc,m)=>acc+parseFloat(m.importe||0),0);

        const totalGeneral = totalVentas + totalIngresos - totalEgresos - totalCompras;

        // Guardar para grabar
		datosCierre = { 
		  idCierre,
		  ventas, movimientos,
		  ingresos, egresos,
		  compras, comprasPorFP, totalCompras,
		  resumenPorTipo, resumenPorForma,
		  totalVentas, totalIngresos, totalEgresos,
		  totalGeneral: totalVentas + totalIngresos - totalEgresos - totalCompras
		};

		// =======================
        // Mostrar resumen
		// =======================
        let html = `<h3>📋 Resumen de Cierre</h3>`;
        html += `<div class="subtitulo">Totales por Tipo de VENTA</div>`;
        for (const tipo in resumenPorTipo) {
          const t = resumenPorTipo[tipo];
			let TipoVenta = "--indefinida--";
			if (tipo === "1") TipoVenta = "Delivery propio";
			else if (tipo === "2") TipoVenta = "Rappi";
			else if (tipo === "3") TipoVenta = "PedidosYa";
			else if (tipo === "4") TipoVenta = "Mostrador";
			else if (tipo === "5") TipoVenta = "Vtas OnLine";

          html += `<div class="subtitulo2">${TipoVenta}</div>`;
          html += `<table><tr><th>Forma de Pago</th><th>Total</th></tr>`;
          for (const idfp in t.formasPago) {
            html += `<tr><td>${formasPago[idfp] || idfp}</td> <td>${formateadorMoneda.format(t.formasPago[idfp])}</td></tr>`;
          }
          html += `<tr style="font-weight:bold;background:#e8f5e9"><td style="text-align:right">Subtotal ${TipoVenta}</td><td>${formateadorMoneda.format(t.total)}</td></tr></table><br>`;
        }

		// =======================
        // ✅ NUEVA TABLA: Totales por FORMA DE PAGO (General)
		// =======================
        html += `<div class="subtitulo" style="font-weight:bold;background:#05FA80 ;font-size=40px">Totales por Forma de Pago (General)</div>`;
        html += `<table><tr><th>Forma de Pago</th><th>Cant.</th><th>Total</th></tr>`;

        let totalGeneralFP = 0;
        for (const idfp in resumenPorForma) {
          const importe = resumenPorForma[idfp];
          totalGeneralFP += importe;

		  html += `<tr>
			<td>${formasPago[idfp] || idfp}</td>
			<td>${cantidadPorForma[idfp] || 0}</td>
			<td>${formateadorMoneda.format(importe)}</td>
			</tr>`;
        }

        html += `<tr style="font-weight:bold;background:#d7ffd9">
                    <td style="text-align:right">Total General Formas de Pago</td>
                    <td></td><td>${formateadorMoneda.format(totalGeneralFP)}</td>
                 </tr>
                 </table><br>`;

		// =======================
        // Ingresos
		// =======================
        html += `<div class="subtitulo">Movimientos de INGRESO (efectivo)</div>`;
        if (ingresos.length > 0) {
          html += `<table><tr><th>Fecha</th><th>Descripción</th><th>Importe</th></tr>`;
          ingresos.forEach(m => {
            html += `<tr><td>${normalizarFecha2(m.fecha)}</td><td>${m.descripcion}</td><td>${formateadorMoneda.format(m.importe)}</td></tr>`;
          });
          html += `<tr style="font-weight:bold;background:#e8f5e9"><td colspan="2" style="text-align:right">Total Ingresos</td><td>${formateadorMoneda.format(totalIngresos)}</td></tr></table>`;
        } else html += "<p>No hay movimientos de INGRESO.</p>";

        // Egresos
        html += `<div class="subtitulo">Movimientos de EGRESO (efectivo)</div>`;
        if (egresos.length > 0) {
          html += `<table><tr><th>Fecha</th><th>Descripción</th><th>Importe</th></tr>`;
          egresos.forEach(m => {
            html += `<tr><td>${normalizarFecha2(m.fecha)}</td><td>${m.descripcion}</td><td>${formateadorMoneda.format(m.importe)}</td></tr>`;
          });
          html += `<tr style="font-weight:bold;background:#fce4ec"><td colspan="2" style="text-align:right">Total Egresos</td><td>${formateadorMoneda.format(totalEgresos)}</td></tr></table>`;
        } else html += "<p>No hay movimientos de EGRESO.</p>";


		// =======================
		//   COMPRAS
		// =======================
		html += `<div class="subtitulo">Compras</div>`;
		if (compras.length > 0) {
				html += `<table><tr><th>Forma de Pago</th><th>Total Compras</th></tr>`;

				for (const fp in comprasPorFP) {
					html += `<tr>
					   <td>${formasPago[fp] || fp}</td>
					   <td>${formateadorMoneda.format(comprasPorFP[fp])}</td>
					 </tr>`;
				}

				html += `<tr style="font-weight:bold;background:#ffe0e0">
							 <td style="text-align:right">Total Compras</td>
							 <td>${formateadorMoneda.format(totalCompras)}</td>
						   </tr>
						   </table>`;
		}
		else {
				html += `<p>No hay compras pendientes de cierre.</p>`;
		}
		
		const efectivoVentas = resumenPorForma[1] || 0;
		const efectivoCompras = comprasPorFP[1] || 0;
		const totalEfectivo2 = efectivoVentas + totalIngresos - totalEgresos - efectivoCompras;

		html += `<h3 style=" text-align:right">
		💰 Total General: ${formateadorMoneda.format(totalGeneral)} 
		&nbsp;&nbsp;&nbsp;  💵 Efectivo: ${formateadorMoneda.format(totalEfectivo2)}
		</h3>`;


        html += `<div class="confirmar"><button onclick="confirmarCierre()">✅ Confirmar y Grabar Cierre</button></div>`;

        resDiv.innerHTML = html;

      } catch (e) {
        console.error(e);
        msgDiv.innerHTML = `<p style='color:red'>Error: ${e.message}</p>`;
      }
    }

    // Confirmar cierre
	async function confirmarCierre() {

		const confirmar = await mostrarConfirm({
		  mensaje: "¿Está seguro que desea Cerrar la Caja ?",
		  textoAceptar: "Sí, cerrar",
		  textoCancelar: "Cancelar"
		});
		if (!confirmar) {
		  return;
		}		
		
		if (!datosCierre)
			return await mostrarAlerta({mensaje: `Primero calcule el cierre`});
		try {
			const usuario = localStorage.getItem("usuarioEmail") || "";
			const response = await fetch("/api/cierres/generar", {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					usuario,
					datosCierre
				})
			});

			const data = await response.json();

			if (!data.ok) {
				alert(data.mensaje || "Error grabando cierre");
				return;
			}

			document.getElementById("mensaje").innerHTML = `✅ Cierre grabado correctamente (ID ${datosCierre.idCierre})`;
			document.getElementById("resultado").innerHTML = "";
			datosCierre = null;

		} catch (e) {
			console.error(e);
			alert("Error al grabar cierre");
		}
	}

  </script>

<script src="./JS/controlCaja.js"></script>
<script>
  verificarCajaParaCierre("menu-caja.html");
</script>

<script src="JS/modal.js"></script>

</body>
</html>
