<!DOCTYPE html>

  <style>

      text-align: left;
    }
	
	th { background-color: #f2f2f2; }

    tr:hover {
      background-color: #f1f1f1;
      cursor: pointer;
    }
    .input-pequeno {
      width: 100px;

    }
	input, select {

      border: 1px solid #ccc;
      margin-top: 4px;

    }
	
.boton-redondeado {
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
}

.boton-redondeado:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}

            <link rel="stylesheet" href="CSS/estilos.css">
			
			
</head>
<body>
  <div class="contenedor">
    <h2>Mantenimiento de Tipo de Sabores</h2>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="id_tipo">Codigo de Tipo de Sabor</label>
        <input class="input-pequeno" type="number" id="id_tipo" placeholder="Ingrese código" />
        <button id="btnVerificar">&#9989; Verificar</button>
        <button id="btnBuscar">&#128269; Buscar</button>
			<button id="btnVaciar" onclick="limpiarCampos()">&#9851; Limpiar</button>
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" />
      </div>
	  <div>
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
	  </div>
    </div>

    <br>
    <div>
      <button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
      <button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
    </div>

    <div id="listado">    </div>

    <!-- Modal de búsqueda -->
    <div id="modalBusqueda">
      <div id="contenidoModal" align="center">
        <h3>Buscar Tipo de Sabores por descripcion</h3>
        <input type="text" id="txtBuscarNombre" placeholder="Ingrese parte de la descripcion" />
        <button id="btnBuscarTipo">Buscar</button>
        <table id="tablaResultados">
          <thead>
            <tr><th>ID</th><th>Descripcion</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <br>
        <button id="btnCerrarModal">Cerrar</button>
      </div>
    </div>
  </div>

  <script>

verificarSesion(); 

// BLOQUEA TODOS LOS BOTONES AL CARGAR LA PÁGINA (menos boton Volver)

    botones.forEach(btn => {

            btn.disabled = true;
            btn.title = "No tiene permiso para usar esta función";

    // Esperar permisos

<script src="JS/permisos.js"></script>

<script>
// control de permisos
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(12)) {
        //if (btn) btn.style.display = "none";
		if (btn) btn.disabled = true;
		btn.title = "No tiene permiso para usar esta funcion";
		if (btn2) btn2.disabled = true;
		btn2.title = "No tiene permiso para usar esta funcion";
    }
};

    const idTipo = document.getElementById("id_tipo");
    const descripcion = document.getElementById("descripcion");

    // --- Verificar existencia ---
	document.getElementById("btnVerificar").onclick = async () => {

	  const codigo = parseInt(idTipo.value);

	  if (!codigo)
		return alert("Ingrese un código válido.");

	  const resp = await fetch(`/api/tipo-sabores/${codigo}`);

	  const data = await resp.json();

	  if (data.error) {

		alert("Tipo de Sabor no encontrado.");

		limpiarCampos();

		return;
	  }

	  descripcion.value = data.descripcion || "";

	  document.getElementById("deshabili").checked =
		data.deshabilitado == 1;
	};


    // --- Alta ---
	document.getElementById("btnAlta").onclick = async () => {

	  if (idTipo.value)
		return alert(
		  "Para dar de alta NO debe ingresar un codigo.\n" +
		    "Este se genera automaticamente.\nBorrar el codigo y volver a intentar."
		);

	  if (!await validarCampos())
		return;

	  const resp = await fetch('/api/tipo-sabores', {

		method: 'POST',

		headers: {
		  'Content-Type': 'application/json'
		},

		body: JSON.stringify({

		  descripcion:
			descripcion.value.trim(),

		  deshabilitado:
			document.getElementById("deshabili").checked ? 1 : 0
		})
	  });

	  const data = await resp.json();

	  if (!data.ok) {

		alert("Error guardando tipo sabor");

		return;
	  }

	  alert(`Tipo de Sabor agregado con código ${data.id}`);

	  limpiarCampos();

	  ArmarTabla();
	};

    // --- Modificar ---
	document.getElementById("btnModificar").onclick = async () => {

	  const codigo = parseInt(idTipo.value);

	  if (!codigo)
		return alert("Ingrese un código válido.");

	  if (!await validarCampos())
		return;

	  const resp = await fetch(`/api/tipo-sabores/${codigo}`, {

		method: 'PUT',

		headers: {
		  'Content-Type': 'application/json'
		},

		body: JSON.stringify({

		  descripcion:
			descripcion.value.trim(),

		  deshabilitado:
			document.getElementById("deshabili").checked ? 1 : 0
		})
	  });

	  const data = await resp.json();

	  if (!data.ok) {

		alert("Error actualizando tipo sabor");

		return;
	  }

	  alert("Tipo de Sabor actualizado correctamente.");

	  limpiarCampos();

	  ArmarTabla();
	};

    async function validarCampos() {
      if (!descripcion.value.trim()) { alert("Ingrese la descripcion."); return false; }
      return true;
    }

    function limpiarCampos() {
      idTipo.value = "";
      descripcion.value = "";
      document.getElementById("deshabili").checked = false;
    }

    // --- Modal búsqueda ---
    const modal = document.getElementById("modalBusqueda");
    document.getElementById("btnBuscar").onclick = () => modal.style.display = "flex";
    document.getElementById("btnCerrarModal").onclick = () => modal.style.display = "none";

	document.getElementById("btnBuscarTipo").onclick = async () => {

	  const texto =
		document.getElementById("txtBuscarNombre")
		  .value
		  .trim()
		  .toLowerCase();

	  if (!texto)
		return alert("Ingrese texto a buscar.");

	  const tablaBody =
		document.querySelector("#tablaResultados tbody");

	  tablaBody.innerHTML = "";

	  const resp = await fetch('/api/tipo-sabores');

	  const data = await resp.json();

	  data.forEach((item) => {

		if (
		  item.descripcion.toLowerCase().includes(texto)
		) {

		  const fila = document.createElement("tr");

		  fila.innerHTML = `
			<td>${item.id_tipo_sabor}</td>
			<td>${item.descripcion}</td>
		  `;

		  fila.onclick = () => {

			idTipo.value =
			  item.id_tipo_sabor;

			descripcion.value =
			  item.descripcion || "";

			document.getElementById("deshabili").checked =
			  item.deshabilitado == 1;

			modal.style.display = "none";
		  };

		  tablaBody.appendChild(fila);
		}
	  });
	};

	// listado de los Tipo de Sabores
	async function ArmarTabla() {

	  try {

		const resp =
		  await fetch('/api/tipo-sabores');

		const data =
		  await resp.json();

		let html = "";

		if (!data || data.length === 0) {

		  html +=
			"<p>No se encontraron Tipo de Sabores.</p>";

		} else {

		  html += `
			<table>
			  <tr>
				<th>Codigo</th>
				<th>Descripcion</th>
				<th>Deshabilitado</th>
			  </tr>
		  `;

		  let cant = 0;

		  data.forEach((item) => {

			html += `
			  <tr>
				<td>${item.id_tipo_sabor}</td>
				<td>${item.descripcion}</td>
				<td style="${item.deshabilitado == 1 ? 'background-color:#FF6467;color:white;' : ''}">
					${item.deshabilitado == 1 ? 'S' : 'N'}
				</td>
			  </tr>
			`;

			cant++;

		  });

		  html += `
			<tr class="total-row"
				style="font-weight:bold;background:#f2f2f2">

			  <td colspan="1">CANTIDAD</td>

			  <td>${cant}</td>

			  <td></td>

			</tr>
		  `;

		  html += "</table>";
		}

		document.getElementById("listado").innerHTML =
		  html;

	  } catch (error) {

		console.error(
		  "Error buscando tipos sabores:",
		  error
		);
	  }
	}

  </script>

</body>
</html>
