<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Auditoría de Ventas</title>
  <script src="JS/auth.js"></script>  <!-- Aqui se verifica la autenticacion-->

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }
    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
    }
    .filtros {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }
	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;
    }
    button {
      padding: 8px 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: red;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #000;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #f2f2f2;
    }
    #mensaje {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }
	
	td div {
		text-align: left;
		line-height: 1.4;
	}
    .alert-modern{background:#e9f7ef;border-left:6px solid green;padding:10px;border-radius:6px;margin:10px 0}

  </style>
</head>
<body>
  <div class="contenedor">
    <h2>📋 Auditoría de Cambios en Ventas</h2>

    <div class="filtros">
      <div>
        <label><b>Desde:</b></label><br>
        <input type="date" id="fechaFiltro">
      </div>
      <div>
        <label><b>Hasta:</b></label><br>
        <input type="date" id="fechaFiltro2">
      </div>
      <div>
        <label><b>Usuario:</b></label><br>
        <select id="usuarioFiltro">
          <option value="">(Todos)</option>
        </select>
      </div>
      <div>
        <label><b>Tipo de Cambio:</b></label><br>
        <select id="tipoFiltro">
          <option value="">(Todos)</option>
          <option value="FP">FP - Cambio de forma de pago</option>
          <option value="ANU">ANU - Anulación de venta</option>
        </select>
      </div>
      <div style="align-self: end;">
        <button onclick="buscarAuditoria()">🔍 Buscar</button>
		<button onclick="window.location.href='menu-general.html'">&#8617; Volver</button>

      </div>
    </div>

    <div id="mensaje"></div>

<div id="mensajeTipo" class="alert-modern">(*) FP - Cambio de forma de pago &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ANU - Anulación de venta</div>

    <table id="tablaAuditoria">
      <thead>
        <tr>
          <th>Fecha Audit</th>
          <th>Hora Audit</th>
          <th>ID Venta</th>
          <th>Fecha Venta</th>
          <th>Total</th>
          <th>id_Usuario</th>
          <th>Usuario</th>
          <th>Tipo (*)</th>
          <th>Valor Anterior</th>
          <th>Valor Nuevo</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>

verificarSesion();


    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaFiltro").value = fechaHoy;
    document.getElementById("fechaFiltro2").value = fechaHoy;
	

    // === CARGAR USUARIOS ===
	async function cargarUsuarios() {

	  try {

		const sel = document.getElementById('usuarioFiltro');

		sel.innerHTML = `<option value="">(Todos)</option>`;

		const resp = await fetch('/api/usuarios');
		const data = await resp.json();

		if (!data.ok) {
		  alert('Error cargando usuarios');
		  return;
		}

		data.usuarios.forEach(u => {
		  // OCULTAR ADMINISTRADOR
		  if (u.id_usuario == 1) {
			return;
		  }

		  sel.innerHTML += `
			<option value="${u.id_usuario}">
			  ${u.nombre}
			</option>
		  `;
		});

	  } catch (error) {
		console.error(error);
		alert('Error cargando usuarios');
	  }
	}
	
	
    cargarUsuarios();
	
    // === BUSCAR AUDITORÍA ===
	async function buscarAuditoria() {

	  const tbody = document.querySelector("#tablaAuditoria tbody");

	  const msg = document.getElementById("mensaje");

	  tbody.innerHTML = "";

	  msg.textContent = "🔎 Buscando registros...";

	  try {
		const fechaFiltro = document.getElementById("fechaFiltro").value;
		const fechaFiltro2 = document.getElementById("fechaFiltro2").value;
		const usuarioFiltro = document.getElementById("usuarioFiltro").value;
		const tipoFiltro = document.getElementById("tipoFiltro").value;

		let url = `/api/auditoria-ventas?`;

		if (fechaFiltro) {
		  url += `fechadesde=${fechaFiltro}&`;
		}
		if (fechaFiltro2) {
		  url += `fechahasta=${fechaFiltro2}&`;
		}

		if (usuarioFiltro) {
		  url += `id_usuario=${usuarioFiltro}&`;
		}

		if (tipoFiltro) {
		  url += `tipo=${tipoFiltro}&`;
		}

		const resp = await fetch(url);
		const data = await resp.json();

		if (!data.ok) {
		  msg.textContent = "❌ Error obteniendo auditoría.";
		  return;
		}

		if (data.auditoria.length === 0) {
		  msg.textContent = "❌ No se encontraron registros.";
		  return;
		}

		msg.textContent = "";

		data.auditoria.forEach(d => {

		  const total =
			  Number(d.valor_anterior_imp_fpago1 || 0)
			+ Number(d.valor_anterior_imp_fpago2 || 0);

		  const tr =
			  document.createElement("tr");

		  tr.innerHTML = `
			<td>${formatearFecha(d.fecha)}</td>
			<td>${d.hora || ''}</td>
			<td>${d.id_venta || ''}</td>
			<td>${formatearFecha(d.fecha_venta)}</td>
			<td>$ ${total.toFixed(2)}</td>
			<td>${d.id_usuario || ''}</td>
			<td>${d.usuario || ''}</td>
			<td>${d.tipo || ''}</td>
			<td>${formatearValoresAnteriores(d)}</td>
			<td>${formatearValoresNuevos(d)}</td>
		  `;

		  tbody.appendChild(tr);
		});

	  } catch (error) {

		console.error(error);

		msg.textContent =
			"❌ Error obteniendo auditoría.";
	  }
	}
	
function formatearValoresAnteriores(d) {

  return `
    <div>
      <b>FP1:</b> ${d.desc_anterior_fpago1 || ''}
    </div>

    <div>
      <b>Imp FP1:</b>
      $ ${Number(d.valor_anterior_imp_fpago1 || 0).toFixed(2)}
    </div>

    <div>
      <b>FP2:</b> ${d.desc_anterior_fpago2 || ''}
    </div>

    <div>
      <b>Imp FP2:</b>
      $ ${Number(d.valor_anterior_imp_fpago2 || 0).toFixed(2)}
    </div>
  `;
}


function formatearValoresNuevos(d) {

  return `
    <div>
      <b>FP1:</b> ${d.desc_nuevo_fpago1 || ''}
    </div>

    <div>
      <b>Imp FP1:</b>
      $ ${Number(d.valor_nuevo_imp_fpago1 || 0).toFixed(2)}
    </div>

    <div>
      <b>FP2:</b> ${d.desc_nuevo_fpago2 || ''}
    </div>

    <div>
      <b>Imp FP2:</b>
      $ ${Number(d.valor_nuevo_imp_fpago2 || 0).toFixed(2)}
    </div>
  `;
}


function formatearFecha(fecha) {

  if (!fecha) return '';

  const f = new Date(fecha);

  const dia =
      String(f.getDate()).padStart(2, '0');

  const mes =
      String(f.getMonth() + 1).padStart(2, '0');

  const anio =
      f.getFullYear();

  return `${dia}/${mes}/${anio}`;
}

  </script>


</body>
</html>
