<body>
  <div class="contenedor">
    <h2>Mantenimiento de Formas de Pago</h2>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="id_fpago">Codigo de Forma de Pago</label>
        <input class="input-pequeno" type="number" id="id_fpago" placeholder="Ingrese código" />
        <button id="btnVerificar">&#9989; Verificar</button>

			<button id="btnVaciar" onclick="limpiarCampos()">&#9851; Limpiar</button>
      </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" />
      </div>
	  <div>
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
	  </div>
    </div>

    <br>
    <div>
      <button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
      <button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
    </div>

    <div id="listado">    </div>

    <!-- Modal de búsqueda -->

      <div id="contenidoModal" align="center">
        <h3>Buscar F.Pago por descripcion</h3>
        <input type="text" id="txtBuscarNombre" placeholder="Ingrese parte de la descripcion" />
        <button id="btnBuscarFPago">Buscar</button>
        <table id="tablaResultados">
          <thead>
            <tr><th>ID</th><th>Descripcion</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <br>
        <button id="btnCerrarModal">Cerrar</button>
      </div>
    </div>
  </div>

  <script>

verificarSesion();

<script src="JS/permisos.js"></script>

<script>

// ============================================
// CONTROL DE PERMISOS
// ============================================
window.aplicarPermisos = function() {

    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(12)) {
        if (btn) btn.disabled = true;
        btn.title = "No tiene permiso para usar esta funcion";
        if (btn2) btn2.disabled = true;
        btn2.title = "No tiene permiso para usar esta funcion";
    }
};

// ============================================
// VARIABLES
// ============================================

const idFpago = document.getElementById("id_fpago");
const descripcion = document.getElementById("descripcion");

// ============================================
// VERIFICAR EXISTENCIA
// ============================================

document.getElementById("btnVerificar").onclick = async () => {

    const codigo = parseInt(idFpago.value);

    if (!codigo)
        return alert("Ingrese un código válido.");

    try {

        const resp = await fetch(`/api/fpago/${codigo}`);

        if (!resp.ok) {

            alert("Forma de Pago no encontrada.");
            limpiarCampos();
            return;
        }

        const data = await resp.json();

        descripcion.value = data.descripcion;

        document.getElementById("deshabili").checked = (data.deshabilitado === 1);

    } catch (error) {

        console.error(error);

        alert("Error consultando Forma de Pago");
    }
};

// ============================================
// ALTA
// ============================================

document.getElementById("btnAlta").onclick = async () => {

    if (idFpago.value) {

        return alert(
            "Para dar de alta NO debe ingresar un codigo.\n" +
            "Este se genera automaticamente.\n" +
            "Borrar el codigo, cargar los demas campos y volver a presionar ALTA"
        );
    }

    if (!validarCampos())
        return;

    try {

        const resp = await fetch('/api/fpago', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                descripcion: descripcion.value.trim(),
                deshabilitado: document.getElementById("deshabili").checked ? 1 : 0
            })
        });

        const data = await resp.json();

        if (!data.ok) {

            alert(data.mensaje || "Error al grabar");
            return;
        }

        alert(`Forma de Pago agregada con código ${data.id_fpago}`);

        limpiarCampos();

        ArmarTabla();

    } catch (error) {

        console.error(error);

        alert("Error grabando Forma de Pago");
    }
};

// ============================================
// MODIFICAR
// ============================================

document.getElementById("btnModificar").onclick = async () => {

    const codigo = parseInt(idFpago.value);

    if (!codigo)
        return alert("Ingrese un código válido.");

    if (!validarCampos())
        return;

    try {

        const resp = await fetch(`/api/fpago/${codigo}`, {

            method: 'PUT',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                descripcion: descripcion.value.trim(),
                deshabilitado: document.getElementById("deshabili").checked ? 1 : 0
            })
        });

        const data = await resp.json();

        if (!data.ok) {

            alert(data.mensaje || "Error al modificar");
            return;
        }

        alert("Forma de Pago actualizada correctamente.");

        limpiarCampos();

        ArmarTabla();

    } catch (error) {

        console.error(error);

        alert("Error modificando Forma de Pago");
    }
};

// ============================================
// VALIDAR CAMPOS
// ============================================

function validarCampos() {

    if (!descripcion.value.trim()) {
        alert("Ingrese la descripcion.");
        return false;
    }
    return true;
}

// ============================================
// LIMPIAR CAMPOS
// ============================================

function limpiarCampos() {
    idFpago.value = "";
    descripcion.value = "";
    document.getElementById("deshabili").checked = false;
}

// ============================================
// MODAL BUSQUEDA
// ============================================

const modal = document.getElementById("modalBusqueda");

document.getElementById("btnBuscar").onclick = () => {

    modal.style.display = "flex";
};

document.getElementById("btnCerrarModal").onclick = () => {

    modal.style.display = "none";
};

// ============================================
// BUSCAR FORMAS DE PAGO
// ============================================

document.getElementById("btnBuscarFPago").onclick = async () => {

    const texto =
        document.getElementById("txtBuscarNombre")
        .value
        .trim();

    if (!texto)
        return alert("Ingrese texto a buscar.");

    try {

        const resp = await fetch(`/api/fpago/buscar/${texto}`);

        const data = await resp.json();

        const tablaBody =
            document.querySelector("#tablaResultados tbody");

        tablaBody.innerHTML = "";

        data.forEach(fp => {

            const fila = document.createElement("tr");

            fila.innerHTML = `
                <td>${fp.id_fpago}</td>
                <td>${fp.descripcion}</td>
            `;

            fila.onclick = () => {

                idFpago.value = fp.id_fpago;
                descripcion.value = fp.descripcion;
                document.getElementById("deshabili").checked = (fp.deshabilitado === 1);

                modal.style.display = "none";
            };

            tablaBody.appendChild(fila);
        });

    } catch (error) {

        console.error(error);

        alert("Error buscando formas de pago");
    }
};

// ============================================
// ARMAR TABLA
// ============================================

async function ArmarTabla() {

    try {

		const resp = await fetch('/api/fpago');
		const data = await resp.json();
		const formasPago = {};


        let html = "";

        if (data.length === 0) {

            html += "<p>No se encontraron formas de pago.</p>";

        } else {

            html += `
                <table>
                    <tr>
                        <th>Codigo</th>
                        <th>Descripcion</th>
                        <th>Deshabilitado</th>
                    </tr>
            `;

            let cant = 0;

            data.formasPago.forEach(fp => {

                html += `
                    <tr>
                        <td>${fp.id_fpago}</td>
                        <td>${fp.descripcion}</td>
						<td style="${fp.deshabilitado == 1 ? 'background-color:#FF6467;color:white;' : ''}">
							${fp.deshabilitado == 1 ? 'S' : 'N'}
						</td>
                    </tr>
                `;

                cant++;
            });

            html += `
                <tr class="total-row"
                    style="font-weight:bold;background:#f2f2f2">

                    <td colspan="1">CANTIDAD</td>
                    <td>${cant}</td>
                    <td></td>

                </tr>
            `;

            html += "</table>";
        }

        document.getElementById("listado").innerHTML = html;

    } catch (error) {

        console.error(error);

        alert("Error armando tabla");
    }
}

</script>

</body>
