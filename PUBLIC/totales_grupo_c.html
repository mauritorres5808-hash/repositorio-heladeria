<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Compras por Grupo</title>

<script src="JS/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
		font-family:Arial;
		background:#f3f3f3;
		margin:0;
		padding:20px;
		background-color: #8AC0FF;
	}
 
/* fondo contenedor blanco */
 .contenedor{max-width:1050px;margin:auto;background:#fff;padding:20px;border-radius:8px}


    h2 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }
	
 	label { font-weight: bold; margin-right: 10px; }
 
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
        margin-left: auto;
        margin-right: auto;
		font-size: 14px;
    }
    th,td {
      padding: 8px;
      border: 1px solid #0E0D0C;
      text-align: center;
    }	
    th {
      background-color: #BDC2CB;
    }
    .total {
      font-weight: bold;
      background-color: #e8f5e9;
    }
    .resumen {
      margin-top: 25px;
      border-top: 12px solid #333;
      padding-top: 10px;
    }

.contenedor-botones {
  display: flex; /* Convierte el div en un contenedor flexible */
  justify-content: center;
  gap: 10px; /* Establece un espacio de xx píxeles entre los elementos */
}
.contenedor-botones2 {
  display: flex; /* Convierte el div en un contenedor flexible */
  justify-content: center;
  gap: 30px; /* Establece un espacio de xx píxeles entre los elementos */
}

}

    button {
      padding: 8px 14px;
      background: #007bff;
      color: #fff;

      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {

      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr.total {
      background-color: #e6f0ff;
      font-weight: bold;
    }

    .filtros {
      text-align: center;
      margin-bottom: 20px;
    }
    .filtros input {
      margin: 0 10px;
      padding: 5px;
    }
    #mensajeProcesando {
      text-align: center;
      color: #007bff;
      font-weight: bold;
      margin-top: 10px;
      display: none;
    }
    #graficoContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      width: 100%;
    }
	#graficoTorta {
	  max-width: 300px;
	  max-height: 300px;
	}
	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;
    }
	
  </style>
</head>
<body>
  <div class="contenedor">

  <h2 align=center style="background-color: #8AC0FF;">Compras por Grupo</h2>

    <div class="filtros">
      <label>Desde: <input type="date" id="fechaDesde"></label>
      <label>Hasta: <input type="date" id="fechaHasta"></label>
	<label for="chk_cierre">solo Ventas sin cierre</label>
	<input  type="checkbox" checked=true id="chk_cierre">
	<br><br>
	  <div class="contenedor-botones2">
			<button class="boton-redondeado" onclick="calcularTotales()">&#128269; Buscar</button>
			<button  onclick="window.location.href='menu-compras.html'">&#8617; Volver</button>
	  </div>
    </div>

    <div id="mensajeProcesando">🔄 Procesando, por favor espere...</div>

    <table id="tablaTotales">
      <thead>
        <tr>
          <th>Descripción Grupo</th>
          <th>Cantidad Comprada</th>
          <th>Total ($)</th>
          <th>% Cantidad</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="graficoContainer">
      <canvas id="graficoTorta" width="400" height="400"></canvas>
    </div>
  </div>

  <script>

verificarSesion();


    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

    // 🔸 Fecha por defecto (hoy)
    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, "0");
    const dd = String(hoy.getDate()).padStart(2, "0");
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaDesde").value = fechaHoy;
    document.getElementById("fechaHasta").value = fechaHoy;

    // 🔸 Función auxiliar: convierte "DD/MM/YYYY" → "YYYY-MM-DD"
    function convertirFecha(fechaStr) {
      const [dia, mes, año] = fechaStr.split("/");
      return `${año}-${mes}-${dia}`;
    }

    let grafico = null; // Para poder actualizar el gráfico

async function calcularTotales() {

  const mensaje =
    document.getElementById(
      "mensajeProcesando"
    );

  mensaje.style.display = "block";

  mensaje.textContent =
    "🔄 Procesando, por favor espere...";

  const fechaDesde =
    document.getElementById(
      "fechaDesde"
    ).value;

  const fechaHasta =
    document.getElementById(
      "fechaHasta"
    ).value;

  const sin_cierre =
    document.getElementById(
      "chk_cierre"
    ).checked;

  try {

    // =====================================
    // API
    // =====================================
    const resp = await fetch(`/api/compras/totales-grupo?desde=${fechaDesde}&hasta=${fechaHasta}&sin_cierre=${sin_cierre}`);

    const totales = await resp.json();

    if (!totales.length) {
      mensaje.style.display = "none";
	  await mostrarAlerta({mensaje: `No se encontraron compras en ese rango`});
      return;
    }

    // =====================================
    // TOTALES GENERALES
    // =====================================
    const totalGeneralImporte =
      totales.reduce(
        (acc, g) =>
          acc + Number(g.total),
        0
      );

    const totalGeneralCantidad =
      totales.reduce(
        (acc, g) =>
          acc + Number(g.cantidad),
        0
      );

    // =====================================
    // TABLA
    // =====================================
    const tbody =
      document.querySelector(
        "#tablaTotales tbody"
      );

    tbody.innerHTML = "";

    const labels = [];
    const data = [];

    totales.forEach(g => {

      const porcentajeCant = (

        (Number(g.cantidad)
        / totalGeneralCantidad)

        * 100

      ).toFixed(2);

      labels.push(g.desc_grupo);

      data.push(Number(g.cantidad));

      tbody.innerHTML += `

        <tr>

          <td>${g.desc_grupo}</td>

          <td>${g.cantidad}</td>

          <td>
            ${formateadorMoneda.format(g.total)}
          </td>

          <td>${porcentajeCant}%</td>

        </tr>
      `;
    });

    // =====================================
    // TOTAL GENERAL
    // =====================================
    tbody.innerHTML += `

      <tr class="total">

        <td>TOTAL GENERAL</td>

        <td>
          ${totalGeneralCantidad}
        </td>

        <td>
          ${formateadorMoneda.format(
            totalGeneralImporte
          )}
        </td>

        <td>100%</td>

      </tr>
    `;

    // =====================================
    // GRAFICO
    // =====================================
    const ctx =
      document.getElementById(
        "graficoTorta"
      ).getContext("2d");

    if (grafico)
      grafico.destroy();

    grafico = new Chart(ctx, {

      type: "pie",

      data: {

        labels: labels,

        datasets: [{

          label:
            "Cantidad comprada",

          data: data,

          backgroundColor: [

            "#007bff",
            "#28a745",
            "#ffc107",
            "#dc3545",
            "#17a2b8",
            "#6f42c1",
            "#fd7e14",
            "#20c997"

          ]
        }]
      },

      options: {

        responsive: true,

        plugins: {

          legend: {
            position: "bottom"
          },

          title: {

            display: true,

            text:
              "Distribución de cantidad de Compras por Grupo (%)"
          }
        }
      }
    });

  } catch (error) {
    console.error(error);
    alert("Error obteniendo datos");

  } finally {
    mensaje.style.display = "none";
  }
}

  </script>
<script src="JS/modal.js"></script>

</body>
</html>
