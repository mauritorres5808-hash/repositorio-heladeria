<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cierre de Caja</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->

  <style>
    body { font-family: Arial; background-color: #8AC0FF; margin:0; padding:20px; }
    .contenedor { background:#fff;border-radius:10px;max-width:800px;margin:0 auto;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.2); }
    h2 { text-align:center;background-color:#8AC0FF;border-radius:8px;padding:10px;margin-bottom:25px; }

    button {
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
	   font-size: 15px;
    }
    button:hover { background:red;color:white; }
	
    table { width:100%; border-collapse:collapse; margin-top:15px; font-size:15px; }
    th,td { border:1px solid #0E0D0C; padding:8px; text-align:center; }
    th { background:#f2f2f2; }
    .confirmar { text-align:center;margin-top:18px; }
    #mensaje { text-align:center;margin-top:12px;font-weight:bold; }
    .subtitulo { background:#d0ebff; padding:6px; border-radius:6px; text-align:center; margin-top:30px; font-weight:bold; }
    .subtitulo2 { background:#e8f5e9; padding:6px; border-radius:6px; text-align:left; margin-top:30px; font-weight:bold; }
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>Cierre de Caja</h2>

  <div style="text-align:center; font-size:18px;">
    Usuario conectado: <b><span id="userLabel"></span></b>
  </div>

	<br>
    <div style="text-align:center; margin-bottom:15px;">
      <button onclick="calcularCierre()">&#128269; Calcular Cierre Actual</button>
    </div>

    <div id="resultado"></div>
    <div id="mensaje"></div>

    <div style="margin-top:18px;display:flex;justify-content:center;gap:10px;">
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>
    </div>
  </div>

  <script>

verificarSesion();
document.getElementById("userLabel").textContent = localStorage.getItem("usuarioEmail");

    const formateadorMoneda = new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" });
    let datosCierre = null;


    function normalizarFecha2(fechaStr) {
      if (fechaStr.includes("-")) {
        const [año, mes,dia] = fechaStr.split("-");
        return `${dia.padStart(2, "0")}/${mes.padStart(2, "0")}/${año}`;
      }
      return fechaStr;
    }

    // Función principal
    async function calcularCierre() {
      const resDiv = document.getElementById("resultado");
      const msgDiv = document.getElementById("mensaje");
      resDiv.innerHTML = "<p><b>Procesando, por favor espere...</b></p>";
      msgDiv.innerHTML = "";

      try {
        // Buscar apertura abierta
        const aperSnap = await db.collection("APERTURAS").where("estado", "==", "ABIERTA").limit(1).get();
        if (aperSnap.empty) {
          resDiv.innerHTML = "<p style='color:red'>No existe ninguna caja abierta actualmente.</p>";
          return;
        }
        const apertura = aperSnap.docs[0].data();
        const idCierre = apertura.id_apertura;

        // Traer formas de pago
        const fpSnap = await db.collection("F_PAGO").get();
        const formasPago = {};
        fpSnap.forEach(d => { const x=d.data(); formasPago[x.id_fpago]=`${x.descripcion}`; });

        // Ventas sin id_cierre
		// =======================
        const ventasSnap = await db.collection("VENTAS_CAB").where("id_cierre","==",0).get();
        const ventas = ventasSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(v => v.anulada !== "S");

        // Movimientos sin id_cierre
		// =======================
        const movSnap = await db.collection("MOVIMIENTOS").where("id_cierre","==",0).get();
        const movimientos = movSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => m.anulado !== "S");

		// COMPRAS SIN CIERRE
		// =======================
		const comprasSnap = await db.collection("COMPRAS_CAB")
		  .where("id_cierre", "==", 0)
		  .where("anulada", "==", "N")
		  .get();

		const compras = comprasSnap.docs.map(doc => ({ ...doc.data() }));

		// Agrupar compras por fecha
		const comprasPorFecha = {};
		let totalCompras = 0;

		compras.forEach(c => {
		  const fecha = c.fecha;
		  if (!comprasPorFecha[fecha]) comprasPorFecha[fecha] = 0;
		  comprasPorFecha[fecha] += Number(c.total || 0);
		  totalCompras += Number(c.total || 0);
		});


        if (ventas.length === 0 && movimientos.length === 0 && compras.length === 0) {
          resDiv.innerHTML = "<p>No hay Ventas ni Movimientos ni Compras pendientes para cerrar.</p>";
          return;
        }

        // Calcular totales
        const resumenPorTipo = {};
        const resumenPorForma = {};
        let totalVentas = 0;

        ventas.forEach(v => {
          const tipo = v.tipo_venta || 0;
          if (!resumenPorTipo[tipo]) resumenPorTipo[tipo] = { formasPago: {}, total: 0 };
          const addPago = (idfp, imp) => {
            if (!idfp) return;
            resumenPorTipo[tipo].formasPago[idfp] = (resumenPorTipo[tipo].formasPago[idfp] || 0) + (parseFloat(imp)||0);
            resumenPorForma[idfp] = (resumenPorForma[idfp] || 0) + (parseFloat(imp)||0);
          };
          addPago(v.f_pago1, v.importe_fp1);
          addPago(v.f_pago2, v.importe_fp2);
          resumenPorTipo[tipo].total += parseFloat(v.total || 0);
          totalVentas += parseFloat(v.total || 0);
        });

        // Clasificar movimientos
        //const ingresos = movimientos.filter(m => m.tipo === 'I' , 'S');
		const ingresos = movimientos.filter(m => m.tipo === 'I' || m.tipo === 'S');

        const egresos = movimientos.filter(m => m.tipo === 'E');
        const totalIngresos = ingresos.reduce((acc,m)=>acc+parseFloat(m.importe||0),0);
        const totalEgresos = egresos.reduce((acc,m)=>acc+parseFloat(m.importe||0),0);

        const totalGeneral = totalVentas + totalIngresos - totalEgresos - totalCompras;

        // Guardar para grabar
      //  datosCierre = { idCierre, ventas, movimientos, ingresos, egresos, resumenPorTipo, resumenPorForma, totalVentas, totalIngresos, totalEgresos, totalGeneral };
		datosCierre = { 
		  idCierre,
		  ventas, movimientos,
		  ingresos, egresos,
		  compras, comprasPorFecha, totalCompras,
		  resumenPorTipo, resumenPorForma,
		  totalVentas, totalIngresos, totalEgresos,
		  totalGeneral: totalVentas + totalIngresos - totalEgresos - totalCompras
		};

		// =======================
        // Mostrar resumen
		// =======================
        let html = `<h3>📋 Resumen de Cierre</h3>`;
        html += `<div class="subtitulo">Totales por Tipo de VENTA</div>`;
        for (const tipo in resumenPorTipo) {
          const t = resumenPorTipo[tipo];
			let TipoVenta = "--indefinida--";
			if (tipo === "1") TipoVenta = "Delivery propio";
			else if (tipo === "2") TipoVenta = "Rappi";
			else if (tipo === "3") TipoVenta = "PedidosYa";
			else if (tipo === "4") TipoVenta = "Mostrador";
			else if (tipo === "5") TipoVenta = "Vtas OnLine";

          html += `<div class="subtitulo2">${TipoVenta}</div>`;
          html += `<table><tr><th>Forma de Pago</th><th>Total</th></tr>`;
          for (const idfp in t.formasPago) {
            html += `<tr><td>${formasPago[idfp] || idfp}</td><td>${formateadorMoneda.format(t.formasPago[idfp])}</td></tr>`;
          }
          html += `<tr style="font-weight:bold;background:#e8f5e9"><td style="text-align:right">Subtotal Tipo ${TipoVenta}</td><td>${formateadorMoneda.format(t.total)}</td></tr></table><br>`;
        }

		// =======================
        // ✅ NUEVA TABLA: Totales por FORMA DE PAGO (General)
		// =======================
        html += `<div class="subtitulo">Totales por Forma de Pago (General)</div>`;
        html += `<table><tr><th>Forma de Pago</th><th>Total</th></tr>`;

        let totalGeneralFP = 0;
        for (const idfp in resumenPorForma) {
          const importe = resumenPorForma[idfp];
          totalGeneralFP += importe;
          html += `<tr><td>${formasPago[idfp] || idfp}</td><td>${formateadorMoneda.format(importe)}</td></tr>`;
        }

        html += `<tr style="font-weight:bold;background:#d7ffd9">
                    <td style="text-align:right">Total General Formas de Pago</td>
                    <td>${formateadorMoneda.format(totalGeneralFP)}</td>
                 </tr>
                 </table><br>`;

		// =======================
        // Ingresos
		// =======================
        html += `<div class="subtitulo">Movimientos de INGRESO</div>`;
        if (ingresos.length > 0) {
          html += `<table><tr><th>Fecha</th><th>Descripción</th><th>Importe</th></tr>`;
          ingresos.forEach(m => {
            html += `<tr><td>${normalizarFecha2(m.fecha)}</td><td>${m.descripcion}</td><td>${formateadorMoneda.format(m.importe)}</td></tr>`;
          });
          html += `<tr style="font-weight:bold;background:#e8f5e9"><td colspan="2" style="text-align:right">Total Ingresos</td><td>${formateadorMoneda.format(totalIngresos)}</td></tr></table>`;
        } else html += "<p>No hay movimientos de INGRESO.</p>";

        // Egresos
        html += `<div class="subtitulo">Movimientos de EGRESO</div>`;
        if (egresos.length > 0) {
          html += `<table><tr><th>Fecha</th><th>Descripción</th><th>Importe</th></tr>`;
          egresos.forEach(m => {
            html += `<tr><td>${normalizarFecha2(m.fecha)}</td><td>${m.descripcion}</td><td>${formateadorMoneda.format(m.importe)}</td></tr>`;
          });
          html += `<tr style="font-weight:bold;background:#fce4ec"><td colspan="2" style="text-align:right">Total Egresos</td><td>${formateadorMoneda.format(totalEgresos)}</td></tr></table>`;
        } else html += "<p>No hay movimientos de EGRESO.</p>";


		// =======================
		//   COMPRAS
		// =======================
		html += `<div class="subtitulo">Compras</div>`;
		if (compras.length > 0) {
		  html += `<table><tr><th>Fecha</th><th>Total Compras</th></tr>`;

		  for (const fecha in comprasPorFecha) {
			html += `<tr>
					   <td>${fecha}</td>
					   <td>${formateadorMoneda.format(comprasPorFecha[fecha])}</td>
					 </tr>`;
		  }

		  html += `<tr style="font-weight:bold;background:#ffe0e0">
					 <td style="text-align:right">TOTAL COMPRAS</td>
					 <td>${formateadorMoneda.format(totalCompras)}</td>
				   </tr>
				   </table>`;
		}
		else {
		  html += `<p>No hay compras pendientes de cierre.</p>`;
		}
		
     //   html += `<h3 style=" text-align:right">💰 Total General: ${formateadorMoneda.format(totalGeneral)}</h3>`;
totalEfectivo2=resumenPorForma[1] + totalIngresos - totalEgresos - totalCompras;
html += `<h3 style=" text-align:right">
💰 Total General: ${formateadorMoneda.format(totalGeneral)} 
&nbsp;&nbsp;&nbsp;  💵 Efectivo: ${formateadorMoneda.format(totalEfectivo2)}
</h3>`;


        html += `<div class="confirmar"><button onclick="confirmarCierre()">✅ Confirmar y Grabar Cierre</button></div>`;

        resDiv.innerHTML = html;

      } catch (e) {
        console.error(e);
        msgDiv.innerHTML = `<p style='color:red'>Error: ${e.message}</p>`;
      }
    }

    // Confirmar cierre
	async function confirmarCierre() {
	  if (!datosCierre) return alert("Primero calcule el cierre.");
	  const user = firebase.auth().currentUser;
	  if (!user) return alert("No autenticado.");

	  // Mostrar mensaje de proceso
	  document.getElementById("mensaje").innerHTML = "⏳ Procesando cierre... por favor espere...";
	  
	  try {
		const {
		  idCierre,
		  ventas,
		  movimientos,
		  resumenPorTipo,
		  resumenPorForma,
		  compras,
		  totalIngresos,
		  totalEgresos,
		  totalCompras,
		  totalGeneral
		} = datosCierre;

		//const now = new Date();
		//const fechaString = now.toLocaleDateString("es-AR"); // dd/mm/yyyy
		const hoy = new Date();
		const yyyy = hoy.getFullYear();
		const mm = String(hoy.getMonth() + 1).padStart(2, '0');
		const dd = String(hoy.getDate()).padStart(2, '0');
		const fechaString = `${dd}/${mm}/${yyyy}`;

		// Hora actual completa (HH:MM:SS) – 24 horas
		let ahora = new Date();
		let hora = ahora.toLocaleTimeString("es-AR", {
		  hour: "2-digit",
		  minute: "2-digit",
		  second: "2-digit",
		  hour12: false
		});

		// 1️ Guardar cabecera
		await db.collection("CIERRES_CAB").add({
		  id_cierre: idCierre,
		  fecha_hora_grabacion: hora,
		  fecha: fechaString,
		  total_general: totalGeneral,
		  total_ingresos: totalIngresos,   // opcional pero útil
		  total_egresos: totalEgresos,     // opcional pero útil
		  total_compras: totalCompras,
		  usuario: user.email
		});

		// 2️ Guardar detalle (ventas , movimientos, compras)
		const batchDet = db.batch();

		// Detalle de ventas por forma de pago
		for (const tipo in resumenPorTipo) {
		  const t = resumenPorTipo[tipo];
		  for (const idfp in t.formasPago) {
			const detRef = db.collection("CIERRES_DET").doc();
			batchDet.set(detRef, {
			  id_cierre: idCierre,
			  tipo: "VENTA",
			  id_tipo_venta: parseInt(tipo),
			  id_fpago: parseInt(idfp),
			  total: t.formasPago[idfp]
			});
		  }
		}

		// ✅ Agregar detalle de ingresos
		const detIngRef = db.collection("CIERRES_DET").doc();
		batchDet.set(detIngRef, {
		  id_cierre: idCierre,
		  tipo: "INGRESOS",
		  total: totalIngresos
		});

		// ✅ Agregar detalle de egresos
		const detEgrRef = db.collection("CIERRES_DET").doc();
		batchDet.set(detEgrRef, {
		  id_cierre: idCierre,
		  tipo: "EGRESOS",
		  total: totalEgresos
		});
		
		// Detalle de compras
		const detCompRef = db.collection("CIERRES_DET").doc();
		batchDet.set(detCompRef, {
		  id_cierre: idCierre,
		  tipo: "COMPRAS",
		  total: totalCompras
		});
				

		await batchDet.commit();

		// 3️ Marcar ventas
		for (const v of ventas) {
		  await db.collection("VENTAS_CAB").doc(v.id).update({ id_cierre: idCierre });
		}

		// 4️ Marcar movimientos
		for (const m of movimientos) {
		  await db.collection("MOVIMIENTOS").doc(m.id).update({ id_cierre: idCierre });
		}

		// 5️ Marcar compras
		for (const c of compras) {
		  await db.collection("COMPRAS_CAB")
			  .doc(String(c.id_compra))
			  .update({ id_cierre: idCierre });
		}

		// 6 Cerrar apertura
		const aperSnap = await db.collection("APERTURAS").where("id_apertura", "==", idCierre).limit(1).get();
		if (!aperSnap.empty) {
		  await db.collection("APERTURAS").doc(aperSnap.docs[0].id).update({ estado: "CERRADA" });
		}

		// ✅ Mensaje final
		document.getElementById("mensaje").innerHTML =
		  `✅ Cierre grabado correctamente (ID ${idCierre}). Total: ${formateadorMoneda.format(totalGeneral)}`;

		document.getElementById("resultado").innerHTML = "";
		datosCierre = null;

	  } catch (e) {
		console.error(e);
		alert("Error al grabar cierre: " + e.message);
		document.getElementById("mensaje").innerHTML = "";
	  }
	}

  </script>

<script src="./js/controlCaja.js"></script>
<script>
  verificarCajaParaCierre("menu-caja.html");
</script>

<script src="js/medidor.js"></script>

</body>
</html>
