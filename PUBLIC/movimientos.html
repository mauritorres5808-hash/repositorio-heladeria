<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos de Efectivo</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }
    .contenedor {
      background-color: #fff;
      border-radius: 10px;
      max-width: 850px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    .contenedor-botones, .contenedor-botones2 {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
	input, select {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }	
input[type="number"] {
  width: 80px;
}

    button {
      margin-top: 15px;
      padding: 8px 16px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background-color: red; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
    }
    th, td {
      border: 1px solid #000;
      padding: 5px;
      text-align: center;
    }
    th { background-color: #f2f2f2; }
	
	.alert-modern{background:#e9f7ef;border-left:6px solid red;padding:10px;border-radius:6px;margin:10px 0}

  </style>
</head>

<body>
  <div class="contenedor">
    <h2>💰 Movimientos de Efectivo</h2>

    <div id="formMovimiento">
      <label>Fecha:</label>
      <input type="date" id="fecha">       
	  &nbsp;&nbsp;&nbsp;&nbsp;<button onclick="cargarMovimientos()">🔍 Buscar</button>
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>

<br><br>
      <label>Tipo:
      <select id="tipo">
        <option value="I">Ingreso</option>
        <option value="E">Egreso</option>
      </select>

      <span label>&nbsp;&nbsp;&nbsp;&nbsp;Importe:
      <input type="number" id="importe" step="0.01">
      <span label>&nbsp;&nbsp;&nbsp;&nbsp;Descripción:
      <input type="text" id="descripcion" size="40" >
	  </label>
	  </label>

	  </label>


    </div>
<div class="contenedor-botones2">
      <button style="text-align=center" onclick="guardarMovimiento()">💾 Guardar Movimiento</button>
</div>
    <hr>

    <h3>📋 Movimientos de efectivo del Día (sin cierre)</h3>
	<div id="mensajeTipo" class="alert-modern">los movimientos anulados no suman en el Total y no pueden ser editados.</div>
    <table id="tablaMovimientos">
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Tipo</th>
          <th>Descripción</th>
          <th>Importe</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div style="text-align:center; margin-top:20px;">
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>
    </div>
  </div>

  <script>

verificarSesion();

    // 🔹 Formatear moneda
    const formateador = new Intl.NumberFormat("es-AR", { style: "currency", currency: "ARS" });

    // Cargar fecha actual
    const hoy = new Date();
	const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fecha").value = fechaHoy;	
    //document.getElementById("fecha").value = hoy.toISOString().split("T")[0];

    // Guardar movimiento
    async function guardarMovimiento() {
      const fecha = document.getElementById("fecha").value;
	 
      const importe = parseFloat(document.getElementById("importe").value);
      const descripcion = document.getElementById("descripcion").value.trim();
      const tipo = document.getElementById("tipo").value;

      if (!fecha || !importe || !descripcion) {
        alert("Complete todos los campos.");
        return;
      }

      await db.collection("MOVIMIENTOS").add({
        fecha,
        importe,
        descripcion,
        tipo,
        anulado: "N",
        id_cierre: 0
      });

      alert("Movimiento guardado correctamente.");
      document.getElementById("descripcion").value = "";
      document.getElementById("importe").value = "";
      cargarMovimientos();
    }

    function normalizarFecha(fechaStr) {
      if (fechaStr.includes("-")) {
        const [año,mes,dia] = fechaStr.split("-");
        return `${dia.padStart(2, "0")}/${mes.padStart(2, "0")}/${año}`;
      }
      return fechaStr;
    }
	
    async function cargarMovimientos() {
      const fecha = document.getElementById("fecha").value;
      const tbody = document.querySelector("#tablaMovimientos tbody");
      tbody.innerHTML = "";

		let totalDia = 0;

      const snapshot = await db.collection("MOVIMIENTOS")
		.where("fecha", "==", fecha)
		.where("id_cierre","==",0)
		.get();
      snapshot.forEach(doc => {
        const m = doc.data();
        const fila = document.createElement("tr");
			if (m.anulado != 'S') {
				if (m.tipo === 'E') {
					totalDia += m.importe*-1;
					m.importe=m.importe*-1;
				} else {
					totalDia += m.importe;
				}
			}
fecha_normal=normalizarFecha(m.fecha);
        fila.innerHTML = `<td>${fecha_normal}</td>`
		  if (m.tipo == 'E') {
			fila.innerHTML += `<td style="background-color: #FF6467; color: white;">${m.tipo === 'E' ? 'Egreso' : 'Ingreso'}</td>`;
		  }else{
			fila.innerHTML += `<td>${m.tipo === 'E' ? 'Egreso' : 'Ingreso'}</td>`;
		  }
          fila.innerHTML += `<td>${m.descripcion}</td>`
		  if (m.tipo == 'E') {
			fila.innerHTML += `<td style="background-color: #FF6467; color: white;">${formateador.format(m.importe)}</td>`;
		  }else{
			fila.innerHTML += `<td>${formateador.format(m.importe)}</td>`;
		  }
          fila.innerHTML += `<td>${m.anulado === 'S' ? 'Anulado' : 'Activo'}</td>
          <td>${m.anulado === 'N' || m.tipo === 'S' ? `<button onclick="editarMovimiento('${doc.id}', Math.abs(${m.importe}), '${m.descripcion}', '${m.tipo}')">✏️ Editar</button>` : ''}</td>
        `;
        tbody.appendChild(fila);
      });
      tbody.innerHTML += `<td colspan="6"><h2 style="text-align:center;">Total de movimientos de efectivo del día ${formateador.format(totalDia)}</h2></td>`;
	  
    }

    async function editarMovimiento(id, importe, descripcion, tipo) {
      const nuevoImporte = prompt("Nuevo importe:", importe);
	  nuevaDescripcion = "";
	  if (tipo === 'S'){
			 nuevaDescripcion = descripcion; 
			} else {
			 nuevaDescripcion = prompt("Nueva descripción:", descripcion); 
			}

      if (nuevoImporte && nuevaDescripcion) {
        await db.collection("MOVIMIENTOS").doc(id).update({
          importe: parseFloat(Math.abs(nuevoImporte)),
          descripcion: nuevaDescripcion
        });
        alert("Movimiento actualizado correctamente.");
        cargarMovimientos();
      }
    }

    cargarMovimientos();
  </script>

<script src="js/medidor.js"></script>

</body>
</html>
