<html lang="es">
<head>
  <meta charset="utf-8" />

  <title>ABM - Funciones</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script src="js/auth.js"></script>  <!-- Aqui se verifica la autenticacion-->

  <style>
    body { font-family: Arial; background-color: #8AC0FF; margin:0; padding:20px; }
    .contenedor { background:#fff;border-radius:10px;max-width:950px;margin:0 auto;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.2); }
    h2 { text-align:center;background-color:#8AC0FF;border-radius:8px;padding:10px;margin-bottom:15px; }
    .filtros { display:flex; gap:12px; align-items:center; justify-content:center; margin-bottom:12px; flex-wrap:wrap; }
    label { font-weight:600; }
    select, input[type="text"], input[type="number"] { padding:6px; }
    table { width:70%; border-collapse:collapse; margin-top:12px; font-size:13px; }
    th, td { border:1px solid #0E0D0C; padding:8px; text-align:center; }
    th { background:#f2f2f2; }
    .boton-redondeado { padding:8px 16px; margin:5px; cursor:pointer; border:none; background-color:#007bff; color:white; border-radius:6px; }
    .boton-redondeado:disabled { background-color:#cccccc; color:#666666; cursor:not-allowed; }
  /*  .acciones { display:flex; gap:6px; justify-content:center; }*/
      button {
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .nota { font-size:13px; color:#333; text-align:center; margin-top:10px; }
	input, select {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>ABM de Funciones</h2>

    <div class="filtros">
      <label>Módulo:
        <select id="selectModulo"></select>
      </label>

      <label>Id Función: <input type="number" id="id_funcion" style="width:120px"></label>
      <label>Descripción: <input type="text" id="desc_funcion" style="width:280px"></label>

    <p class="nota">Seleccione un módulo para listar sus funciones. Use los botones para crear/editar/eliminar.</p>

	  <br>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="btnGuardar" class="boton-redondeado">💾 Guardar</button>
        <button id="btnNuevo" class="boton-redondeado">✳ Nuevo</button>
        <button id="btnEliminar" class="boton-redondeado">🗑️ Eliminar</button>
      </div>
    </div>
      <button onclick="window.location.href='menu-general.html'" class="boton-redondeado">&#8617; Volver</button>

    <div id="listaFuncionesCont">
      <table id="tablaFunciones" align="center">
        <thead>
          <tr><th>ID</th><th>Descripción</th><th>Módulo</th><th>Acciones</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>


    <div style="text-align:center;margin-top:14px;">
      <button onclick="window.location.href='menu-general.html'" class="boton-redondeado">&#8617; Volver</button>
    </div>
  </div>

  <script>

verificarSesion();


    // DOM elements
    const selectModulo = document.getElementById('selectModulo');
    const idInput = document.getElementById('id_funcion');
    const descInput = document.getElementById('desc_funcion');
    const btnGuardar = document.getElementById('btnGuardar');
    const btnNuevo = document.getElementById('btnNuevo');
    const btnEliminar = document.getElementById('btnEliminar');
    const tbody = document.querySelector('#tablaFunciones tbody');

    let funcionesCache = []; // cache actuales mostradas
    let modulosMap = {};     // id_modulo -> descripcion
    let seleccionadoDocId = null; // doc id de la función seleccionada (si editando)

    // auth guard
    firebase.auth().onAuthStateChanged(user => {
      if (!user) window.location.href = 'login.html';
      else init();
    });

    async function init() {
      await cargarModulos();
      await listarFunciones(); // lista todas o según módulo seleccionado
      selectModulo.addEventListener('change', listarFunciones);
      btnGuardar.addEventListener('click', guardarFuncion);
      btnNuevo.addEventListener('click', nuevoRegistro);
      btnEliminar.addEventListener('click', eliminarFuncion);
    }

    async function cargarModulos() {
      selectModulo.innerHTML = '<option value="">-- Todos los módulos --</option>';
      const snap = await db.collection('MODULOS').orderBy('descripcion').get();
      snap.forEach(d => {
        const data = d.data();
        modulosMap[data.id_modulo] = data.descripcion;
        selectModulo.innerHTML += `<option value="${data.id_modulo}">${data.descripcion}</option>`;
      });
    }

  /*  async function listarFunciones() {
      tbody.innerHTML = '<tr><td colspan="4">Cargando...</td></tr>';
      const idMod = selectModulo.value;
      let q = db.collection('FUNCIONES').orderBy('id_funcion');
      if (idMod) q = q.where('id_modulo', '==', parseInt(idMod));
      const snap = await q.get();
      funcionesCache = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
      renderTabla();
      clearForm();
    }
	*/
async function listarFunciones() {
  tbody.innerHTML = '<tr><td colspan="4">Cargando...</td></tr>';
  const idMod = selectModulo.value;

  let q = db.collection('FUNCIONES').orderBy('id_funcion');

  if (idMod) q = q.where('id_modulo', '==', parseInt(idMod));

  // Obtener usuario actual
  const idUsuarioActual = window.usuarioSistema?.id_usuario || 0;

  const snap = await q.get();

  funcionesCache = snap.docs
    .map(d => ({ docId: d.id, ...d.data() }))
    // FILTRO REAL AQUÍ
    .filter(f => idUsuarioActual === 1 ? true : f.id_funcion !== 51);

  renderTabla();
  clearForm();
}

    function renderTabla() {
      tbody.innerHTML = '';
      if (funcionesCache.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">No hay funciones para el módulo seleccionado.</td></tr>';
        return;
      }
      funcionesCache.forEach(f => {
        const tr = document.createElement('tr');
        const modDesc = modulosMap[f.id_modulo] || f.id_modulo || '';
        tr.innerHTML = `
          <td>${f.id_funcion}</td>
          <td style="text-align:left">${f.descripcion}</td>
          <td>${modDesc}</td>
          <td class="acciones">
            <button onclick="editar(${f.id_funcion}, '${escapeQuotes(f.descripcion)}', ${f.id_modulo}, '${f.docId}')">✏️ modificar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // helper to escape quotes for inline onclick
    function escapeQuotes(s) { return (s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

    window.editar = function(id_funcion, descripcion, id_modulo, docId) {
      idInput.value = id_funcion;
      descInput.value = descripcion;
      selectModulo.value = id_modulo;
      seleccionadoDocId = docId;
      idInput.disabled = true; // id no editable when editing
    };

    function nuevoRegistro() {
      clearForm();
      idInput.focus();
    }

    function clearForm() {
      idInput.value = '';
      descInput.value = '';
      seleccionadoDocId = null;
      idInput.disabled = false;
    }

    async function guardarFuncion() {
      const idf = parseInt(idInput.value);
      const desc = descInput.value.trim();
      const idMod = parseInt(selectModulo.value);

      if (!idf || !desc || !idMod) { alert('Complete ID, Descripción y seleccione Módulo.'); return; }

      try {
        // Buscamos si existe doc con id_funcion = idf
        const snap = await db.collection('FUNCIONES').where('id_funcion','==',idf).limit(1).get();
        if (!snap.empty && !seleccionadoDocId) {
          // existe y estamos creando -> error
          alert('Ya existe una función con ese id_funcion.');
          return;
        }

        if (seleccionadoDocId) {
          // actualizar doc existente
          await db.collection('FUNCIONES').doc(seleccionadoDocId).update({
            id_funcion: idf,
            descripcion: desc,
            id_modulo: idMod
          });
        } else {
          // crear nuevo doc
          await db.collection('FUNCIONES').add({
            id_funcion: idf,
            descripcion: desc,
            id_modulo: idMod
          });
        }
        alert('✅ Guardado correctamente.');
        await listarFunciones();
      } catch (e) {
        console.error(e);
        alert('Error al guardar: ' + e.message);
      }
    }

    async function eliminarFuncion() {
      if (!seleccionadoDocId) return alert('Seleccione una función para eliminar (hacer click en modificar).');
      if (!confirm('Confirma eliminar la función seleccionada?')) return;
      try {
        await db.collection('FUNCIONES').doc(seleccionadoDocId).delete();
        alert('🗑️ Función eliminada.');
        await listarFunciones();
      } catch (e) {
        console.error(e);
        alert('Error al eliminar: ' + e.message);
      }
    }
  </script>

<script src="js/medidor.js"></script>

</body>
</html>
