<body>
  <div class="contenedor">

  <h2 align=center style="background-color: #8AC0FF;">Consulta de Stock por Grupo de Productos</h2>
  <div id="resultado2"></div>

<div class="contenedor-botones" align=center >
  <label for="grupo">Seleccione un grupo:</label>
  <select id="grupo"></select>
</div>
  <br>

<div class="contenedor-botones2">
  <button class="boton-redondeado" onclick="buscarStock()">&#128269; Buscar</button>
  <button class="boton-redondeado" onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
</div>

  <div id="resultado"></div>
</div>

<script>

verificarSesion();

const formateadorMonedaArgentina = new Intl.NumberFormat('es-AR', {
  style: 'currency',
  currency: 'ARS',
});

// ======================================
// CARGAR GRUPOS
// ======================================
async function cargarGrupos() {

  try {

    const resp = await fetch('/api/grupos');

    const grupos = await resp.json();

    const select = document.getElementById("grupo");

    select.innerHTML = "";

    grupos.forEach(g => {

      // deshabilitado = 0 -> habilitado
      if (g.deshabilitado === 0) {

        const option = document.createElement("option");

        option.value = g.id_grupo;

        option.textContent =
          `${g.descripcion}`;

        select.appendChild(option);
      }
    });

  } catch (error) {

    console.error("Error cargando grupos:", error);

    alert("Error cargando grupos");
  }
}

// ======================================
// BUSCAR STOCK
// ======================================
async function buscarStock() {

  const grupoId =
    parseInt(document.getElementById("grupo").value);

  if (!grupoId) {

    alert("Seleccione un grupo v¨˘lido.");

    return;
  }

  const selectElement =
    document.getElementById("grupo");

  const textoSeleccionado =
    selectElement.options[
      selectElement.selectedIndex
    ].text;

  try {

    const resp =
      await fetch(`/api/productos/grupo/${grupoId}`);

    const productos = await resp.json();

    let html =
      `<h3 align="center">
        --- Stock del grupo (${textoSeleccionado}) ---
      </h3>`;

    html += `
      <div id="mensajeTipo" class="alert-modern">
        los productos en ROJO indican que estan por debajo del stock minimo.
      </div>
    `;

    if (!productos.length) {

      html += `
        <p align="center">
          No se encontraron productos en este grupo.
        </p>
      `;

    } else {

      html += `
        <table>
          <tr>
            <th>Codigo</th>
            <th>Nombre</th>
            <th>Stock</th>
            <th>Minimo</th>
            <th>Precio Vta</th>
            <th>Stock valorizado</th>
            <th>Deshabilitado</th>
          </tr>
      `;

      let totalValor = 0;

      productos.forEach(data => {

        const stock =
          Number(data.stock || 0);

        const stockMin =
          Number(data.stock_minimo || 0);

        const precio =
          Number(data.precio || 0);

        const valorizado =
          precio * stock;

        const bajoMinimo =
          stock < stockMin;

        totalValor += valorizado;

        html += `
          <tr>

            <td>
              ${data.id_producto}
            </td>

            <td
              ${bajoMinimo
                ? 'style="background-color:#FF6467;color:white;"'
                : ''}
            >
              ${data.descripcion}
            </td>

            <td>
              ${stock}
            </td>

            <td>
              ${stockMin}
            </td>

            <td>
              ${formateadorMonedaArgentina.format(precio)}
            </td>

            <td>
              ${formateadorMonedaArgentina.format(valorizado)}
            </td>

            <td>
              ${data.deshabilitado === 1 ? "SI" : "NO"}
            </td>

          </tr>
        `;
      });

      html += `
        <tr class="total-row">

          <td colspan="5">
            TOTAL GENERAL
          </td>

          <td>
            ${formateadorMonedaArgentina.format(totalValor)}
          </td>

          <td></td>

        </tr>
      `;

      html += "</table>";
    }

    document.getElementById("resultado").innerHTML = html;

  } catch (error) {

    console.error("Error buscando stock:", error);

    alert("Error buscando stock");
  }
}

// ======================================
// ONLOAD
// ======================================
window.onload = () => {

  cargarGrupos();
};

</script>


</body>
</html>
