<body>
  <div class="contenedor">
		<h2>Pedidos Online</h2>

		<header>
		  <select id="filterEstado">

			<option value="nuevo">Nuevos Pedidos</option>
			<option value="convertido">confirmados como Venta</option>
		  </select>

		  <input id="searchBox" type="search" placeholder="Buscar por nombre o teléfono">
		  <button onclick="cargar(true)">Buscar</button>
		  		<button class="boton-derecha" onclick="location.href='/menu-ventas.html'">&#8617; Volver</button>


		</header>

<script>

const API_BASE = 
  location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://whatsapp-backend-tp21.onrender.com";
	
verificarSesion();
  
//notificacion con sonido de pedido NUEVO
let pedidosNotificados = new Set();
let audioNotif = new Audio("notificacion2.mp3");


let sabores = [];
let formasPago = [];

let idPedidoActual = null;
let totalPedidoActual = 0;

// ---------------- Cargar sabores ----------------
async function cargarSabores(){
  sabores = await (await fetch(`${API_BASE}/api/sabores`)).json();
}
cargarSabores();

function saborDesc(id){
  const s = sabores.find(x => x.id_sabor == id);
  return s ? s.descripcion : id;
}

// ---------------- Cargar formas de pago ----------------
async function cargarFormasPago(){
  formasPago = await (await fetch(`${API_BASE}/api/fpago`)).json();
}
cargarFormasPago();

// ---------------- Cargar pedidos ----------------
async function cargar(){
  const estado = document.getElementById("filterEstado").value;
  const q = document.getElementById("searchBox").value.trim();

  let url = `${API_BASE}/api/pedidos_whatsapp`;
  const p = new URLSearchParams();
  if (estado) p.set("estado", estado);
  if (q) p.set("q", q);
  if (p.toString()) url += "?" + p.toString();

  try {
    const res = await fetch(url);
    const items = await res.json();
		// 🔔 detectar nuevos pedidos SOLO en estado "nuevo"
		if (estado === "nuevo") {
		  items.forEach(p => {
			if (!pedidosNotificados.has(p.id_pedido)) {
			  pedidosNotificados.add(p.id_pedido);
			  notificarPedido(p);
			}
		  });
		}

    renderList(items);
  } catch(e){
    console.error("Error cargando:", e);
  }
}


async function imprimirPedido2(idPedido){  // (envia a PDF)
  try {
    const res = await fetch(`${API_BASE}/api/pedidos_whatsapp/${idPedido}`);
    const p = await res.json();

    if (!p || !p.id_pedido){
      alert("No se pudo obtener el pedido");
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "mm", format: [58, 200] });

    let y = 5;

    doc.setFontSize(8);
    doc.text("PEDIDO", 0, y);

    y += 5;
    doc.setFontSize(7);
    doc.text(`Pedido #${p.id_pedido}`, 0, y);

    y += 4;
    doc.text(`${p.fecha} ${p.hora}`, 0, y);

    y += 4;
    doc.text(`Cliente: ${p.nombre}`, 0, y);

    y += 4;
    doc.text(`Tel: ${p.telefono}`, 0, y);

    y += 4;
    doc.text(`Dir: ${p.domicilio}`, 0, y);

    y += 5;
    doc.text("-----------------------------", 0, y);

    y += 4;

    let total = 0;

    (p.pedido_detalle || []).forEach((it, idx) => {
      doc.text(`${idx+1}) ${it.descripcion}`, 0, y);
      y += 3;

      doc.text(`$${it.precio}`, 0, y);
      y += 4;

      total += Number(it.precio || 0);

      if (it.sabores?.length){
        it.sabores.forEach(s => {
          doc.text(`- ${saborDesc(s)}`, 2, y);
          y += 3;
        });
      }

      y += 2;
    });

    doc.text("-----------------------------", 0, y);
    y += 4;

    doc.setFontSize(9);
    doc.text(`TOTAL: $${total}`, 0, y);

    doc.save(`Pedido_${p.id_pedido}.pdf`);

  } catch(err){
    console.error(err);
    alert("Error al imprimir pedido");
  }
}


// 🖨️ Imprimir ticket directo (SIN PDF - impresora directa)
async function imprimirPedido(idPedido){

//---------------
  try {
    const res = await fetch(`${API_BASE}/api/pedidos_whatsapp/${idPedido}`);
    const p = await res.json();

    if (!p || !p.id_pedido){
      alert("No se pudo obtener el pedido");
      return;
    }

  
  let contenido = `
    <html>
    <head>
      <title>Ticket Pedido</title>
      <style>
        body{font-family:monospace;font-size:12px;width:220px}
        .center{text-align:center}
        hr{border-top:1px dashed #000}
      </style>
    </head>
    <body>
      <div class="center"><b>PEDIDO #${p.id_pedido}</b></div>
      <hr>
	  Fecha: ${p.fecha} Hora: ${p.hora}<br> 
      Cliente: ${p.nombre}<br>
      Tel: ${p.telefono}<br>
      Dir: ${p.domicilio}<br>
      <hr>
  `;

  let total = 0;

  (p.pedido_detalle || []).forEach((it, i)=>{
    total += (it.precio || 0);
    contenido += `${i+1}) ${it.descripcion}<br>`;
    contenido += `$ ${it.precio}<br>`;
	if (it.sabores?.length){
        it.sabores.forEach(s => {
		contenido += `- ${saborDesc(s)}<br>`;
        });
      }
	  
  });

  contenido += `
      <hr>
      <b>TOTAL: $ ${total}</b>
      <hr>
      Gracias por su compra
    </body>
    </html>
  `;

  const win = window.open('', '', 'width=300,height=600');
  win.document.write(contenido);
  win.document.close();

  win.onload = function(){
    win.focus();
    win.print();   // 👈 abre impresora real
    win.close();
  };

  } catch(err){
    console.error(err);
    alert("Error al imprimir pedido");
  }
//----------------

}



// ---------------- Render lista ----------------
function renderList(items){
  const root = document.getElementById("lista");
  root.innerHTML = "";

  if (!items.length){
    root.innerHTML = "<div>No hay pedidos</div>";
    return;
  }

  items.forEach(p => {
    const el = document.createElement("div");
    el.className = "pedido";

    let totalPedido = 0;

    let html = `
      <div style="display:flex;justify-content:space-between">
        <div><b>Pedido #${p.id_pedido}</b> — ${p.nombre} • ${p.telefono}</div>
        <div class="meta">Fecha/Hora: ${p.fecha} ${p.hora}</div>
      </div>
    <div id="mensajeTipo" class="alert-modern" style="font-size:12px">Si el telefono del cliente no existe se dara de Alta al cliente</div>
	<div><b>Domicilio:</b> ${p.domicilio}</div>
      <div><b>Nota:</b> ${p.nota || "—"}</div>
      <br>
      <b>Detalle:</b><br>
    `;

    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS',   minimumFractionDigits: 0, maximumFractionDigits: 0 });

    (p.pedido_detalle || []).forEach((it, idx) => {
      const subtotal = (it.precio || 0);
      totalPedido += subtotal;

/*
      html += `<div class="unidad">
        <b>Unidad ${idx+1}: ${it.descripcion}</b><br>
        Precio: $${it.precio}<br>
        Subtotal unidad: <b>$${subtotal}</b><br>
      `;
*/
      html += `<div class="unidad">
        <b>Unidad ${idx+1}: ${it.descripcion}</b><br>
        Precio: ${formateadorMoneda.format(it.precio)}<br>
      `;

      if (it.sabores?.length){
        html += `<u>Sabores:</u><ul>`;
        it.sabores.forEach(s => html += `<li>${saborDesc(s)}</li>`);
        html += `</ul>`;
      }

      html += `</div>`;
    });


    html += `
      <div style="font-size:26px;font-weight:bold;margin-top:10px;">
        Total pedido: ${formateadorMoneda.format(totalPedido)}
      </div><br>`
    html += `<div class="acciones">`
	if (p.estado==="nuevo"){
		html += `    <button onclick="imprimirPedido(${p.id_pedido})">🖨️ Imprimir Pedido</button>`
		html += `    <button class="convertir" onclick="abrirConversion(${p.id_pedido}, ${totalPedido})">Confirmar Venta</button>`
		html += `    <button onclick="distancia('${p.domicilio}')">&#128663; Ver distancia</button>`
    }
	html += `
        <button class="eliminar"  onclick="eliminar(${p.id_pedido})">Eliminar Pedido</button>
		<button class="boton-derecha" onclick="location.href='/menu-ventas.html'">&#8617; Volver</button>
		   <hr>
      </div>`;

    el.innerHTML = html;
    root.appendChild(el);
  });
}

// ---------------- Abrir popup de conversión ----------------
function abrirConversion(id, total){
  idPedidoActual = id;
  totalPedidoActual = total;

  const fp1 = document.getElementById("fp1");
  const fp2 = document.getElementById("fp2");

  fp1.innerHTML = `<option value="0">-- seleccionar --</option>`;
  fp2.innerHTML = `<option value="0">0 - Ninguno</option>`;

  formasPago.forEach(fp => {
    const opt = `<option value="${fp.id_fpago}">${fp.id_fpago} - ${fp.descripcion}</option>`;
    fp1.innerHTML += opt;
    fp2.innerHTML += opt;
  });

  document.getElementById("totalShow").textContent = Number(total).toLocaleString("es-AR");
  document.getElementById("imp1").value = total;
  document.getElementById("imp2").value = 0;

  document.getElementById("modalPago").style.display = "flex";
}

function cerrarModalPago(){
	document.getElementById("resultado").innerHTML = ``;
  document.getElementById("modalPago").style.display = "none";
}

// ---------------- Confirmar conversión ----------------
async function confirmarConversion(){

  const fp1 = Number(document.getElementById("fp1").value);
  const fp2 = Number(document.getElementById("fp2").value);
  const imp1 = Number(document.getElementById("imp1").value);
  const imp2 = Number(document.getElementById("imp2").value);

  if ((imp1 + imp2) !== totalPedidoActual){
    alert("❌ La suma de los importes no coincide con el total ($" + totalPedidoActual + ")");
    return;
  }

  if (imp1 > 0 && fp1 === 0){
    alert("Debe seleccionar forma de pago 1");
    return;
  }

  if (imp2 > 0 && fp2 === 0){
    alert("Debe seleccionar forma de pago 2");
    return;
  }

  if (fp1 != 0 && imp1 <= 0){
    alert("Debe ingresar el importe para la forma de pago 1");
    return;
  }
  if (fp2 != 0 && imp2 <= 0){
    alert("Debe ingresar el importe para la forma de pago 2");
    return;
  }
 document.getElementById("resultado").innerHTML = `<p><b>Procesando, por favor espere...</b></p>`;
	
  const res = await fetch(`${API_BASE}/api/pedidos_whatsapp/${idPedidoActual}/convertir`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      f_pago1:fp1,
      f_pago2:fp2,
      importe_fp1:imp1,
      importe_fp2:imp2
    })
  });

  const j = await res.json();
  if (!j.ok){
	document.getElementById("resultado").innerHTML = ``;
    alert("Error: " + j.error);
    return;
  }

  document.getElementById("resultado").innerHTML = ``;
  alert("Pedido convertido. Venta #" + j.id_venta);
  cerrarModalPago();
  cargar();
}

// ---------------- Eliminar ----------------
async function eliminar(id){
  if (!confirm("Eliminar pedido #" + id + "?")) return;
  const res = await fetch(`${API_BASE}/api/pedidos_whatsapp/${id}`, { method:"DELETE" });
  const j = await res.json();
  if (j.ok) alert("Pedido eliminado");
  cargar();
}

// mostrar el mapa del domicilio del cliente
async function distancia(domicilioCliente) {

    const info = await obtenerDatosEmpresa();
    if (!info) {
        alert("No se pudo obtener el domicilio de la empresa");
        return;
    }

    const origen = info.domicilio;
    const destino = domicilioCliente;

    mostrarMapaDistancia(origen, destino);
}

async function obtenerDatosEmpresa() {
    try {
        const snap = await db.collection("EMPRESA").get();

        if (snap.empty) {
            console.warn("No se encontró documento en EMPRESA");
            return null;
        }

        const data = snap.docs[0].data();

        return {
            nombre: data.nombre_empresa,
            domicilio: data.domicilio
        };

    } catch (err) {
        console.error("Error obteniendo datos de EMPRESA:", err);
        return null;
    }
}


// ---------------- Inputs sincronizados ----------------
document.addEventListener("DOMContentLoaded", () => {

if (Notification.permission !== "granted") {
  Notification.requestPermission();
}

  const imp1 = document.getElementById("imp1");
  const imp2 = document.getElementById("imp2");

  imp1.addEventListener("input", () => {
    let v1 = Number(imp1.value);
    if (v1 < 0) v1 = 0;
    if (v1 > totalPedidoActual) v1 = totalPedidoActual;
    imp1.value = v1;
    imp2.value = totalPedidoActual - v1;
  });

  imp2.addEventListener("input", () => {
    let v2 = Number(imp2.value);
    if (v2 < 0) v2 = 0;
    if (v2 > totalPedidoActual) v2 = totalPedidoActual;
    imp2.value = v2;
    imp1.value = totalPedidoActual - v2;
  });
});

function notificarPedido(p) {

  // sonido
  try {
    audioNotif.currentTime = 0;
    audioNotif.play();
  } catch(e){}

  // notificación
  if (Notification.permission === "granted") {
    new Notification("🛎️ Nuevo pedido", {
      body: `${p.nombre} - ${p.domicilio}`,
    });
  }
}



// inicial
cargar();

setInterval(() => {
  cargar();
}, 5000); // cada 5 segundos

</script>
