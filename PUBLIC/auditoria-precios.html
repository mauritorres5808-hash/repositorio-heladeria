<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">

<script src="JS/auth.js"></script>

<title>Auditoría de Cambios de Precios</title>

<style>
    body { font-family: Arial; background:#8AC0FF; padding:20px; margin:0; }
    .contenedor {
        background:white;
        padding:20px;
        max-width:900px;
        margin:auto;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.3);
    }
    h2 { text-align:center; background:#8AC0FF; padding:10px; border-radius:8px; }
    table {
        width:100%; border-collapse:collapse; margin-top:20px;
        font-size:15px;
    }
    th, td {
        border:1px solid #333; padding:8px; text-align:center;
    }
    th { background:#f2f2f2; }
    button {
        padding:8px 14px; background:#007bff; color:white;
        border:none; border-radius:6px; cursor:pointer; font-weight:bold;
    }
    button:hover { background:red; }
</style>

</head>
<body>

<div class="contenedor">
    <h2>📋 Auditoría de Cambios de Precios</h2>

    <table id="tablaCambios">
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Usuario</th>
                <th>Grupo</th>
                <th>Cambio</th>
            </tr>
        </thead>
        <tbody id="tbodyCambios"></tbody>
    </table>

    <div style="text-align:center; margin-top:20px;">
        <button onclick="location.href='menu-general.html'">&#8617; Volver</button>
    </div>
</div>


<script>

verificarSesion();

// =====================================
// CARGAR AUDITORIA
// =====================================
async function cargarAuditoria() {

    const tbody =
        document.getElementById("tbodyCambios");

    tbody.innerHTML =
        "<tr><td colspan='5'>Cargando...</td></tr>";

    try {

        const resp =
            await fetch('/api/auditoria-precios');

        const data =
            await resp.json();

        if (!data.ok) {

            tbody.innerHTML = `
                <tr>
                    <td colspan='5'>
                        Error cargando auditoría
                    </td>
                </tr>
            `;

            return;
        }

        tbody.innerHTML = "";

        if (data.auditoria.length === 0) {

            tbody.innerHTML = `
                <tr>
                    <td colspan='5'>
                        No hay registros.
                    </td>
                </tr>
            `;

            return;
        }

        data.auditoria.forEach(d => {

            const tr =
                document.createElement("tr");

            let cambioTexto = "";

            // ============================
            // TEXTO CAMBIO
            // ============================
            if (d.tipo_cambio === "INC") {

                cambioTexto =
                    `Incremento %: ${d.valor_cambio}`;
            }

            else if (d.tipo_cambio === "DEC") {

                cambioTexto =
                    `Decremento %: ${d.valor_cambio}`;
            }

            else if (d.tipo_cambio === "PORC") {

                cambioTexto =
                    `Valor fijo: ${Number(d.valor_cambio).toFixed(2)}`;
            }

            else {

                cambioTexto =
                    `${d.tipo_cambio}: ${d.valor_cambio}`;
            }

            tr.innerHTML = `
                <td>${formatearFecha(d.fecha)}</td>

                <td>${d.hora}</td>

                <td>${d.usuario}</td>

                <td>${d.grupo}</td>

                <td>${cambioTexto}</td>
            `;

            tbody.appendChild(tr);
        });

    } catch (error) {

        console.error(error);

        tbody.innerHTML = `
            <tr>
                <td colspan='5'>
                    Error cargando auditoría
                </td>
            </tr>
        `;
    }
}

function formatearFecha(fechaMYSQL) {

    if (!fechaMYSQL) return '';

    const fecha =
        new Date(fechaMYSQL);

    const dia =
        String(fecha.getDate()).padStart(2, '0');

    const mes =
        String(fecha.getMonth() + 1).padStart(2, '0');

    const anio =
        fecha.getFullYear();

    return `${dia}/${mes}/${anio}`;
}


cargarAuditoria();

</script>


</body>
</html>
