<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ventas por Grupo</title>

<script src="JS/auth.js"></script>  <!-- Aquí se verifica la autenticacion-->

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body{
		font-family:Arial;
		background:#f3f3f3;
		margin:0;
		padding:20px;
		background-color: #8AC0FF;
	}
 
/* fondo contenedor blanco */
 .contenedor{max-width:1050px;margin:auto;background:#fff;padding:20px;border-radius:8px}


    h2 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }
	
 	label { font-weight: bold; margin-right: 10px; }


    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
        margin-left: auto;
        margin-right: auto;
		font-size: 14px;
    }
    th,td {
      padding: 8px;
      border: 1px solid #0E0D0C;
      text-align: center;
    }	
    th {
      background-color: #f2f2f2;
    }
    .total {
      font-weight: bold;
      background-color: #e8f5e9;
    }
    .resumen {
      margin-top: 25px;
      border-top: 12px solid #333;
      padding-top: 10px;
    }

.contenedor-botones {
  display: flex; /* Convierte el div en un contenedor flexible */
  justify-content: center;
  gap: 10px; /* Establece un espacio de xx píxeles entre los elementos */
}
.contenedor-botones2 {
  display: flex; /* Convierte el div en un contenedor flexible */
  justify-content: center;
  gap: 30px; /* Establece un espacio de xx píxeles entre los elementos */
}
.boton-redondeado {
  padding: 10px 20px; /* Ajusta el padding a tu gusto */

}

    button {
      padding: 8px 14px;
      background: #007bff;
      color: #fff;

      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: red;
      color: white;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr.total {
      background-color: #e6f0ff;
      font-weight: bold;
    }

    .filtros {
      text-align: center;
      margin-bottom: 20px;
    }
    .filtros input {
      margin: 0 10px;
      padding: 5px;
    }
    #mensajeProcesando {
      text-align: center;
      color: #007bff;
      font-weight: bold;
      margin-top: 10px;
      display: none;
    }
    #graficoContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      width: 100%;
    }
	#graficoTorta {
	  max-width: 300px;
	  max-height: 300px;
	}
	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;
    }
	
  </style>
</head>
<body>
  <div class="contenedor">

  <h2 align=center style="background-color: #8AC0FF;">Ventas por Grupo</h2>

    <div class="filtros">
      <label>Desde: <input type="date" id="fechaDesde"></label>
      <label>Hasta: <input type="date" id="fechaHasta"></label>
	<label for="chk_cierre">solo Ventas sin cierre</label>
	<input  type="checkbox" checked=true id="chk_cierre">
	  <div class="contenedor-botones2">
			<button class="boton-redondeado" onclick="calcularTotales()">&#128269; Buscar</button>
			<button  onclick="window.location.href='menu-ventas.html'">&#8617; Volver</button>
	  </div>
    </div>

    <div id="mensajeProcesando">🔄 Procesando, por favor espere...</div>

    <table id="tablaTotales">
      <thead>
        <tr>
          <th>Descripción Grupo</th>
          <th>Cantidad Vendida</th>
          <th>Total ($)</th>
          <th>% Cantidad</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="graficoContainer">
      <canvas id="graficoTorta" width="400" height="400"></canvas>
    </div>
  </div>

  <script>

verificarSesion();

    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

    // 🔸 Fecha por defecto (hoy)
    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, "0");
    const dd = String(hoy.getDate()).padStart(2, "0");
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaDesde").value = fechaHoy;
    document.getElementById("fechaHasta").value = fechaHoy;

    // 🔸 Función auxiliar: convierte "DD/MM/YYYY" → "YYYY-MM-DD"
    function convertirFecha(fechaStr) {
      const [dia, mes, año] = fechaStr.split("/");
	          return `${año}-${mes.padStart(2, "0")}-${dia.padStart(2, "0")}`;
      //return `${año}-${mes}-${dia}`;
    }

    let grafico = null; // Para poder actualizar el gráfico

async function calcularTotales() {

  const mensaje = document.getElementById("mensajeProcesando");
  mensaje.style.display = "block";
  mensaje.textContent = "🔄 Procesando, por favor espere...";

  const fechaDesde = document.getElementById("fechaDesde").value;
  const fechaHasta = document.getElementById("fechaHasta").value;

  const sin_cierre = document.getElementById("chk_cierre").checked ? 1 : 0;

  try {

    // ============================================
    // OBTENER DATOS DESDE MYSQL
    // ============================================
    const resp = await fetch(
      `/api/reportes/totales-grupo?desde=${fechaDesde}&hasta=${fechaHasta}&sin_cierre=${sin_cierre}`
    );

    const datos = await resp.json();

    if (!datos.ok) {
      throw new Error(datos.mensaje || "Error obteniendo datos");
    }

    const totales = datos.totales;

    if (totales.length === 0) {
      mensaje.style.display = "none";
      alert("No se encontraron ventas en ese rango.");
      return;
    }

    // ============================================
    // TOTALES GENERALES
    // ============================================
    let totalGeneralCantidad = 0;
    let totalGeneralImporte = 0;

    totales.forEach(g => {
      totalGeneralCantidad += Number(g.cantidad || 0);
      totalGeneralImporte += Number(g.total || 0);
    });

    // ============================================
    // ARMAR TABLA
    // ============================================
    const tbody = document.querySelector("#tablaTotales tbody");
    tbody.innerHTML = "";

    const labels = [];
    const data = [];

    totales.forEach(g => {

      const cantidad = Number(g.cantidad || 0);
      const total = Number(g.total || 0);

      const porcentajeCant =
        totalGeneralCantidad > 0
          ? ((cantidad / totalGeneralCantidad) * 100).toFixed(2)
          : 0;

      labels.push(g.descripcion);
      data.push(cantidad);

      tbody.innerHTML += `
        <tr>
          <td>${g.descripcion}</td>
          <td>${cantidad}</td>
          <td>${formateadorMoneda.format(total)}</td>
          <td>${porcentajeCant}%</td>
        </tr>
      `;
    });

    // ============================================
    // TOTAL GENERAL
    // ============================================
    tbody.innerHTML += `
      <tr class="total">
        <td>TOTAL GENERAL</td>
        <td>${totalGeneralCantidad}</td>
        <td>${formateadorMoneda.format(totalGeneralImporte)}</td>
        <td>100%</td>
      </tr>
    `;

    // ============================================
    // GRAFICO
    // ============================================
    const ctx = document.getElementById("graficoTorta").getContext("2d");

    if (grafico) {
      grafico.destroy();
    }

    grafico = new Chart(ctx, {
      type: "pie",
      data: {
        labels: labels,
        datasets: [{
          label: "Cantidad vendida",
          data: data,
          backgroundColor: [
            "#007bff",
            "#28a745",
            "#ffc107",
            "#dc3545",
            "#17a2b8",
            "#6f42c1",
            "#fd7e14",
            "#20c997"
          ]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            position: "bottom"
          },
          title: {
            display: true,
            text: "Distribución de cantidad de Ventas por Grupo (%)"
          }
        }
      }
    });

  } catch (error) {
    console.error("Error al calcular totales:", error);
    alert("Ocurrió un error al procesar los datos.");
  } finally {
    mensaje.style.display = "none";
  }
}


  </script>


</body>
</html>
