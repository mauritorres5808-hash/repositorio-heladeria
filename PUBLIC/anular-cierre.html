<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anular último cierre</title>

<script src="JS/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->

  <style>
    body { font-family: Arial; background-color: #8AC0FF; margin:0; padding:20px; }
    .contenedor { background:#fff;border-radius:10px;max-width:800px;margin:0 auto;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.2); }
    h2 { text-align:center;background-color:#8AC0FF;border-radius:8px;padding:10px;margin-bottom:25px; }
    button { padding:12px 20px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer; 	   font-size: 15px; }
    button:hover { background:red;color:white; }
    #mensaje { margin-top:20px;font-weight:bold;font-size:16px;text-align:center; }
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>Anular último cierre</h2>

    <div id="infoUltimo"></div>

    <div style="text-align:center;margin-top:12px;">
      <button id="btnAnular">&#10060; Anular último cierre</button>
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>
    </div>

    <div id="mensaje"></div>
  </div>

<script>

verificarSesion();
    cargarUltimoCierre();

    const formateadorMoneda = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS' });

  let ultimoCierreDoc = null;
  let userEmail = "";

	function fechaToDMY(f) {

	  if (!f) return "";

	  if (typeof f === "object") {
		f = f.toISOString().split("T")[0];
	  }

	  if (String(f).includes("T")) {
		f = String(f).split("T")[0];
	  }

	  const [yyyy, mm, dd] = String(f).split("-");

	  return `${dd}/${mm}/${yyyy}`;
	}

	// cargar el ultimo cierre
	async function cargarUltimoCierre() {

	  const response = await fetch("/api/cierres/ultimo");

	  const cab = await response.json();

	  if (!cab) {

		document.getElementById("infoUltimo").innerHTML =
		  "<p>No hay cierres registrados.</p>";

		document.getElementById("btnAnular").disabled = true;

		return;
	  }

	  ultimoCierreDoc = cab;

	  document.getElementById("infoUltimo").innerHTML = `
		<p>
		  <b>ID cierre:</b> ${cab.id_cierre}
		  &nbsp;
		  <b>Fecha:</b> ${fechaToDMY(cab.fecha)}
		  &nbsp;
		  <b>Hora:</b> ${cab.hora}
		  &nbsp;
		  <b>Usuario:</b> ${cab.usuario || ""}
		  &nbsp;
		  <b>Total:</b> ${formateadorMoneda.format(parseFloat(cab.total_general || 0))}
		</p>
	  `;
	}

	//boton anular
	document.getElementById("btnAnular").onclick = async function () {

		if (!ultimoCierreDoc)
			return;

		const confirmar = confirm("¿Confirma anular el último cierre?");

		if (!confirmar)
			return;

		document.getElementById("mensaje").innerHTML = "⏳ Procesando... por favor espere...";

		document.getElementById("btnAnular").disabled = true;

		try {

			const idC = ultimoCierreDoc.id_cierre;

			const usuario =
				localStorage.getItem("usuarioEmail") || "";

			const response = await fetch(`/api/cierres/anular/${idC}`, {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify({
					usuario
				})
			});

			const data = await response.json();

			if (!data.ok) {
				alert(data.mensaje || "Error anulando cierre");
				document.getElementById("btnAnular").disabled = false;
				return;
			}

			document.getElementById("mensaje").innerHTML = "✅ Cierre anulado correctamente.";
			document.getElementById("infoUltimo").innerHTML = "";

		} catch (e) {
			console.error(e);
			alert("Error al anular cierre");

			document.getElementById("btnAnular").disabled = false;
			document.getElementById("mensaje").innerHTML = "";
		}
	};

</script>


</body>
</html>
