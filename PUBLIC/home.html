<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Heladería</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f7f8fb;
}

/* HEADER */
header {
  position: sticky;
  top:0;
  background:white;
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:12px 20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  z-index:1000;
}

.logo {
  font-size:20px;
  font-weight:bold;
}

.btn-pedido {
  background:#ff4d4d;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  background:linear-gradient(135deg,#1591EA,#fad0c4);
  color:white;
  padding:40px 20px;
  text-align:center;
}

.hero h1 {
  margin:0;
  font-size:28px;
}

/* PROMOS */
.promos {
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.promo {
  background:#fff3cd;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* PRODUCTOS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: visible;
  background: white;
  transition: 0.2s;
}

.card {
  height: 240px;
  display: flex;
  flex-direction: column;
}

.card img {
  width: 100%;
  height: 140px;
  object-fit: contain;  /* 🔥 NO se corta */
  object-position: center;
}


.card-body {
  flex: 1;
  padding: 8px;
}

.card:hover img {
  transform: scale(1.50);
}


.precio {
  color: green;
  font-weight: bold;
}

/* SECCIONES */
.seccion-grupo {
  padding: 10px;
}

/* TABS (estilo PedidosYa) */
.tabs {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  background: #fff;
  padding: 10px;
  border-top: 1px solid #ddd;
  z-index: 1000;
}

.tab {
  padding: 10px 16px;
  border-radius: 20px;
  background: #eee;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
}

.tab.active {
  background: #007bff;
  color: #fff;
  font-weight: bold;
}

/* BOTON FLOTANTE */
.flotante {
  position:fixed;
  bottom:70px;
  right:20px;
  background:#2ecc71;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.img-wrapper {
  position: relative;
}
  
 /* background: rgba(0,0,0,0.25); */
  /* color: #fff; 
  color: #0a0a0a; */
  color: black; 
  
  padding: 8px 10px;
  border-radius: 8px;

font-weight:bold;
  font-size: 15px;
  max-width: 220px;     /* 🔥 clave para texto largo */
  width: max-content;

  white-space: normal;  /* 🔥 permite múltiples líneas */
  text-align: left;

  opacity: 0;
  pointer-events: none;
  transition: 0.2s;
  z-index: 10;
}

.img-wrapper:active .tooltip {
  opacity: 1;
}
.img-wrapper:hover .tooltip {
  opacity: 1;
}

.modal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  animation: aparecer 0.2s ease;
    position: relative;
  overflow: visible;  
}

.modal-box img {
  width: 100%;
  height: 180px;
  object-fit: contain;
}

.modal-box h3 {
  margin: 10px 0;
}

.modal-box p {
  font-size: 14px;
  color: #444;
  position: relative;
}

.cerrar {
  position: absolute;
  top: 10px;
  right: 10px;

  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 50%;

  width: 32px;
  height: 32px;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 16px;
  cursor: pointer;

  z-index: 9999;   /* 🔥 clave */
}

@keyframes aparecer {
  from { transform: scale(0.9); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

</style>
</head>

<body>

<div id="modalProducto" class="modal">
  <div class="modal-box">

    <span class="cerrar" onclick="cerrarModal()">✖</span>

    <img id="modalImg" src="" />

    <h3 id="modalTitulo"></h3>

    <p id="modalCantidad"></p>

    <p id="modalContenido"></p>

    <div id="modalPrecio" class="precio"></div>

  </div>
</div>

<header>
  <div class="logo">🍦 Mi Heladería</div>
  <a href="https://donado-2.web.app/pedidos-online.html" class="btn-pedido">Hacer pedido</a>
</header>

<div class="hero">
  <h1>El mejor helado de la zona 😍</h1>
  <p>Elegí tus sabores favoritos y pedí online</p>
</div>

<div class="promos">
  <h2>🔥 Promociones</h2>
  <div class="promo">2kg al precio de 1.5kg</div>
  <div class="promo">Envío gratis en tu primera compra</div>
</div>

<!-- CONTENEDOR PRODUCTOS -->
<div id="contenedorProductos"></div>

<!-- BOTON PEDIDO -->
<a href="https://donado-2.web.app/pedidos-online.html" class="flotante">🛒 Pedir</a>

<!-- TABS -->
<div id="tabsCategorias" class="tabs"></div>

<script>
const API_BASE =
  location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://whatsapp-backend-tp21.onrender.com";

let productos = [];
let grupos = [];

// ===================== CARGA =====================
async function cargarProductos() {

  const [resProd, resGrupos] = await Promise.all([
    fetch(`${API_BASE}/api/productos`),
    fetch(`${API_BASE}/api/grupos`)
  ]);

  productos = await resProd.json();
  grupos = await resGrupos.json();

  grupos.sort((a,b) => a.id_grupo - b.id_grupo);

  renderUI();
}

// ===================== RENDER =====================
function renderUI() {

  const contTabs = document.getElementById("tabsCategorias");
  const contProd = document.getElementById("contenedorProductos");

  contTabs.innerHTML = "";
  contProd.innerHTML = "";

  // 🔥 FILTRAR GRUPOS
  const gruposVisibles = grupos.filter(g =>
    g.publica === "S" && g.deshabilitado !== "S"
  );

  gruposVisibles.forEach(g => {

    // 🔥 FILTRAR PRODUCTOS
    const lista = productos.filter(p =>
      p.id_grupo == g.id_grupo &&
      p.publica === "S" &&
      p.deshabilitado !== "S"
    );

    if (lista.length === 0) return;

    // ================= TAB =================
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = g.descripcion;
    tab.dataset.id = g.id_grupo;

    tab.onclick = () => {
      document.getElementById("grupo_" + g.id_grupo)
        .scrollIntoView({ behavior: "smooth" });
      activarTab(g.id_grupo);
    };

    contTabs.appendChild(tab);

    // ================= SECCION =================
    const seccion = document.createElement("div");
    seccion.id = "grupo_" + g.id_grupo;
    seccion.className = "seccion-grupo";

    seccion.innerHTML = `<h2>${g.descripcion}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    lista.forEach(p => {

      const card = document.createElement("div");
      card.className = "card";
      card.onclick = () => abrirModal(p);


const stock = Number(p.stock) || 0;
const sinStock = stock <= 0;

card.innerHTML = `
  <div class="img-wrapper">
    <img src="${p.imagen || 'img/no-image.jpg'}"
         onerror="this.src='img/no-image.jpg'">
  </div>

  <div class="card-body">
    <div><b>${p.descripcion}</b></div>
    <div class="precio">$${p.precio}</div>

    ${
      p.publica_s === "S" && !sinStock
        ? `<div style="font-size:12px; color:#555;">
             ${stock} disponibles
           </div>`
        : ""
    }

    ${
      sinStock
        ? `<div style="color:red; font-size:12px; font-weight:bold;">
             SIN STOCK
           </div>`
        : ""
    }

  </div>
`;

      grid.appendChild(card);
    });

    seccion.appendChild(grid);
    contProd.appendChild(seccion);
  });

  if (gruposVisibles.length > 0)
    activarTab(gruposVisibles[0].id_grupo);
}
// ===================== fin RENDER =====================

function abrirModal(p) {
  document.getElementById("modalProducto").style.display = "flex";

  document.getElementById("modalImg").src = p.imagen || "img/no-image.jpg";
  document.getElementById("modalTitulo").innerText = p.descripcion;

const sinStock = Number(p.stock) <= 0;

  if (p.max_sabores > 0) { 
	document.getElementById("modalCantidad").innerText = "Cantidad maxima de sabores: " + (p.max_sabores || "");
  } else {
	document.getElementById("modalCantidad").innerText = "";
	}
  
	// 🔥 STOCK
  if (p.publica_s === "S") {
  if (sinStock) {
    document.getElementById("modalContenido").innerHTML =
  `<div style="color:red; font-size:12px; font-weight:bold;">
           SIN STOCK
         </div>`;
  } else {
    document.getElementById("modalContenido").innerHTML =
      `<br><b>stock: ${p.stock || 0} disponibles</b><br><br>`;
	}
  }

  document.getElementById("modalContenido").innerHTML =
    (p.contenido || "").replace(/\n/g, "<br>");

  document.getElementById("modalPrecio").innerText = "$" + p.precio;

}

function cerrarModal() {
  document.getElementById("modalProducto").style.display = "none";
}

window.onclick = function(e) {
  const modal = document.getElementById("modalProducto");
  if (e.target === modal) {
    cerrarModal();
  }
};

// ===================== TAB ACTIVA =====================
function activarTab(idGrupo) {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.id == idGrupo);
  });
}

// ===================== SCROLL AUTO =====================
window.addEventListener("scroll", () => {
  let actual = null;

  document.querySelectorAll(".seccion-grupo").forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= 120) {
      actual = sec.id.replace("grupo_", "");
    }
  });

  if (actual) activarTab(actual);
});

// ===================== INIT =====================
cargarProductos();
</script>

</body>
</html>
