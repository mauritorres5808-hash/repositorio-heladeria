<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Apertura de Caja</title>

<script src="JS/auth.js"></script>  <!-- Aquí se verifica la autenticacion-->

  <style>
    body{
      font-family: Arial;
      background:#f3f3f3;
      margin:0;
      padding:20px;
      background-color: #8AC0FF;
    }
    .contenedor{max-width:820px;margin:auto;background:#fff;padding:20px;border-radius:8px}
    h2 {text-align:center;background-color:#8AC0FF;padding:10px;border-radius:8px;}
    label {display:block;margin-top:10px;}
	input, select {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }	

    th,td{border:1px solid #ccc;padding:8px;text-align:center}
    th{background:#BDC2CB;}

	    button { padding:8px 16px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer }
    button:hover { background:red;color:white; }

    .info {margin-top:15px;padding:10px;background:#e9f7ef;border-radius:6px;}
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>Apertura de Caja</h2>

  <div style="text-align:center; font-size:18px;">
    👤 Usuario: <b><span id="userLabel"></span></b>
  </div>
  
    <label><b>Importe caja inicial:</b>
      <input type="number" id="importeInicial" min="0" value="0" step="0.01">
    </label>

    <label><b>Concepto:</b> "Saldo inicial de caja"
   <!--   <input type="text" id="observaciones" value="Saldo inicial de caja" placeholder="Opcional">  -->
    </label>
<br>
    <div style="margin-top:12px;">
      <button id="btnApertura">&#9989; Abrir Caja</button>
      <button onclick="window.location.href='menu-caja.html'">&#8617; Volver</button>
    </div>

    <div id="mensaje" class="info" style="display:none;"></div>
<br>

    <h3 style="margin-top:18px;">Aperturas recientes</h3>
    <div id="listaAperturas"></div>
  </div>

<script>

verificarSesion();

const mensajeDiv = document.getElementById("mensaje");

document.getElementById("userLabel").textContent = localStorage.getItem("usuarioNombre");

cargarAperturas();


// ======================================================
// ABRIR CAJA
// ======================================================

document.getElementById("btnApertura").onclick = async () => {

    const importe =
        parseFloat(document.getElementById("importeInicial").value) || 0;

    const obs = "Saldo inicial de caja";

    try {

	  const cajaAbierta = await verificarCajaYaAbierta("menu-caja.html");
		if (cajaAbierta) {
			return;
			}

        const usuario = localStorage.getItem("usuarioEmail") || "";

		const ahora = new Date();
		const fechaSQL = ahora.getFullYear() + "-" + String(ahora.getMonth() + 1).padStart(2, "0") + "-" + String(ahora.getDate()).padStart(2, "0"); 

        const fechaHoraSQL =
            String(ahora.getHours()).padStart(2, "0") + ":" +
            String(ahora.getMinutes()).padStart(2, "0") + ":" +
            String(ahora.getSeconds()).padStart(2, "0");

        // ======================================================
        // INSERTAR APERTURA
        // ======================================================
        const responseApertura = await fetch("/api/aperturas", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                hora: fechaHoraSQL,
                fecha: fechaSQL,
                importe_inicial: importe,
                observaciones: obs,
                usuario: usuario,
                estado: "ABIERTA"
            })
        });

        const dataApertura = await responseApertura.json();

        if (!dataApertura.ok) {
            throw new Error(dataApertura.mensaje);
        }

        // ======================================================
        // INSERTAR MOVIMIENTO
        // ======================================================
        await fetch("/api/movimientos", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                hora: fechaHoraSQL,
                fecha: fechaSQL,
                importe: importe,
                descripcion: obs,
                tipo: "I",
                anulado: 0,
                id_cierre: 0
            })
        });

        mensajeDiv.style.display = "block";

        mensajeDiv.innerHTML = `✅ Apertura creada (ID ${dataApertura.id_apertura}) por ${usuario}.`;

        cargarAperturas();

    } catch (e) {
        console.error(e);
        alert("Error al crear apertura: " + e.message);
    }
};


// ======================================================
// CARGAR APERTURAS
// ======================================================
async function cargarAperturas() {

    try {
        const response = await fetch("/api/aperturas");
        const aperturas = await response.json();

        let html = `
            <table style='width:100%;border-collapse:collapse'>
                <tr style='background:#f2f2f2'>
                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Usuario</th>
                    <th>Importe</th>
                    <th>Estado</th>
                </tr>
        `;

        aperturas.forEach(d => {

            html += `
                <tr>
                    <td style="text-align: center;">${d.id_apertura}</td>
                    <td style="text-align: center;">${convertirFechaOK(d.fecha) || ""}</td>
                    <td style="text-align: center;">${d.hora || ""}</td>
                    <td style="text-align: center;">${d.usuario || ""}</td>
                    <td style="text-align: center;">${parseFloat(d.importe_inicial || 0).toFixed(2)}</td>
					${d.estado == 'ABIERTA' ? 
						`<td style="text-align: center; background:yellow; color:red;font-weight:bold;">${d.estado || ""}</td>`
					: 
						`<td style="text-align: center;">${d.estado || ""}</td>`
					}
                </tr>`;
        });

        html += "</table>";

        document.getElementById("listaAperturas").innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("Error cargando aperturas");
    }
}

// Convertir yyyy-mm-dd → dd/mm/yyyy
function convertirFechaOK(f) {
  if (!f) return "";
  // Si viene como objeto Date
  if (typeof f === "object") {
    f = f.toISOString().split("T")[0];
  }
  // Si viene como string ISO
  if (String(f).includes("T")) {
    f = String(f).split("T")[0];
  }
  const [yyyy, mm, dd] = String(f).split("-");
  return `${dd}/${mm}/${yyyy}`;
}

</script>
<script src="./JS/controlCaja.js"></script>

</body>
</html>
