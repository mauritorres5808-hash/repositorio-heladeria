<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Login</title>
	
	<style>  

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin-top: 50px;

    background:
    linear-gradient(
        135deg,
        #6DB7FF,
        #B8E6FE
    );

    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    min-height: 100vh;
}


        #logo {
            /* position: absolute;*/ /* Fija la posición */
            left: 120px; /* Margen izquierdo */
            top: 20px; /* Margen superior */
            width: 250px; /* Tamaño pequeño */
            height: auto; /* Mantiene proporciones */
            z-index: 1; /* Por encima de otros elementos si es necesario */
            border-radius: 10px; /* Opcional: bordes redondeados */
            box-shadow: 0 12px 15px rgba(0,0,0,0.2); /* Opcional: sombra para resaltar */
        }  

    .contenedor { background:#FEF5E7; border-radius:10px;max-width:300px;
					margin:0 auto;padding:25px;box-shadow:0 0 10px rgba(0,0,0,0.2); }

.boton-redondeado {
  padding: 10px 20px; /* Ajusta el padding a tu gusto */
  background-color: #007bff; /* Color de fondo */
  color: white; /* Color del texto */
  border: none; /* Opcional: elimina el borde predeterminado */
  border-radius: 8px; /* Bordes redondeados */
  cursor: pointer; /* Cambia el cursor al pasar por encima */
}
		
.boton-redondeado2 {
  padding: 10px 20px; /* Ajusta el padding a tu gusto */
  background-color: #A6A09B; /* Color de fondo */
  color: white; /* Color del texto */
  border: none; /* Opcional: elimina el borde predeterminado */
  border-radius: 8px; /* Bordes redondeados */
  cursor: pointer; /* Cambia el cursor al pasar por encima */
}

/* Estilo al pasar el ratón */
button:hover {
  background-color: red; /* Cambia a rojo cuando el mouse está encima */
  color: white;
}

	 input {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }
	
		
  	</style>
</head>
<body>

<div class="contenedor">

<!-- =========================================
     MODAL SISTEMA BLOQUEADO
========================================= -->
<div id="modalBloqueoSistema" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
    z-index:9999;
    justify-content:center;
    align-items:center;
">

    <div style="
        background:white;
        padding:35px;
        border-radius:12px;
        max-width:420px;
        width:90%;
        text-align:center;
        box-shadow:0 0 25px rgba(0,0,0,0.4);
        font-family:Arial;
    ">

        <div style="font-size:65px;">
            ⚠️
        </div>

        <h2 style="
            color:#d32f2f;
            margin-top:10px;
        ">
            Sistema no disponible
        </h2>

        <div id="mensajeSistema" style="
            font-size:18px;
            margin-top:20px;
            color:#333;
            line-height:1.5;
        ">
        </div>

        <br>

        <button
            class="boton-redondeado"
            onclick="cerrarmodalSistema()"
            style="
                padding:10px 25px;
                font-size:16px;
            "
        >
            Cerrar
        </button>

    </div>
</div>

<span class="cerrar" onclick="cerrarmodalSistema()">

  <img id="logo" src="logo-donado3.jpg" alt="Tu Logo">

  <br>
  <br>
  <h2>🔑 Ingreso al Sistema</h2>

  <input style="padding: 10px 40px;" type="text" id="email" placeholder="usuario" 
			onkeydown="if(event.key==='Enter')password.focus()" ><br>
  <br>
  <input style="padding: 10px 40px;" type="password" id="password" placeholder="Contraseña"
			onkeydown="if(event.key==='Enter')entrar.click()" ><br>
  <br>
  <br>
  <button class="boton-redondeado" id="entrar" style="padding: 10px 40px;" onclick="login()">Ingresar</button>

  <br>
  <br>
  </div>

 <script>

localStorage.removeItem("usuarioData");
email.focus();

function cerrarmodalSistema(){
    document.getElementById('modalBloqueoSistema').style.display = 'none';

    // limpiar login
    //document.getElementById('email').value = '';
    //document.getElementById('password').value = '';

    // volver foco al email
  //  document.getElementById('email').focus();
}



async function login() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        //alert("Por favor, complete ambos campos.");
		await mostrarAlerta({mensaje: `Por favor, complete ambos campos`});
        return;
    }

    try {
        // =====================================
        // LOGIN
        // =====================================
        const resp = await fetch(
            '/api/usuarios/login',
            {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    email,
                    password
                })
            }
        );

        const data = await resp.json();

        if (!data.ok) {
            //alert("ERROR:\nNo se pudo autenticar al usuario");
			await mostrarAlerta({mensaje: `No se pudo autenticar al usuario`});
            return;
        }

        // =====================================
        // OBTENER ID USUARIO
        // =====================================
        const idUsuario = parseInt(data.usuario.id_usuario || 0);

        // =====================================
        // VALIDAR EMPRESA
        // SOLO SI NO ES ADMIN
        // =====================================
        if (idUsuario !== 1) {
            const empResp = await fetch('/api/empresa');
            const empresa = await empResp.json();

            // ---------------------------------
            // SISTEMA DESHABILITADO
            // ---------------------------------
            if (parseInt(empresa.deshabilitada || 0) === 1) {
                document.getElementById("modalBloqueoSistema").style.display = "flex";
                document.getElementById("mensajeSistema")
                    .innerHTML =
                    "<b>⚠️ Sistema deshabilitado</b><br><br>Comuníquese con el administrador del sistema.";

                return;
            }

            // ---------------------------------
            // VALIDAR VIGENCIA
            // ---------------------------------
            if (empresa.fecha_vigencia) {
                const hoy = new Date();
                hoy.setHours(0,0,0,0);
                const fechaVenc = new Date(empresa.fecha_vigencia);
                fechaVenc.setHours(0,0,0,0);

                if (hoy > fechaVenc) {
                    document.getElementById("modalBloqueoSistema").style.display = "flex";
                    document.getElementById("mensajeSistema")
                        .innerHTML =
                        "<b>⚠️ Sistema vencido</b><br><br>Comuníquese con el administrador del sistema.";

                    return;
                }
            }
        }

        // =====================================
        // GUARDAR LOGIN
        // =====================================
        localStorage.setItem("usuarioData",JSON.stringify(data.usuario));
        localStorage.setItem("usuarioEmail",data.usuario.email);
        localStorage.setItem("usuarioNombre",data.usuario.nombre);
        localStorage.setItem("usuarioId",data.usuario.id_usuario);
        localStorage.setItem("usuarioNivel",data.usuario.nivel);

        window.location.href = "index.html";

    } catch (err) {
        console.error(err);
        //alert("Error conectando con el servidor");
		await mostrarAlerta({mensaje: `Error conectando con el servidor`});
    }
}

</script>

<script src="JS/modal.js"></script>

</body>
</html>
