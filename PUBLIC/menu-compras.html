<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  
 <script src="JS/auth.js"></script> 

  <title>Menú de Compras</title>

  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
    }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin-top: 10px;

    background:
    linear-gradient(
        135deg,
        #6DB7FF,
        #B8E6FE
    );

    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    min-height: 100vh;
}


.contenedor {
    max-width: 427px;
    margin: auto;
    background: white;
    padding: 15px;
    border: none;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,.15);
    font-size: 18px;
}


.menu-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
    margin-top:20px;
    justify-items:center;
}

    /* Centrar el contenido dentro de cada celda */
    td {
      text-align: center;
      vertical-align: middle;
      padding: 10px;
      border: 0px solid #0E0D0C;
    }

.boton-redondeado,
.boton-redondeado3 {
    width: 180px;
    height: 70px;
	  background-color: #007bff; /* Color por defecto */
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow: 0 6px 16px rgba(0,0,0,.15);
    transition: transform .25s ease, background-color .25s ease;
    padding:5px;
}

    .boton-redondeado2 {
      width: 180px;
      height: 70px;
      background-color: #4E4E55;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background-color 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      line-height: 1.2;
      padding: 5px;
      box-sizing: border-box;
    }

    .boton-salirvolver {
      background-color: #555;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 30px;
      font-size: 14px;
      cursor: pointer;
    }

    .boton-redondeado3 {
      background-color: green;
    }

    button small {
      font-size: 11px;
      opacity: 0.9;
    }

/* Efecto hover */
button:hover {
  background-color: red;
  color: white;
transform: translateY(-4px);
filter: brightness(1.08);
}

    h3 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }

    .boton-redondeado:disabled,
    .boton-redondeado3:disabled {
      background-color: #cccccc !important;
      color: #666666 !important;
      cursor: not-allowed !important;
    }

  </style>

  <link rel="stylesheet" href="CSS/estilos.css">
</head>

<body>


<div class="contenedor">
  <h3>&#127981; Menú de COMPRAS</h3>
  <div style="text-align:center; font-size:13px; border: 0px solid #0E0D0C; max-width: 520px; margin: auto; border-radius:8px;">👤 Usuario: <b><span id="userLabel"></span></div>

  <table>
    <tr>
      <td><button class="boton-redondeado" id="btnCargarCompra" onclick="location.href='compras.html'">Ingresar Compras</button></td>
      <td><button class="boton-redondeado" id="btnConsCompra" onclick="location.href='compras_consultas.html'">Compras x Formas de Pago</button></td>
    </tr>

    <tr>
      <td><button class="boton-redondeado" id="btnTotGrupo" onclick="location.href='totales_grupo_c.html'">Compras x Grupo</button></td>
      <td><button class="boton-redondeado" id="btnCambiarFP" onclick="location.href='modifica-fpago_c.html'">Cambiar Forma de Pago</button></td>
    </tr>

    <tr>
      <td><button class="boton-redondeado" id="btnAnularCompra" onclick="location.href='anular_compra.html'">Anular Compra</button></td>
      <td><button class="boton-redondeado" id="btnCpaAnu" onclick="location.href='compras_anuladas.html'">Compras Anuladas</button></td>
    </tr>

    <tr>
      <td colspan="2">
        <button id="btnVolver" class="boton-salirvolver" onclick="location.href='index.html'">&#8617; Volver</button>
      </td>
    </tr>
  </table>
  
</div>

<!-- Script final: ahora los botones ya existen -->
<script>

verificarSesion(); 
document.getElementById("userLabel").textContent = localStorage.getItem("usuarioEmail");

// BLOQUEA TODOS LOS BOTONES AL CARGAR LA PÁGINA (menos boton Volver)
document.addEventListener("DOMContentLoaded", async () => {
    const botones = document.querySelectorAll("button");
    botones.forEach(btn => {
        if (btn.id !== "btnVolver") {
            btn.disabled = true;
            btn.title = "No tiene permiso para usar esta función";
        }
    });

    // Esperar permisos
    await cargarPermisosUsuario();

    // Aplicar permisos
    aplicarPermisos();
});

</script>

<script src="JS/permisos.js"></script>

<script>
window.aplicarPermisos = function () {

    if (tienePermiso(36)) {btnCargarCompra.disabled = false; btnCargarCompra.title = "";}
    if (tienePermiso(30)) {btnConsCompra.disabled = false; btnConsCompra.title = "";}
    if (tienePermiso(31)) {btnTotGrupo.disabled = false; btnTotGrupo.title = "";}
    if (tienePermiso(35)) {btnCambiarFP.disabled = false; btnCambiarFP.title = "";}
    if (tienePermiso(33)) {btnAnularCompra.disabled = false; btnAnularCompra.title = "";}
    if (tienePermiso(34)) {btnCpaAnu.disabled = false; btnCpaAnu.title = "";}

};

</script>

</body>
</html>
