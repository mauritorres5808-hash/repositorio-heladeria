<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ABM de Usuarios</title>

<script src="JS/auth.js"></script>  <!-- Aquí se verifica la autenticacion-->

<style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 900px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
    }
	
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #0E0D0C;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #BDC2CB;
    }

    button {
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .botones-accion {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 25px;
    }

    button:hover {
      background-color: red;
      color: white;
    }
	
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    justify-content: center;
    align-items: center;
  }
  .modal-content {
    background: white;
    padding: 20px;
    border-radius: 5px;
    width: 400px;
  }
    .input-pequeno {
      width: 100px;
      height: 14px;
    }  
	 input, select {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }

.boton-redondeado {
  padding: 8px 16px;
  margin: 5px;
  cursor: pointer;
  border: none;
  background-color: #007bff;
  color: white;
  border-radius: 5px;
}

.boton-redondeado:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}
 	label { font-weight: bold; margin-right: 10px; }
 
</style>

</head>

<body>
  <div class="contenedor">
  <h2>👤 Mantenimiento de Usuarios</h2>

  <div class="card">
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
	  <div>
		<label>ID Usuario</label>
		<input
		  class="input-pequeno"
		  type="number"
		  id="id_usuario"
		  placeholder="Código"
		  onkeydown="if(event.key==='Enter')btnVerificar.click()">
		<button id="btnVerificar">&#9989; Verificar</button>

		<button id="btnLimpiar">&#9851; Limpiar</button>
	  </div>
	</div>

	<br>

    <label>Nombre </label>
    <input size="30" type="text" id="nombre" placeholder="Nombre completo" onkeydown="if(event.key==='Enter')email.focus()" >

    <br>
    <br>
    <label>Usuario para ingresar al sistema</label>
    <input size="10" type="text" id="email" placeholder="sin espacios">
&nbsp;&nbsp;&nbsp;
    <label>Nivel </label>
    <select id="nivel">
      <option value="1">Vendedor</option>
      <option value="2">Supervisor</option>
    </select>
		&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
    <br>
    <br>
	<button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
	<button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
	&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
	&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
	&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
	<button align="right"  onclick="window.location.href='menu-general.html'">&#8617; Volver</button>
  </div>

  <div class="card">
    <h3>Listado de Usuarios</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Usuario</th>
          <th>Nivel</th>
          <th>Deshabilitado</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios"></tbody>
    </table>
  </div>

</div>

<script>
verificarSesion();
    cargarUsuarios();
	id_usuario.focus();
//verificar usuario
document.getElementById("btnVerificar").onclick = async () => {

	const codigo = parseInt(document.getElementById("id_usuario").value);
	if (codigo < 2) 
	{
	  await mostrarAlerta({mensaje: `El ID de usuario debe ser mayor a 1`});
	  return;
	}

    const id = parseInt(document.getElementById("id_usuario").value);

    if (!id)
        return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});

    const resp = await fetch(`/api/usuarios/${id}`);

    const data = await resp.json();

    if (data.error) {
		await mostrarAlerta({mensaje: `ID Usuario no encontrado`});
        limpiarCampos();
        return;
    }
    document.getElementById("id_usuario").value = data.id_usuario;
    document.getElementById("nombre").value = data.nombre || '';
    document.getElementById("email").value = data.email || '';
    document.getElementById("nivel").value = data.nivel || 1;
    document.getElementById("deshabili").checked = data.deshabilitado == 1;
};

//alta usuario
document.getElementById("btnAlta").onclick = async () => {

    if (document.getElementById("id_usuario").value) {
		return await mostrarAlerta({mensaje: `Para dar de alta NO debe ingresar el ID usuario.\n
				Este se genera automaticamente.\n
				Borrar el ID, cargar los demas campos y volver a presionar ALTA
		`});
		return;
    }

	const codigo = parseInt(document.getElementById("id_usuario").value);
	if (codigo < 2) 
	{
	  await mostrarAlerta({mensaje: `El ID de usuario debe ser mayor a 1`});
	  return;
	}

    const nombre =document.getElementById("nombre").value.trim();
    const email =document.getElementById("email").value.trim();
    const nivel =document.getElementById("nivel").value;

    if (!nombre)
		return await mostrarAlerta({mensaje: `Ingrese el nombre`});

    if (!email)
		return await mostrarAlerta({mensaje: `Ingrese el usuario`});

    const resp = await fetch('/api/usuarios', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            nombre,
            email,
            nivel,
            deshabilitado:
                document.getElementById("deshabili")
                    .checked ? 1 : 0
        })
    });

    const data = await resp.json();

    if (!data.ok) {
        alert("Error guardando usuario");
        return;
    }

	await mostrarAlerta({mensaje: `Usuario agregado con ID ${data.id}`,icono:`&#10004;`});

    limpiarCampos();
    cargarUsuarios();
};

//modif Usuario
document.getElementById("btnModificar").onclick = async () => {

	const codigo = parseInt(document.getElementById("id_usuario").value);
	if (codigo < 2) 
	{
	  await mostrarAlerta({mensaje: `El ID de usuario debe ser mayor a 1`});
	  return;
	}

    const id = parseInt(document.getElementById("id_usuario").value);

    if (!id)
		return await mostrarAlerta({mensaje: `Ingrese un ID valido`});

    const nombre = document.getElementById("nombre").value.trim();
    const email = document.getElementById("email").value.trim();
    const nivel = document.getElementById("nivel").value;

    const resp = await fetch(`/api/usuarios/${id}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            nombre,
            email,
            nivel,
            deshabilitado: document.getElementById("deshabili").checked ? 1 : 0
        })
    });

    const data = await resp.json();

    if (!data.ok) {
        alert("Error actualizando usuario");
        return;
    }

	await mostrarAlerta({mensaje: `Usuario actualizado correctamente`,icono:`&#10004;`});

    limpiarCampos();
    cargarUsuarios();
};

//Limpiar
function limpiarCampos() {

    document.getElementById("id_usuario").value = '';
    document.getElementById("nombre").value = '';
    document.getElementById("email").value = '';
    document.getElementById("nivel").value = '1';
    document.getElementById("deshabili").checked = false;
}

document.getElementById("btnLimpiar").onclick = limpiarCampos;


// ========================================
// CARGAR USUARIOS EN TABLA
// ========================================
async function cargarUsuarios() {

  try {
    const resp = await fetch('/api/usuarios');
    const data = await resp.json();
    const tbody = document.getElementById("tablaUsuarios");

    tbody.innerHTML = "";

    if (!data.ok || !data.usuarios) {

      tbody.innerHTML = `
        <tr>
          <td colspan="5">
            Error cargando usuarios
          </td>
        </tr>
      `;

      return;
    }

    let cantidad = 0;

    data.usuarios.forEach(u => {

      let nivelDesc = "";

      if (u.nivel == 1)
        nivelDesc = "Vendedor";

      if (u.nivel == 2)
        nivelDesc = "Supervisor";

      tbody.innerHTML += `
        <tr>
          <td>${u.id_usuario}</td>
          <td>${u.nombre || ""}</td>
          <td>${u.email || ""}</td>
          <td>${nivelDesc}</td>
          <td
            style="
              ${u.deshabilitado == 1
                ? 'background-color:#FF6467;color:white;'
                : ''}
            "
          >
            ${u.deshabilitado == 1 ? 'S' : 'N'}
          </td>
        </tr>
      `;

      cantidad++;

    });

    tbody.innerHTML += `
      <tr style="font-weight:bold; background:#f2f2f2;">
        <td>CANTIDAD</td>
        <td>${cantidad}</td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    `;

  } catch (error) {
    console.error(error);
    alert("Error cargando usuarios");
  }
}


</script>

<!--  <script src="./JS/usuarios.js"></script> -->
<script src="JS/modal.js"></script>

</body>
</html>
