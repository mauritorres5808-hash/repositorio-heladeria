<body>
  <div class="contenedor">
    <h2>Mantenimiento de Grupos</h2>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="id_grupo">Codigo de Grupo</label>
        <input class="input-pequeno" type="number" id="id_grupo" placeholder="Ingrese código"
				onkeydown="if(event.key==='Enter')btnVerificar.click()"/>
        <button id="btnVerificar">&#9989; Verificar</button>
        <button id="btnBuscar">&#128269; Buscar</button>
		<button id="btnVaciar" onclick="limpiarCampos()">&#9851; Limpiar</button>
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" />
      </div>
	  <div>
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
	  </div>
	  <div>
		<label for="publica">Publica ?</label>
		<input class="input-pequeno" type="checkbox" id="publica">
	  </div>
    </div>

    <br>
    <div>
      <button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
      <button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
      <button class="boton-redondeado" id="btnEliminar">❌ Eliminar</button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
    </div>

    <div id="listado">    </div>

    <!-- Modal de busqueda -->
    <div id="modalBusqueda">
      <div id="contenidoModal" align="center">
        <h3>Buscar Grupo por descripcion</h3>
        <input type="text" id="txtBuscarNombre" placeholder="Ingrese parte de la descripcion" />
        <button id="btnBuscarGrupo">Buscar</button>
        <table id="tablaResultados">
          <thead>
            <tr><th>ID</th><th>Descripcion</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <br>
        <button id="btnCerrarModal">Cerrar</button>
      </div>
    </div>
  </div>

  <script>

verificarSesion();

id_grupo.focus();

<script src="JS/permisos.js"></script>

<script>

// ============================================
// CONTROL DE PERMISOS
// ============================================

window.aplicarPermisos = function() {

    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(10)) {

        if (btn) btn.disabled = true;
        btn.title = "No tiene permiso para usar esta funcion";

        if (btn2) btn2.disabled = true;
        btn2.title = "No tiene permiso para usar esta funcion";
    }
};

// ============================================
// VARIABLES
// ============================================

const idGrupo = document.getElementById("id_grupo");
const descripcion = document.getElementById("descripcion");

// ============================================
// VERIFICAR EXISTENCIA
// ============================================

document.getElementById("btnVerificar").onclick = async () => {

    const codigo = parseInt(idGrupo.value);

    if (!codigo)
		return mostrarAlerta({mensaje: "Ingrese un codigo valido"});

    try {

        const resp = await fetch(`/api/grupos/${codigo}`);

        if (!resp.ok) {
			await mostrarAlerta({mensaje: "Grupo no encontrado"});
            limpiarCampos();
            return;
        }

        const data = await resp.json();

        descripcion.value = data.descripcion;

        document.getElementById("deshabili").checked =
            (data.deshabilitado == 1);

        document.getElementById("publica").checked =
            (data.publica == 1);

    } catch (error) {
        console.error(error);
        alert("Error consultando grupo");
    }
};

// ============================================
// ALTA
// ============================================
document.getElementById("btnAlta").onclick = async () => {

    if (idGrupo.value) {

		return await mostrarAlerta({mensaje: `Para dar de alta NO debe ingresar el codigo.\n
				Este se genera automaticamente.\n
				Borrar el codigo, cargar los demas campos y volver a presionar ALTA
		`});
		return;
    }

    if (!validarCampos())
        return;

    try {

        const resp = await fetch('/api/grupos', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                descripcion: descripcion.value.trim(),
                deshabilitado: document.getElementById("deshabili").checked ? 1 : 0,
                publica: document.getElementById("publica").checked ? 1 : 0
            })
        });

        const data = await resp.json();

        if (!data.ok) {
            alert(data.mensaje || "Error al grabar");
            return;
        }

        //alert(`Grupo agregado con codigo ${data.id_grupo}`);
		await mostrarAlerta({mensaje: `Grupo agregado con codigo ${data.id_grupo}`,icono:`&#10004;`});
		
        limpiarCampos();

        ArmarTabla();

    } catch (error) {
        console.error(error);
        alert("Error grabando grupo");
    }
};

// ============================================
// MODIFICAR
// ============================================
document.getElementById("btnModificar").onclick = async () => {

    const codigo = parseInt(idGrupo.value);

    if (!codigo)
        return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});

    if (!validarCampos())
        return;

    try {

        const resp = await fetch(`/api/grupos/${codigo}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                descripcion: descripcion.value.trim(),
                deshabilitado: document.getElementById("deshabili").checked ? 1 : 0,
                publica: document.getElementById("publica").checked ? 1 : 0
            })
        });

        const data = await resp.json();

        if (!data.ok) {
            alert(data.mensaje || "Error modificando");
            return;
        }

		await mostrarAlerta({mensaje: `Grupo actualizado correctamente`,icono:`&#10004;`});
        limpiarCampos();
        ArmarTabla();

    } catch (error) {
        console.error(error);
        alert("Error modificando grupo");
    }
};

//-------------------------------------------
// ---------------- Eliminar ----------------
//-------------------------------------------
document.getElementById("btnEliminar").onclick = async () => {

		const id = parseInt(idGrupo.value);

		if (!id)
			return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});

  		const confirmar = await mostrarConfirm({
		  mensaje: "¿Eliminar definitivamente el Grupo # " + id + " ?",
		  textoAceptar: "Sí, eliminarlo",
		  textoCancelar: "No"
		});
		if (!confirmar) {
		  return;
		}	


		const resp = await fetch(`/api/grupos/${id}`,
			{
				method: 'DELETE'
			}
		);

		const data = await resp.json();

		if (data.ok) {
			await mostrarAlerta({mensaje: `Grupo eliminado`,icono:`&#10004;`});
		} else {
			await mostrarAlerta({mensaje: data.mensaje + "\n Si el grupo esta asignado a algun producto"
			+ " no puede eliminarlo."});
			return;
		}

        limpiarCampos();
        ArmarTabla();
}


// ============================================
// VALIDAR CAMPOS
// ============================================

function validarCampos() {

    if (!descripcion.value.trim()) {
		mostrarAlerta({mensaje: `Ingrese la descripcion`});
        return false;
    }

    return true;
}

// ============================================
// LIMPIAR CAMPOS
// ============================================
function limpiarCampos() {

    idGrupo.value = "";
    descripcion.value = "";

    document.getElementById("deshabili").checked = false;
    document.getElementById("publica").checked = false;
}

// ============================================
// MODAL BUSQUEDA
// ============================================
const modal = document.getElementById("modalBusqueda");

document.getElementById("btnBuscar").onclick = () => {

    modal.style.display = "flex";
};

document.getElementById("btnCerrarModal").onclick = () => {

    modal.style.display = "none";
};

// ============================================
// BUSCAR GRUPOS
// ============================================
document.getElementById("btnBuscarGrupo").onclick = async () => {

    const texto =
        document.getElementById("txtBuscarNombre")
        .value
        .trim();

    if (!texto)
        return await mostrarAlerta({mensaje: `Ingrese texto a buscar`});

    try {
        const resp = await fetch(`/api/grupos/buscar/${texto}`);
        const data = await resp.json();
        const tablaBody = document.querySelector("#tablaResultados tbody");

        tablaBody.innerHTML = "";

        data.forEach(grupo => {
            const fila = document.createElement("tr");
            fila.innerHTML = `
                <td>${grupo.id_grupo}</td>
                <td>${grupo.descripcion}</td>
            `;

            fila.onclick = () => {

                idGrupo.value = grupo.id_grupo;

                descripcion.value = grupo.descripcion;

                document.getElementById("deshabili").checked =
                    (grupo.deshabilitado == 1);

                document.getElementById("publica").checked =
                    (grupo.publica == 1);

                modal.style.display = "none";
            };

            tablaBody.appendChild(fila);
        });

    } catch (error) {
        console.error(error);
        alert("Error buscando grupos");
    }
};

// ============================================
// ARMAR TABLA
// ============================================

async function ArmarTabla() {

    try {
        const resp = await fetch('/api/grupos');
        const data = await resp.json();
        let html = "";
        if (data.length === 0) {
            html += "<p>No se encontraron grupos.</p>";
        } else {
            html += `
                <table>
                    <tr>
                        <th>Codigo</th>
                        <th>Descripcion</th>
                        <th>Deshabilitado</th>
                        <th>Publica</th>
                    </tr>
            `;

            let cant = 0;

            data.forEach(grupo => {

                html += `
                    <tr>
                        <td>${grupo.id_grupo}</td>
                        <td>${grupo.descripcion}</td>
						<td style="${grupo.deshabilitado == 1 ? 'background-color:#FF6467;color:white;' : ''}">
							${grupo.deshabilitado == 1 ? 'S' : 'N'}
						</td>
						<td>${grupo.publica == 1 ? "S" : "N"}</td>
                    </tr>
                `;

                cant++;
            });

            html += `
                <tr class="total-row"
                    style="font-weight:bold;background:#f2f2f2">

                    <td colspan="1">CANTIDAD</td>
                    <td>${cant}</td>
                    <td></td>
                    <td></td>

                </tr>
            `;

            html += "</table>";
        }

        document.getElementById("listado").innerHTML = html;

    } catch (error) {
        console.error(error);
        alert("Error armando tabla");
    }
}

</script>
