<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Configuración Delivery</title>

<script src="JS/auth.js"></script>

<style>

body{
    font-family:Arial;
    background:#8AC0FF;
    margin:0;
    padding:20px;
}

.contenedor{
    background:#fff;
    border-radius:10px;
    max-width:700px;
    margin:0 auto;
    padding:25px;
    box-shadow:0 0 12px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    background:#8AC0FF;
    padding:10px;
    border-radius:8px;
}

.campo{
    margin-bottom:18px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:8px;
    border-radius:6px;
    border:1px solid #999;
    box-sizing:border-box;
}

.botones{
    text-align:center;
    margin-top:25px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    color:white;
    background:#007bff;
}

button:hover{
    background:red;
}

</style>

</head>

<body>

<div class="contenedor">

    <h2>
        Configuración Delivery
    </h2>

    <div class="campo">
        <label>
            Costo de envío
        </label>

        <input
            id="costo_envio"
            type="number"
            step="0.01">
    </div>

    <div class="campo">
        <label>
            Pedido mínimo para envío gratis
        </label>

        <input
            id="total_pedido"
            type="number"
            step="0.01">
    </div>

    <div class="campo">
        <label>
            Distancia máxima permitida (Km)
        </label>

        <input
            id="distancia_maxima"
            type="number"
            step="0.01">
    </div>

    <div class="botones">

        <button onclick="guardar()">
            💾 Guardar
        </button>

        <button
            onclick="location.href='menu-tablas.html'">
            ↩ Volver
        </button>

    </div>

</div>

<script>

verificarSesion();

async function cargar() {

    const resp =
        await fetch('/api/configuraciones');

    const data =
        await resp.json();

    document.getElementById("costo_envio").value =
        data.costo_envio || 0;

    document.getElementById("total_pedido").value =
        data.total_pedido || 0;

    document.getElementById("distancia_maxima").value =
        data.distancia_maxima || 0;
}

async function guardar() {

    const body = {

        costo_envio:
            parseFloat(
                document.getElementById("costo_envio").value || 0
            ),

        total_pedido:
            parseFloat(
                document.getElementById("total_pedido").value || 0
            ),

        distancia_maxima:
            parseFloat(
                document.getElementById("distancia_maxima").value || 0
            )
    };

    const resp = await fetch(
        '/api/configuraciones',
        {
            method: 'PUT',
            headers: {
                'Content-Type':'application/json'
            },
            body: JSON.stringify(body)
        }
    );

    const data =
        await resp.json();

    if (data.ok) {

        await mostrarAlerta({
            mensaje: "Configuración guardada correctamente",
            icono: "✅"
        });

    } else {

        await mostrarAlerta({
            mensaje: "Error al guardar",
            icono: "❌"
        });
    }
}

cargar();

</script>

</body>
</html>
