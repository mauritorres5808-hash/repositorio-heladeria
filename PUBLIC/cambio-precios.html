// ======================================
// CARGAR GRUPOS
// ======================================
async function cargarGrupos() {

  try {
    const resp = await fetch('/api/grupos');
    const grupos = await resp.json();
    const sel = document.getElementById("selGrupo");

    sel.innerHTML = "";
    grupos.forEach(g => {
      // deshabilitado = 0 -> habilitado
      if (g.deshabilitado === 0) {
      sel.innerHTML += `
        <option value="${g.id_grupo}">
          ${g.descripcion}
        </option>
      `;
      }
    });

  } catch (error) {
    console.error("Error cargando grupos:", error);
    alert("Error cargando grupos");
  }
}





cargarGrupos();

// --- PREVISUALIZACIÓN ---
async function previsualizar() {

  const grupoID = Number(document.getElementById("selGrupo").value);
  const tipo = document.getElementById("tipoCambio").value;
  const valor = parseFloat(document.getElementById("valorCambio").value);

  if (!valor && valor !== 0) {
	await mostrarAlerta({mensaje: `Ingrese un valor válido`});
    return;
  }

  try {

const resp =
  await fetch(`/api/productos/grupo/${grupoID}`);

const productos =
  await resp.json();

productosGrupo = productos.map(p => ({

  id_producto: p.id_producto,
  desc: p.descripcion,
  precio: Number(p.precio),
  nuevo: Number(p.precio)

}));

    productosGrupo.forEach(p => {

		if (tipo === "inc") {
		  p.nuevo =
			  Number((p.precio * (1 + valor / 100)).toFixed(2));
		}

		if (tipo === "dec") {
		  p.nuevo =
			  Number((p.precio * (1 - valor / 100)).toFixed(2));
		}

		if (tipo === "fijo") {
		  p.nuevo =
			  Number(valor.toFixed(2));
		}
    });

    renderTabla();

    document.getElementById("divConfirmar").style.display = "block";

  } catch (error) {
    console.error(error);
    alert("Error obteniendo productos");
  }
}


function renderTabla() {

  let html = `
    <table>
      <tr>
        <th>ID</th>
        <th>Producto</th>
        <th>Precio Actual</th>
        <th>Nuevo Precio<br>(editable)</th>
      </tr>
  `;

  productosGrupo.forEach((p,i)=>{

    html += `
      <tr>

        <td>${p.id_producto}</td>

        <td>${p.desc}</td>

        <td>
          ${Number(p.precio).toFixed(2)}
        </td>

        <td>
          <input
            type="number"
            step="0.01"
            value="${Number(p.nuevo).toFixed(2)}"
            onchange="editar(${i},this.value)"
          />
        </td>

      </tr>
    `;
  });

  html += `</table>`;

  document.getElementById("tablaPreview").innerHTML = html;
}



function editar(i,val){

  productosGrupo[i].nuevo =
      Number(parseFloat(val || 0).toFixed(2));
}
