<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Modificar Formas de Pago - Compras</title>

<script src="JS/auth.js"></script>  <!-- Aqui se verifica la autenticacion-->
<script src="JS/utils.js"></script>

  <style>
    /* Estilos coherentes con tus otras páginas */
    body { font-family: Arial; background:#8AC0FF; margin:0; padding:20px; }
    .contenedor { max-width:1050px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 8px rgba(0,0,0,0.15); }
    h2 { text-align:center; background:#8AC0FF; padding:10px; border-radius:8px; margin-top:0; }
    .filtros { text-align:center; margin-bottom:16px; }
 	label { font-weight: bold; margin-right: 10px; }
 
    input[type=date] { padding:6px; }
	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;
    }
    button { padding:8px 14px; background:#007bff; color:#fff; border:none; border-radius:6px; cursor:pointer; }

    button:hover { background-color: red; color: white; }

    table { width:100%; border-collapse:collapse; margin-top:12px; font-size:13px; }

    th { background:#BDC2CB; }

    .modal-header h3 { margin:0; }
    .close { cursor:pointer; color:red; font-weight:bold; }
    .fila { display:flex; gap:12px; align-items:center; margin:8px 0; flex-wrap:wrap; }
    .label { width:160px; font-weight:bold; text-align:right; }
    select, input[readonly] { padding:6px; min-width:200px; }
    .text-right { text-align:right; }
    .btn-confirm { background:#28a745; }
    .btn-confirm:hover { background:#1f8f3a; }
    .btn-cancel { background:#6c757d; }
    .btn-cancel:hover { background:#51585d; }

<body>
  <div class="contenedor">
    <h2>Modificar Formas de Pago - Compras (sin cierre)</h2>

    <div id="usuario" style="text-align:center;margin-bottom:8px"></div>

    <br>
    <div class="filtros">
      <label>Fecha: <input type="date" id="fechaConsulta"></label>

    </div>

    <br>
    <div style="margin-top:18px;display:flex;justify-content:center;gap:10px;">
      <button onclick="window.location.href='menu-compras.html'">&#8617; Volver</button>
    </div>
  </div>

  <!-- Modal: Modificar formas de pago -->
  <div id="modalModificar" class="modal">
    <div class="modal-contenido">
      <div class="modal-header">
        <h3 id="modalTitulo" style="color:red;">Modificar forma de pago</h3>
        <span class="close" onclick="cerrarModalModificar()">×</span>
      </div>

      <div id="modalBody">
        <div class="fila"><div class="label">Nro Compra:</div><div id="m_nrocompra"></div>
        <div class="fila"><div class="label">Fecha:</div><div id="m_fecha"></div></div>
        <div class="fila"><div class="label">Total:</div><div id="m_total"></div></div>
</div>

          <div class="label">Forma Pago actual: </div>

  <!-- Modal: Detalle (productos) -->

        <h3>Detalle de productos</h3>

<script>

verificarSesion();


  // helpers de fecha
  function normalizarFechaDesdeDDMMYYYY_a_YYYYMMDD(fechaStr) {
    // espera "DD/MM/YYYY" -> devuelve "YYYY-MM-DD"
    if (!fechaStr) return "";
    if (fechaStr.includes("/")) {
      const [d,m,y] = fechaStr.split("/");
      return `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
    }
    // si ya viene "YYYY-MM-DD" devolver igual
    if (fechaStr.includes("-")) return fechaStr;
    return fechaStr;
  }

  // Map de formas de pago (id -> "id - descripcion")
  let MAP_FP = {};

  // cargar formas de pago habilitadas (deshabilitado != "S")
	async function cargarFormasPagoMapa() {
		MAP_FP = {};
		try {
			const resp = await fetch('/api/fpago');
			const data = await resp.json();
			data.formasPago.forEach(f => {
				MAP_FP[f.id_fpago] = `${f.descripcion}`;
			});
		} catch (e) {
			console.error("Error cargando formas de pago:", e);
		}
	}

	// Buscar compras por fecha (input YYYY-MM-DD) -> comparar con campo fecha 'DD/MM/YYYY'
	  async function buscarComprasPorFecha() {

		const fechaInput = document.getElementById("fechaConsulta").value;
		const resultado = document.getElementById("resultado");

		if (!fechaInput) {

			alert("Seleccione una fecha.");
			return;
		}

		resultado.innerHTML =
			"<p style='text-align:center'>🔄 Buscando compras...</p>";

		await cargarFormasPagoMapa();

		try {

			const resp = await fetch(`/api/compras/por-fecha/${fechaInput}`);
			const data = await resp.json();

			const compras = data.compras || [];

			if (compras.length === 0) {

				resultado.innerHTML =
					"<p style='text-align:center'>No se encontraron compras para esa fecha.</p>";

				return;
			}

			let html = `<table>
				<thead>
					<tr>
						<th>Hora Compra</th>
						<th>N° Compra</th>
						<th>Total</th>
						<th>FPago</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody>`;

			for (const v of compras) {

				const fp1txt =
					MAP_FP[v.f_pago1] || "";

				const tieneCierre =
					v.id_cierre !== 0;

				html += `
					<tr>
						<td>${v.hora || ""}</td>
						<td>${v.id_compra}</td>
						<td>${Formatea_Moneda(v.total || 0)}</td>
						<td>${fp1txt}</td>
						<td class="acciones">

							<button onclick="verDetalleCompra(${v.id_compra})">
								Ver
							</button>

							${tieneCierre ? '' : `
								<button onclick="abrirModalModificar(${v.id_compra})">
									✏️ Modificar FP
								</button>
							`}
						</td>
					</tr>
				`;
			}

			html += `</tbody></table>`;

			resultado.innerHTML = html;

		} catch (e) {

			console.error(e);

			resultado.innerHTML =
				`<p style="color:red;text-align:center">
					Error: ${e.message}
				</p>`;
		}
	}



  // ---------------- Modal Modificar ----------------
  let compraEditando = null; // objeto de la compra seleccionada (campos del documento + docId)

  async function abrirModalModificar(idCompra) {
    // buscamos el documento por id_compra
    try {
		const respCompra = await fetch(`/api/compras/${idCompra}`);
		const dataCompra = await respCompra.json();
		if (!dataCompra.ok) {
			alert("No se encontró la compra.");
			return;
		}
		compraEditando = dataCompra.compra;

		// cargar formas de pago disponibles (deshabilitado != "S")
		const respFP = await fetch('/api/fpago');
		const dataFP = await respFP.json();
		const fpSelect1 = document.getElementById("m_fpago1_nuevo");
		fpSelect1.innerHTML = `<option value="">-- (vacío) --</option>`;
		dataFP.formasPago.forEach(f => {
			if (f.deshabilitado === 1) return;
			fpSelect1.innerHTML += `
				<option value="${f.id_fpago}">
					${f.descripcion}
				</option>
			`;
		});

      // Rellenar datos actuales en modal
      document.getElementById("m_nrocompra").textContent = compraEditando.id_compra;
      document.getElementById("m_fecha").textContent = convertirFechaOK(compraEditando.fecha || "");
	  document.getElementById("m_total").textContent = Formatea_Moneda(parseFloat(compraEditando.total || 0));
      document.getElementById("m_fpago1_actual").textContent = MAP_FP[compraEditando.f_pago1] || (compraEditando.f_pago1 ? compraEditando.f_pago1 : "");
	  document.getElementById("m_imp1_actual").textContent = Formatea_Moneda(parseFloat(compraEditando.total || 0));
	
      // inicializar selects -> por defecto mostrar las formas actuales si están habilitadas
      // si la forma actual está deshabilitada, dejamos vacío para forzar nueva selección
      const trySelectOption = (selectEl, val) => {
        if (!val && (val !== 0)) { selectEl.value = ""; return; }
        // buscar si la opción existe en el select
        const opt = Array.from(selectEl.options).find(o => o.value == String(val));
        if (opt) selectEl.value = String(val);
        else selectEl.value = "";
      };

      trySelectOption(document.getElementById("m_fpago1_nuevo"), compraEditando.f_pago1);

      // abrir modal
      document.getElementById("msgModal").textContent = "";
      document.getElementById("modalModificar").style.display = "flex";

    } catch (e) {
      console.error(e);
      alert("Error al cargar la compra: " + e.message);
    }
  }

  function cerrarModalModificar() {
    compraEditando = null;
    document.getElementById("modalModificar").style.display = "none";
  }

// 2026-05-13T03:00:00.000Z )formato ISO)  →  yyyy-mm-dd
function convertirFechaMysql(fechaStr) {
/*

		const [dia, mes, anio] = fechaStr.split("-");
		return `${anio}-${mes.padStart(2, '0')}-${dia.padStart(2, '0')}`;
	}
	return fechaStr;
*/
return fechaStr.substring(0,10);
}

// Convertir yyyy-mm-dd → dd/mm/yyyy
function convertirFechaOK(f) {
  if (!f) return "";
  // Si viene como objeto Date
  if (typeof f === "object") {
    f = f.toISOString().split("T")[0];
  }
  // Si viene como string ISO
  if (String(f).includes("T")) {
    f = String(f).split("T")[0];
  }
  const [yyyy, mm, dd] = String(f).split("-");
  return `${dd}/${mm}/${yyyy}`;
}


  // confirmar cambio -> validaciones y escribir en Firestore
  async function confirmarCambio() {
    if (!compraEditando) return alert("No hay compra seleccionada.");
	
    const sel0 = compraEditando.f_pago1; // forma de pago actual
    const sel1 = document.getElementById("m_fpago1_nuevo").value; // forma de pago nueva
    const total = parseFloat(compraEditando.total || 0);

    // Validaciones
    if (!sel1) {
      document.getElementById("msgModal").textContent = "Seleccione una forma de pago nueva.";
      return;
    }
	
    if (sel1 == sel0) {
      document.getElementById("msgModal").textContent = "Seleccione una forma de pago diferente a la actual.";
      return;
    }

    try {
      document.getElementById("msgModal").textContent = "🔄 Guardando cambios...";
		// buscar doc por id_compra
		const updateObj = {
			f_pago1: sel1 ? parseInt(sel1) : 0
		};

		const respUpdate = await fetch(
			`/api/compras/${compraEditando.id_compra}/fpago`,
			{
				method: 'PUT',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify(updateObj)
			}
		);

		const dataUpdate = await respUpdate.json();

		if (!dataUpdate.ok) {
			throw new Error("No se pudo actualizar");
		}

		// === Registrar auditoría ===
		try {

			const idUsuario = parseInt(localStorage.getItem("usuarioId")) || 0;
			const usuarioData = JSON.parse(localStorage.getItem("usuarioData") || "{}");
			const nombreUsuario = usuarioData.nombre || "";

			// Fecha y hora actual
			const ahora = new Date();

			// YYYY-MM-DD
			const fechaAuditoria =
				ahora.getFullYear() + "-" +
				String(ahora.getMonth() + 1).padStart(2, '0') + "-" +
				String(ahora.getDate()).padStart(2, '0');

			// HH:mm
			const horaAuditoria =
				String(ahora.getHours()).padStart(2, '0') + ":" +
				String(ahora.getMinutes()).padStart(2, '0') + ":" +
				String(ahora.getSeconds()).padStart(2, '0');

			const auditoriaData = {
				fecha: fechaAuditoria,
				hora: horaAuditoria,
				fecha_compra: convertirFechaMysql(compraEditando.fecha),
				id_compra: compraEditando.id_compra,
				id_usuario: idUsuario,
				usuario: nombreUsuario,
				tipo: "FP",
				valor_anterior: compraEditando.f_pago1 || 0,
				valor_nuevo: parseInt(sel1)
			};

			// registro auditoria
			await fetch('/api/compras/auditoria/fpago', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify(auditoriaData)
			});

			console.log("Auditoría registrada correctamente.");

		} catch (errAud) {
			console.error("Error registrando auditoría:", errAud);
		}
		
		document.getElementById("msgModal").textContent = "✅ Cambios guardados.";
		// cerrar modal tras breve delay y recargar lista
		setTimeout(() => {
			cerrarModalModificar();
			buscarComprasPorFecha();
		}, 700);

    } catch (e) {
      console.error(e);
      document.getElementById("msgModal").textContent = "Error al guardar: " + e.message;
    }
  }

  // ---------------- Modal Detalle ----------------
	async function verDetalleCompra(idCompra) {

		try {

			const resp = await fetch(`/api/compras/${idCompra}/detalle`);
			const data = await resp.json();

			let html = `<h4>Compra N° ${idCompra}</h4>`;

			if (!data.ok || data.detalle.length === 0) {

				html += "<p>No hay productos para esta compra.</p>";

			} else {

				html += `
					<table>
						<thead>
							<tr>
								<th>Código</th>
								<th>Descripción</th>
								<th>Precio</th>
								<th>Cantidad</th>
								<th>Subtotal</th>
							</tr>
						</thead>
						<tbody>
				`;

				data.detalle.forEach(pd => {

					html += `
						<tr>
							<td>${pd.id_producto}</td>
							<td>${pd.descripcion || ""}</td>
							<td>${Formatea_Moneda(pd.precio || 0)}</td>
							<td>${pd.cantidad}</td>
							<td>${Formatea_Moneda(pd.subtotal || 0)}</td>
						</tr>
					`;

				});

				html += `
						</tbody>
					</table>
				`;
			}

			document.getElementById("detalleContenido").innerHTML = html;

			document.getElementById("modalDetalle").style.display = "flex";

		} catch (e) {

			console.error(e);

			alert("Error al obtener detalle: " + e.message);

		}
	}
	  
  function cerrarModalDetalle() { document.getElementById("modalDetalle").style.display = "none"; }

  // cerrar clic fuera
  window.onclick = function(ev) {
    const modal = document.getElementById("modalModificar");
    const modalDet = document.getElementById("modalDetalle");
    if (ev.target === modal) cerrarModalModificar();
    if (ev.target === modalDet) cerrarModalDetalle();
  };

  // inicializar fecha con hoy
  (function init(){
    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth()+1).padStart(2,'0');
    const dd = String(hoy.getDate()).padStart(2,'0');
    document.getElementById("fechaConsulta").value = `${yyyy}-${mm}-${dd}`;
    // preload map
    cargarFormasPagoMapa();
  })();

</script>
