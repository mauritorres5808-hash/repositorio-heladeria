function mostrarEmpresa(data) {
    let html = `  
        <h4 style="color: black; background:white; border-radius:8px; font-size:20px; padding:5px; max-width: 520px;margin: auto; box-shadow: 0 12px 15px rgba(0,0,0,0.2);">
            Bienvenido a: `;

    if (!data) {
        html += "<span style='color:red'>No se encontraron los datos de la empresa</span></h4>";
    } else {
        html += `<span style="color: blue;">${data.nombre_empresa}</span></h4>`;
    }

    document.getElementById("resultado").innerHTML = html;
}

function buscarDatosEmpresa() {
    const empresaGuardada = localStorage.getItem("empresaData");

    // 🔹 Si ya tenemos los datos guardados → NO leer Firestore
    if (empresaGuardada) {
        mostrarEmpresa(JSON.parse(empresaGuardada));
        return;
    }

    // 🔹 Si no está guardado → leer Firestore UNA sola vez
    db.collection("EMPRESA")
        .get()
        .then((querySnapshot) => {
            if (querySnapshot.empty) {
                mostrarEmpresa(null);
                return;
            }

            // Asumo que solo hay un documento en EMPRESA
            const data = querySnapshot.docs[0].data();

            // Guardar en localStorage
            localStorage.setItem("empresaData", JSON.stringify(data));

            // Mostrar datos
            mostrarEmpresa(data);
        })
        .catch((error) => {
            console.error("Error buscando datos de la empresa: ", error);
        });
}

function logout() {
    firebase.auth().signOut();
    localStorage.removeItem("usuarioData");
    window.location.href = "login.html";
}

	// Inicializar datos al cargar la página
    window.onload = buscarDatosEmpresa;

// Cuando el usuario hace clic en la imagen, abrir el modal
function contacto() {
  modal.style.display = "block";

// Cuando el usuario hace clic en el span (X), cerrar el modal
span.onclick = function() {
  modal.style.display = "none";
}

// Cierra el modal si el usuario hace clic fuera de él
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
