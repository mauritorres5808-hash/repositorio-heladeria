<!DOCTYPE html>

<head>

<script src="JS/auth.js"></script>  <!-- Aqui se verifica la autenticacion -->

  <title>Menú General</title>

  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
    }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin-top: 10px;

    background:
    linear-gradient(
        135deg,
        #6DB7FF,
        #B8E6FE
    );

    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    min-height: 100vh;
}


.contenedor {
    max-width: 427px;
    margin: auto;
    background: white;
    padding: 15px;
    border: none;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,.15);
    font-size: 18px;
}


.menu-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
    margin-top:20px;
    justify-items:center;
}

    /* Centrar el contenido dentro de cada celda */
    td {
      text-align: center;
      vertical-align: middle;
      padding: 10px;
      border: 0px solid #0E0D0C;
    }


.boton-redondeado,
.boton-redondeado3 {
    width: 180px;
    height: 70px;
	  background-color: #007bff; /* Color por defecto */
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow: 0 6px 16px rgba(0,0,0,.15);
    transition: transform .25s ease, background-color .25s ease;
    padding:5px;
}

.boton-redondeado2 {
  width: 180px;              /* Mismo ancho */
  height: 70px;              /* Mismo alto */
  background-color: #4E4E55; /* Color por defecto */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: background-color 0.3s ease;
  display: flex;             /* Centrar texto dentro */
  flex-direction: column;    /* Permitir varias líneas */
  justify-content: center;   /* Centrado vertical */
  align-items: center;       /* Centrado horizontal */
  text-align: center;        /* Centrar texto */
  line-height: 1.2;          /* Espaciado entre líneas */
  padding: 5px;              /* Menor padding para evitar desbordes */
  box-sizing: border-box;    /* Incluye padding en el alto total */
}

.boton-salirvolver {
  background-color: #555;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px 30px;
  font-size: 14px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
	
/* Botón verde (solo cambia color base) */
.boton-redondeado3 {
  background-color: green;
}
/* Opcional: hacer que <small> se vea armónico */
button small {
  font-size: 11px;
  font-weight: normal;
  opacity: 0.9;
}

	
/* Efecto hover */
button:hover {
  background-color: red;
  color: white;
transform: translateY(-4px);
filter: brightness(1.08);
}

    h3 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }
	
/* Estado deshabilitado (sin perder estilo) */
.boton-redondeado:disabled,
.boton-redondeado3:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}

  </style>
      <link rel="stylesheet" href="CSS/estilos.css">

<script>

// BLOQUEA TODOS LOS BOTONES AL CARGAR LA PÁGINA (menos boton Volver)
document.addEventListener("DOMContentLoaded", async () => {
	// Deshabilitar todos los botones
	const botones = document.querySelectorAll("button");
	botones.forEach(btn => {
		if (btn.id !== "btnVolver") {
			btn.disabled = true;
			btn.title = "No tiene permiso para usar esta función";
		}
	});

	// Esperar permisos
	await cargarPermisosUsuario();

	// Aplicar permisos
	aplicarPermisos();
});
</script>
