 <script>

  currency: "ARS"

// Cargar fecha actual

const yyyy = hoy.getFullYear();

const fechaHoy = `${yyyy}-${mm}-${dd}`;

document.getElementById("fecha").value = fechaHoy;

// ======================================================
// NORMALIZAR FECHA
// yyyy-mm-dd -> dd/mm/yyyy
// ======================================================

function normalizarFecha(fechaStr) {

  if (!fechaStr)
    return "";

  if (fechaStr.includes("T")) {
    fechaStr = fechaStr.split("T")[0];
  }

  if (fechaStr.includes("-")) {
    const [año, mes, dia] = fechaStr.split("-");
    return `${dia.padStart(2, "0")}/${mes.padStart(2, "0")}/${año}`;
  }

  return fechaStr;
}

// ======================================================
// CARGAR MOVIMIENTOS
// ======================================================

async function cargarMovimientos() {

  const fecha = document.getElementById("fecha").value;

  const tbody = document.querySelector("#tablaMovimientos tbody");

  tbody.innerHTML = "";

	let totalDia = 0;
	let totalIngresos = 0;
	let totalEgresos = 0;

  try {

    const response = await fetch(`/api/movimientos?fecha=${fecha}&sin_cierre=1`);
    const movimientos = await response.json();

    movimientos.forEach(m => {

      const fila = document.createElement("tr");

      let importeMostrar = Number(m.importe || 0);

      if (m.anulado !== 1) {
        if (m.tipo === 'E') {
			totalEgresos += importeMostrar;
          totalDia += importeMostrar * -1;
          importeMostrar = importeMostrar * -1;
        } else {
			totalIngresos += importeMostrar;
          totalDia += importeMostrar;
        }
      }

      const fecha_normal = normalizarFecha(m.fecha);

      fila.innerHTML = `<td>${fecha_normal}</td>`;
      fila.innerHTML += `<td>${m.hora}</td>`;


      // Tipo
      if (m.tipo === 'E') {
          //importeMostrar = importeMostrar * -1;

        fila.innerHTML += `
          <td style="color:red;font-weight:bold;">
            Egreso
          </td>
        `;

      } else {

        fila.innerHTML += `
          <td>
            ${m.tipo === 'E' ? 'Egreso' : 'Ingreso'}
          </td>
        `;
      }

      // Descripción
      fila.innerHTML += `<td>${m.descripcion}</td>`;

      // Importe
      if (m.tipo === 'E') {

        fila.innerHTML += `
          <td style="color:red;font-weight:bold;">
            ${formateador.format(importeMostrar)}
          </td>
        `;

      } else {

        fila.innerHTML += `
          <td>
            ${formateador.format(importeMostrar)}
          </td>
        `;
      }

      // Estado
      fila.innerHTML += `
			<td style="${m.anulado == 1 ? 'background-color:#FF6467;color:white;' : ''}">
				${m.anulado == 1 ? 'Anulado' : 'Activo'}
			</td>
      `;

      // Acción
      fila.innerHTML += `
        <td>
          ${
            m.anulado === 0 || m.tipo === 'S'
              ? `
                <button
                  onclick="editarMovimiento(
                    ${m.id_movimiento},
                    ${Math.abs(Number(m.importe || 0))},
                    '${(m.descripcion || '').replace(/'/g, "\\'")}',
                    '${m.tipo}'
                  )"
                >
                  ✏️ Editar
                </button>
              `
              : ''
          }
        </td>
      `;

      tbody.appendChild(fila);

    });

		tbody.innerHTML += `
		  <tr>
			<td colspan="7">
			  <h2 style="text-align:center;">
				Total de movimientos de efectivo del dia:
				${formateador.format(totalDia)}
			  </h2>

			  <div style="
				display:flex;
				justify-content:center;
				gap:50px;
				margin-top:15px;
				font-size:18px;
				font-weight:bold;
			  ">

				<span style="color:green;">
				  Total Ingresos:
				  ${formateador.format(totalIngresos)}
				</span>

				<span style="color:red;">
				  Total Egresos:
				  ${formateador.format(totalEgresos)}
				</span>

			  </div>
			</td>

		`;

  } catch (error) {

    console.error(error);

    alert("Error cargando movimientos");
  }
}

// ======================================================
// EDITAR MOVIMIENTO
// ======================================================

async function editarMovimiento(id, importe, descripcion, tipo) {

  const nuevoImporte = prompt(
    "Nuevo importe:",
    importe
  );

  let nuevaDescripcion = "";

  if (tipo === 'S') {

    nuevaDescripcion = descripcion;

  } else {

    nuevaDescripcion = prompt(
      "Nueva descripción:",
      descripcion
    );
  }

  if (!nuevoImporte || !nuevaDescripcion)
    return;

  try {

    const response = await fetch(
      `/api/movimientos/${id}`,
      {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          importe: parseFloat(Math.abs(nuevoImporte)),
          descripcion: nuevaDescripcion
        })
      }
    );

    const data = await response.json();

    if (!data.ok) {

      alert(data.mensaje || "Error actualizando movimiento");

      return;
    }

    alert("Movimiento actualizado correctamente.");

    cargarMovimientos();

  } catch (error) {

    console.error(error);

    alert("Error actualizando movimiento");
  }
}
