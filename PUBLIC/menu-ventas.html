  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      max-width: 440px;
      margin: auto;
      background: #FFFDE6; /* #fff; */
      padding: 20px;
      font-size: 18px;
      border-radius: 8px;
	  border: 1px solid #0E0D0C;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    /* Centrar el contenido dentro de cada celda */
    td {
      text-align: center;
      vertical-align: middle;
      padding: 10px;
      border: 0px solid #0E0D0C;
    }

.boton-redondeado,
.boton-redondeado3 {
  width: 180px;              /* Mismo ancho */
  height: 70px;              /* Mismo alto */
  background-color: #007bff; /* Color por defecto */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: background-color 0.3s ease;
  display: flex;             /* Centrar texto dentro */
  flex-direction: column;    /* Permitir varias líneas */
  justify-content: center;   /* Centrado vertical */
  align-items: center;       /* Centrado horizontal */
  text-align: center;        /* Centrar texto */
  line-height: 1.2;          /* Espaciado entre líneas */
  padding: 5px;              /* Menor padding para evitar desbordes */
  box-sizing: border-box;    /* Incluye padding en el alto total */
}

.boton-redondeado2 {
  width: 180px;              /* Mismo ancho */
  height: 70px;              /* Mismo alto */
  background-color: #4E4E55; /* Color por defecto */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: background-color 0.3s ease;
  display: flex;             /* Centrar texto dentro */
  flex-direction: column;    /* Permitir varias líneas */
  justify-content: center;   /* Centrado vertical */
  align-items: center;       /* Centrado horizontal */
  text-align: center;        /* Centrar texto */
  line-height: 1.2;          /* Espaciado entre líneas */
  padding: 5px;              /* Menor padding para evitar desbordes */
  box-sizing: border-box;    /* Incluye padding en el alto total */
}

.boton-salirvolver {
  background-color: #555;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px 30px;
  font-size: 14px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
	
/* Botón verde (solo cambia color base) */
.boton-redondeado3 {
  background-color: #14BD55;
}


/* Opcional: hacer que <small> se vea armónico */
button small {
  font-size: 11px;
  font-weight: normal;
  opacity: 0.9;
}
	
/* Efecto hover */
button:hover {
  background-color: red;
  color: white;
}

h3 {
  text-align: center;
  background-color: #8AC0FF;
  padding: 10px;
  border-radius: 8px;
}

/* Estado deshabilitado (sin perder estilo) */
.boton-redondeado:disabled,
.boton-redondeado3:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}

document.addEventListener("DOMContentLoaded", async () => {

    // Deshabilitar botones
    const botones = document.querySelectorAll("button");

    botones.forEach(btn => {

        if (btn.id !== "btnVolver") {

            btn.disabled = true;
            btn.title = "No tiene permiso para usar esta función";
        }
    });

    // Esperar permisos
    await cargarPermisosUsuario();

    // Aplicar permisos
    aplicarPermisos();
});

</script>
