<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reporte de Uso Firebase</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/auth.js"></script>  <!-- Aquí se verifica la autenticacion-->

</head>
<body class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-md">
    <h1 class="text-3xl font-bold text-center mb-6">Reporte de Uso Firebase</h1>

    <!-- FILTROS -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div>
        <label class="font-semibold">Fecha desde</label>
        <input id="fechaDesde" type="date" class="w-full p-2 border rounded-md" />
      </div>
      <div>
        <label class="font-semibold">Fecha hasta</label>
        <input id="fechaHasta" type="date" class="w-full p-2 border rounded-md" />
      </div>
      <div class="flex items-end">
        <button onclick="cargarDatos()" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700">Filtrar</button>
      </div>
    </div>

    <!-- RESUMEN -->
    <div id="resumen" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

    <!-- GRAFICOS -->
    <div class="mb-6">
      <canvas id="graficoLecturas" height="100"></canvas>
    </div>
    <div class="mb-6">
      <canvas id="graficoEscrituras" height="100"></canvas>
    </div>
    <div class="mb-6">
      <canvas id="graficoEliminaciones" height="100"></canvas>
    </div>

    <div class="text-center mt-6">
      <button onclick="exportarCSV()" class="bg-green-600 text-white px-6 py-2 rounded-md hover:bg-green-700">Exportar CSV</button>
    </div>
  </div>

  <script>
    // firebase y db deben estar inicializados con auth.js
  // Autenticación
  firebase.auth().onAuthStateChanged(user => {
    if (!user) { window.location.href="login.html"; return; }
  });

// destruir (vaciar) todos los charts actuales
window.__charts = window.__charts || {};

// destruir todos los charts al salir de la pagina
window.addEventListener("beforeunload", () => {
  for (const k in window.__charts) {
    if (window.__charts[k]) try { window.__charts[k].destroy(); } catch(e) {}
  }
});

    const hoy = new Date();
    const yyyy = hoy.getFullYear();
    const mm = String(hoy.getMonth() + 1).padStart(2, '0');
    const dd = String(hoy.getDate()).padStart(2, '0');
    const fechaHoy = `${yyyy}-${mm}-${dd}`;
    document.getElementById("fechaDesde").value = fechaHoy;
    document.getElementById("fechaHasta").value = fechaHoy;

    async function cargarDatos() {

 document.getElementById("resumen").innerHTML = `<p><b>Procesando, por favor espere...</b></p>`;

      const fechaDesde = document.getElementById("fechaDesde").value;
      const fechaHasta = document.getElementById("fechaHasta").value;

      let ref = db.collection("USO_DIARIO")
        .orderBy(firebase.firestore.FieldPath.documentId());

      const snap = await ref.get();
      const fechas = [];
      const lecturas = [];
      const escrituras = [];
      const eliminaciones = [];

      snap.forEach(doc => {
        const fecha = doc.id;
        if (fechaDesde && fecha < fechaDesde) return;
        if (fechaHasta && fecha > fechaHasta) return;

        const data = doc.data();
        fechas.push(fecha);
        lecturas.push(data.lecturas || 0);
        escrituras.push(data.escrituras || 0);
        eliminaciones.push(data.eliminaciones || 0);
      });

      generarResumen(lecturas, escrituras, eliminaciones);
      generarGrafico("graficoLecturas", "Lecturas por día", fechas, lecturas);
      generarGrafico("graficoEscrituras", "Escrituras por día", fechas, escrituras);
      generarGrafico("graficoEliminaciones", "Eliminaciones", fechas, eliminaciones);
    }

    function generarResumen(lecturas, escrituras, eliminaciones) {
      const totalLect = lecturas.reduce((a,b)=>a+b,0);
      const totalEsc = escrituras.reduce((a,b)=>a+b,0);
	  const totalEli = eliminaciones.reduce((a,b)=>a+b,0);

      document.getElementById("resumen").innerHTML = `<div class='p-4 bg-blue-100 text-center rounded-md'>
          <h3 class='font-bold text-lg'>Total Lecturas</h3>
          <p class='text-2xl'>${totalLect}</p>
        </div>
        <div class='p-4 bg-green-100 text-center rounded-md'>
          <h3 class='font-bold text-lg'>Total Escrituras</h3>
          <p class='text-2xl'>${totalEsc}</p>
        </div>
		<div class='p-4 bg-red-100 text-center rounded-md'>
		<h3 class='font-bold text-lg'>Total Eliminaciones</h3>
		<p class='text-2xl'>${totalEli}</p>
		</div>
        <div class='p-4 bg-yellow-100 text-center rounded-md'>
          <h3 class='font-bold text-lg'>Total Operaciones</h3>
          <p class='text-2xl'>${totalLect + totalEsc + totalEli}</p>
        </div>
        <div >
        </div>
        <div style='background-color:#E4E4E7; text-align:center; border-radius:46px;'>
          <h3 class='font-bold text-lg'>Limites de Firebase x dia</h3>
          <p class='font-size:6px ;text-2xl'>escrituras/dia: 20.000</p>
          <p class='font-size:6px ;text-2xl'>lecturas/dia: 50.000</p>
          <p class='font-size:6px ;text-2xl'>eliminaciones/dia: 20.000</p>
        </div>
		`;
    }

// nueva versión de generarGrafico (reemplaza la anterior)
function generarGrafico(canvasId, titulo, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;

  const key = "__chart_" + canvasId;

  // Si ya existe un Chart para ese canvas, lo destruimos
  if (window.__charts[key]) {
    try { window.__charts[key].destroy(); } catch (e) { console.warn("Error destruyendo chart previo:", e); }
    window.__charts[key] = null;
  }

  // Cuando no hay datos, limpiamos canvas y mostramos un mensaje ligero
  if (!labels || labels.length === 0) {
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // opcional: mostrar texto en el canvas
    ctx.font = "14px Arial";
    ctx.fillStyle = "#666";
    ctx.textAlign = "center";
    ctx.fillText("Sin datos para mostrar", canvas.width / 2, canvas.height / 2);
    return;
  }

  // Crear nuevo chart y guardarlo en window.__charts
  const ctx = canvas.getContext("2d");
  window.__charts[key] = new Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: titulo,
        data: data,
        borderWidth: 2,
        tension: 0.2,
        fill: false
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true },
        tooltip: { mode: "index", intersect: false }
      },
      interaction: { mode: "nearest", axis: "x", intersect: false },
      scales: {
        x: { display: true },
        y: { display: true, beginAtZero: true }
      }
    }
  });
}

    function exportarCSV() {
      let csv = "fecha,lecturas,escrituras";
      db.collection("USO_DIARIO")
        .orderBy(firebase.firestore.FieldPath.documentId())
        .get().then(snapshot => {
          snapshot.forEach(doc => {
            const d = doc.data();
            csv += `${doc.id},${d.lecturas || 0},${d.escrituras || 0}`;
          });

          const blob = new Blob([csv], { type: "text/csv" });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "uso_firebase.csv";
          a.click();
        });
    }

    //cargarDatos();
  </script>
</body>
</html>
