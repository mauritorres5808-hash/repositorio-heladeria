<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ABM de Formas de Pago</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<script src="js/auth.js"></script>  <!-- 🔹 Aquí se verifica la autenticacion-->

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }
    .contenedor {
      max-width: 820px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }
    h2 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      padding: 6px;
      width: 250px;
      margin-bottom: 10px;
    }
    button {
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
    }
    button:hover {
      background-color: #0056b3;
    }
    #modalBusqueda {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    #contenidoModal {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      max-height: 70%;
      overflow-y: auto;
    }
    table {
      width: 80%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 6px;
      text-align: left;
    }
	
	th { background-color: #f2f2f2; }

    tr:hover {
      background-color: #f1f1f1;
      cursor: pointer;
    }
    .input-pequeno {
      width: 100px;
      height: 14px;
    }
	input, select {
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-top: 4px;
      font-size: 14px;
    }
	
.boton-redondeado {
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
}
/* Estado deshabilitado (sin perder estilo) */
.boton-redondeado:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}
  </style>
            <link rel="stylesheet" href="css/estilos.css">
			
			
</head>
<body>
  <div class="contenedor">
    <h2>Mantenimiento de Formas de Pago</h2>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="id_fpago">Codigo de Forma de Pago</label>
        <input class="input-pequeno" type="number" id="id_fpago" placeholder="Ingrese código" />
        <button id="btnVerificar">&#9989; Verificar</button>
        <button id="btnBuscar">&#128269; Buscar</button>
      </div>
    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div>
        <label for="descripcion">Descripcion</label>
        <input type="text" id="descripcion" />
      </div>
	  <div>
		<label for="deshabili">Deshabilitado?</label>
		<input class="input-pequeno" type="checkbox" id="deshabili">
	  </div>
    </div>

    <br>
    <div>
      <button class="boton-redondeado" id="btnAlta">&#10133; Alta</button>
      <button class="boton-redondeado" id="btnModificar">&#9999;&#65039; Modificar</button>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
      <button onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
    </div>

    <div id="listado">    </div>

    <!-- Modal de búsqueda -->
    <div id="modalBusqueda">
      <div id="contenidoModal" align="center">
        <h3>Buscar F.Pago por descripcion</h3>
        <input type="text" id="txtBuscarNombre" placeholder="Ingrese parte de la descripcion" />
        <button id="btnBuscarFPago">Buscar</button>
        <table id="tablaResultados">
          <thead>
            <tr><th>ID</th><th>Descripcion</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <br>
        <button id="btnCerrarModal">Cerrar</button>
      </div>
    </div>
  </div>

  <script>

verificarSesion();


document.addEventListener("DOMContentLoaded", () => {
	aplicarPermisos();
});
</script>

<script src="js/permisos.js"></script>

<script>
// control de permisos
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(12)) {
        //if (btn) btn.style.display = "none";
		if (btn) btn.disabled = true;
		btn.title = "No tiene permiso para usar esta funcion";
		if (btn2) btn2.disabled = true;
		btn2.title = "No tiene permiso para usar esta funcion";
    }
};

ArmarTabla();

    const idFpago = document.getElementById("id_fpago");
    const descripcion = document.getElementById("descripcion");

    // --- Verificar existencia ---
    document.getElementById("btnVerificar").onclick = async () => {
      const codigo = parseInt(idFpago.value);
      if (!codigo) return alert("Ingrese un código válido.");
      const docSnap = await db.collection("F_PAGO").doc(String(codigo)).get();
      if (docSnap.exists) {
        const data = docSnap.data();
        descripcion.value = data.descripcion;
        document.getElementById("deshabili").checked = (data.deshabilitado === "S");
      } else {
        alert("Forma de Pago no encontrada.");
        limpiarCampos();
      }
    };

    // --- Alta ---
    document.getElementById("btnAlta").onclick = async () => {
      if (idFpago.value)
        return alert("Para dar de alta NO debe ingresar un codigo."+"\n"+"Este se genera automaticamente."+"\n"+"Borrarlo y volver a presionar el boton de ALTA");;
      if (!await validarCampos()) return;

      const snapshot = await db.collection("F_PAGO")
        .orderBy("id_fpago", "desc").limit(1).get();
      let nuevoId = 1;
      if (!snapshot.empty) nuevoId = snapshot.docs[0].data().id_fpago + 1;

      await db.collection("F_PAGO").doc(String(nuevoId)).set({
        id_fpago: nuevoId,
        descripcion: descripcion.value.trim(),
        deshabilitado: document.getElementById("deshabili").checked ? "S" : "N"
      });

      alert(`Forma de Pago agregada con código ${nuevoId}`);
      limpiarCampos();
	  ArmarTabla();

    };

    // --- Modificar ---
    document.getElementById("btnModificar").onclick = async () => {
      const codigo = parseInt(idFpago.value);
      if (!codigo) return alert("Ingrese un código válido.");
      if (!await validarCampos()) return;

      const deshab = document.getElementById("deshabili").checked ? "S" : "N";

      await db.collection("F_PAGO").doc(String(codigo)).update({
        descripcion: descripcion.value.trim(),
        deshabilitado: deshab
      });
      alert("Forma de Pago actualizada correctamente.");
      limpiarCampos();
	  ArmarTabla();

    };

    async function validarCampos() {
      if (!descripcion.value.trim()) { alert("Ingrese la descripcion."); return false; }
      return true;
    }

    function limpiarCampos() {
      idFpago.value = "";
      descripcion.value = "";
      document.getElementById("deshabili").checked = false;
    }

    // --- Modal búsqueda ---
    const modal = document.getElementById("modalBusqueda");
    document.getElementById("btnBuscar").onclick = () => modal.style.display = "flex";
    document.getElementById("btnCerrarModal").onclick = () => modal.style.display = "none";

    document.getElementById("btnBuscarFPago").onclick = async () => {
      const texto = document.getElementById("txtBuscarNombre").value.trim().toLowerCase();
      if (!texto) return alert("Ingrese texto a buscar.");

      const tablaBody = document.querySelector("#tablaResultados tbody");
      tablaBody.innerHTML = "";

      const snapshot = await db.collection("F_PAGO").get();
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.descripcion.toLowerCase().includes(texto)) {
          const fila = document.createElement("tr");
          fila.innerHTML = `<td>${data.id_fpago}</td><td>${data.descripcion}</td>`;
          fila.onclick = () => {
            idFpago.value = data.id_fpago;
            descripcion.value = data.descripcion;
            document.getElementById("deshabili").checked = (data.deshabilitado === "S");
            modal.style.display = "none";
          };
          tablaBody.appendChild(fila);
        }
      });
    };

	// listado de los fpagos
    function ArmarTabla() {
	
      db.collection("F_PAGO")
		.get()
        .then((querySnapshot) => {
          let html = "";

        if (querySnapshot.empty) {
            html += "<p>No se encontraron formas de pago.</p>";
          } else {
            html += "<table><tr><th>Codigo</th><th>Descripcion</th><th>Deshabilitado</th></tr>";
			let cant = 0;
            querySnapshot.forEach((doc) => {
              const data = doc.data();
              html += `<tr>
                <td>${data.id_fpago}</td>
                <td>${data.descripcion}</td>
                <td>${data.deshabilitado || "N"}</td>
              </tr>`;
			cant += 1;
            });
			html += `<tr class="total-row" style="font-weight:bold;background:#f2f2f2">
			  <td colspan="1">CANTIDAD </td>
			  <td>${cant || "0"}</td>
			  <td></td>
			</tr>`;
            html += "</table>";
          }
          document.getElementById("listado").innerHTML = html;
        })
        .catch((error) => {
          console.error("Error buscando grupos: ", error);
        });
    }

  </script>
  
<script src="js/medidor.js"></script>

</body>
</html>
