<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">

<script src="JS/auth.js"></script>  <!-- Aqui se verifica la autenticacion -->

  <title>Menú de Caja</title>

  <style>
    table {
      width: 60%;
      border-collapse: collapse;
      margin: 20px auto;
    }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin-top: 10px;

    background:
    linear-gradient(
        135deg,
        #6DB7FF,
        #B8E6FE
    );

    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    min-height: 100vh;
}


.contenedor {
    max-width: 427px;
    margin: auto;
    background: white;
    padding: 15px;
    border: none;
    border-radius: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,.15);
    font-size: 18px;
}

.menu-grid{
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:15px;
    margin-top:20px;
    justify-items:center;
}

    /* Centrar el contenido dentro de cada celda */
    td {
      text-align: center;
      vertical-align: middle;
      padding: 10px;
      border: 0px solid #0E0D0C;
    }

.boton-redondeado,
.boton-redondeado3 {
    width: 180px;
    height: 70px;
	  background-color: #007bff; /* Color por defecto */
    color: white;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    box-shadow: 0 6px 16px rgba(0,0,0,.15);
    transition: transform .25s ease, background-color .25s ease;
    padding:5px;
}

.boton-redondeado2 {
  width: 180px;              /* Mismo ancho */
  height: 70px;              /* Mismo alto */
  background-color: #4E4E55; /* Color por defecto */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: background-color 0.3s ease;
  display: flex;             /* Centrar texto dentro */
  flex-direction: column;    /* Permitir varias líneas */
  justify-content: center;   /* Centrado vertical */
  align-items: center;       /* Centrado horizontal */
  text-align: center;        /* Centrar texto */
  line-height: 1.2;          /* Espaciado entre líneas */
  padding: 5px;              /* Menor padding para evitar desbordes */
  box-sizing: border-box;    /* Incluye padding en el alto total */
}

.boton-salirvolver {
  background-color: #555;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px 30px;
  font-size: 14px;
  cursor: pointer;
  transition: background-color 0.3s ease;
}
	
/* Botón verde (solo cambia color base) */
.boton-redondeado3 {
  background-color: green;
}
/* Opcional: hacer que <small> se vea armónico */
button small {
  font-size: 11px;
  font-weight: normal;
  opacity: 0.9;
}

	
/* Efecto hover */
button:hover {
  background-color: red;
  color: white;
transform: translateY(-4px);
filter: brightness(1.08);
}

    h3 {
      text-align: center;
      background-color: #8AC0FF;
      padding: 10px;
      border-radius: 8px;
    }
	
/* Estado deshabilitado (sin perder estilo) */
.boton-redondeado:disabled,
.boton-redondeado3:disabled {
  background-color: #cccccc !important;
  color: #666666 !important;
  cursor: not-allowed !important;
}

  </style>
    <link rel="stylesheet" href="CSS/estilos.css">


</head>

<body>

  <div class="contenedor">
    <h3>&#128176; Menú de CAJA</h3>
	<div style="text-align:center; font-size:13px; border: 0px solid #0E0D0C; max-width: 520px; margin: auto; border-radius:8px;">👤 Usuario: <b><span id="userLabel"></span></div>

    <table>
      <tr>
        <td>
          <button class="boton-redondeado" id="btnApertura" onclick="location.href='apertura-caja.html'">Apertura de Caja</button>
        </td>
        <td>
          <button class="boton-redondeado" id="btnCierre" onclick="location.href='cierre-caja.html'">Cierre de Caja</button>
        </td>
      </tr>

      <tr>
        <td>
          <button class="boton-redondeado" id="btnConsulta" onclick="location.href='consultar-cierres.html'">Consultar Cierres</button>
        </td>
        <td>
          <button class="boton-redondeado" id="btnAnular" onclick="location.href='anular-cierre.html'">Anular ultimo cierre</button>
        </td>
      </tr>

      <tr>
        <td>
          <button class="boton-redondeado" id="btnMovim" onclick="location.href='movimientos.html'">Movimientos de Caja (efectivo)</button>
        </td>
        <td>
          <button class="boton-redondeado" id="btnAnulaMovim" onclick="location.href='anular-movimientos.html'">Anular Movimientos de Caja</button>
        </td>
      </tr>

      <tr>
        <td>
          <button class="boton-redondeado" id="btnLisMovim" onclick="location.href='listado_movimientos.html'">Ver Movimientos de Caja</button>
        </td>
        <td>
       <!--    <button class="boton-redondeado3" onclick="location.href='otra.html'">Otra opción</button> -->
        </td>
      </tr>

      <tr>
        <td colspan="2">
          <button id="btnVolver" class="boton-salirvolver" onclick="location.href='index.html'">&#8617; Volver</button>
        </td>
      </tr>
    </table>

  </div>
  
<script>

verificarSesion(); 
document.getElementById("userLabel").textContent = localStorage.getItem("usuarioNombre");

// BLOQUEA TODOS LOS BOTONES AL CARGAR LA PÁGINA (menos boton Volver)
document.addEventListener("DOMContentLoaded", async () => {

    // Deshabilitar todos los botones
    const botones = document.querySelectorAll("button");
    botones.forEach(btn => {
        if (btn.id !== "btnVolver") {
            btn.disabled = true;
            btn.title = "No tiene permiso para usar esta función";
        }
    });

    // Esperar permisos
    await cargarPermisosUsuario();

    // Aplicar permisos
    aplicarPermisos();
});

</script>

<script src="JS/permisos.js"></script>

<script>
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnApertura");
    if (tienePermiso(40)) {
		if (btn) btn.disabled = false;
		btn.title = "";
    }
    const btn2 = document.getElementById("btnCierre");
    if (tienePermiso(41)) {
		if (btn2) btn2.disabled = false;
		btn2.title = "";
    }
    const btn3 = document.getElementById("btnConsulta");
    if (tienePermiso(42)) {
		if (btn3) btn3.disabled = false;
		btn3.title = "";
    }
    const btn4 = document.getElementById("btnAnular");
    if (tienePermiso(43)) {
		if (btn4) btn4.disabled = false;
		btn4.title = "";
    }
    const btn5 = document.getElementById("btnMovim");
    if (tienePermiso(44)) {
		if (btn5) btn5.disabled = false;
		btn5.title = "";
    }
    const btn6 = document.getElementById("btnLisMovim");
    if (tienePermiso(46)) {
		if (btn6) btn6.disabled = false;
		btn6.title = "";
    }
    const btn7 = document.getElementById("btnAnulaMovim");
    if (tienePermiso(45)) {
		if (btn7) btn7.disabled = false;
		btn7.title = "";
    }
};
</script>
	
</body>
</html>
