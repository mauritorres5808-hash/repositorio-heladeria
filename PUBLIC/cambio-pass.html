<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cambiar Contraseña</title>

  <script src="JS/auth.js"></script>


<style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 350px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
    }

	 input {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #999;
    }

    button {
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

button:hover {
  background: red;
}
    .alert-modern{background:#e9f7ef;border-left:6px solid #28a745;padding:10px;border-radius:6px;margin:10px 0; font-style: italic;}
 	label { font-weight: bold; margin-right: 10px; }
 
</style>

</head>
<body>

<div class="contenedor">
  <div class="card">
  <h2>&#128274; Cambiar mi contraseña</h2>
    <div style="text-align:center; font-size:15px;">
    Usuario: <b><span id="userLabel"></span></b>
  </div>
  <br><br>
  <label>Contraseña Actual</label>
  <input type="password" id="passActual" onkeydown="if(event.key==='Enter')passNueva.focus()">
<br><br>
  <label>Nueva Contraseña</label>
  <input type="password" id="passNueva">
<br><br>
      <div id="mensajeTipo" class="alert-modern">
        El cambio será aplicará en su proximo ingreso al sistema
      </div>

<br>
  <button onclick="cambiarPass()">💾 Cambiar Contraseña</button>

  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<button onclick="location.href='menu-general.html'">&#8617; Volver</button>
</div>
</div>

<script>

verificarSesion();

document.getElementById("userLabel").textContent = localStorage.getItem("usuarioEmail");

passActual.focus()

async function cambiarPass() {

    const passActual = document.getElementById("passActual").value.trim();
    const passNueva = document.getElementById("passNueva").value.trim();

    if (!passActual || !passNueva) {
		await mostrarAlerta({mensaje: `Debe completar las dos contraseñas`});
        return;
    }
    if (passNueva.length < 6) {
		await mostrarAlerta({mensaje: `La nueva contraseña debe tener al menos 6 caracteres`});
        return;
    }

    try {

        const resp =
            await fetch('/api/usuarios/cambiar-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: localStorage.getItem("usuarioEmail"),
                    passActual,
                    passNueva
                })
            });

        const data = await resp.json();

        if (!data.ok) {
            //alert(data.mensaje || 'Error');
			await mostrarAlerta({mensaje: data.mensaje});
            return;
        }

		await mostrarAlerta({mensaje: `Contraseña cambiada correctamente`,icono:`&#10004;`});

        document.getElementById("passActual").value = "";
        document.getElementById("passNueva").value = "";

    } catch (error) {
        console.error(error);
        alert("Error cambiando contraseña.");
    }
}

</script>
<script src="JS/modal.js"></script>

</body>
</html>
