<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configuración Empresa</title>

<script src="JS/auth.js"></script>

<style>

body{
    font-family:Arial;
    background:#8AC0FF;
    margin:0;
    padding:20px;
}

.contenedor{
    max-width:650px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    background:#8AC0FF;
    padding:12px;
    border-radius:8px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input{
    width:40%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    background:#007bff;
}

button:hover{
    background:red;
}

.botones{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:25px;
}

.chk{
    width:auto;
    transform:scale(1.4);
}

.msg{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}


/* modal Horarios */
#horariosContainer{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:15px;
}

.modal-horarios{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

.modal-horarios-box{
    background:white;
    width:95%;
    max-width:900px;
    max-height:80vh;
    overflow:auto;
    border-radius:12px;
    padding:20px;
}

.dia-card{
    width:220px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    margin-bottom:00px;
    background:#8BF0FE;
}

.dia-card h3{
    margin-top:0;
    margin-bottom:10px;
}

.franja{
    display:flex;
    gap:6px;
    margin-top:8px;
    align-items:center;
}
.franja input[type="time"]{
    width:90px;
    height:24px;
    padding:0 4px;
    font-size:13px;
}
/* fin modal Horarios */

.alert-modern{background:#e9f7ef;border-left:6px solid red;padding:10px;border-radius:6px;margin:10px 0; font-style: italic;}


</style>
</head>

<body>

<div class="contenedor">

    <h2>⚙️ Configuración Empresa</h2>

    <div class="form-group">
        <span <label><b>Nombre</b></label>
        <input type="text" id="nombre" onkeydown="if(event.key==='Enter')domicilio.focus()"></span>
    </div>

    <div class="form-group">
        <span <label><b>Domicilio</b></label>
        <input type="text" id="domicilio" onkeydown="if(event.key==='Enter')telefono.focus()"></span>
    </div>

    <div class="form-group">
        <span <label><b>Teléfono</b></label>
        <input type="text" id="telefono" 
		     placeholder="54 9113 456 7890"
             oninput="validarTelefonoUI(this)"
		onkeydown="if(event.key==='Enter')alias.focus()"></span>
    </div>
      <div id="telefonoMsg"
           style="
              font-size:13px;
              margin-top:3px;
              color:#b00;
           ">
      </div>

    <div class="form-group">
        <span <label><b>Alias para pagos</b></label>
        <input type="text" id="alias" onkeydown="if(event.key==='Enter')alias_nombre.focus()"></span>
    </div>
    <div class="form-group">
        <span <label><b>Alias a nombre de </b></label>
        <input type="text" id="alias_nombre" onkeydown="if(event.key==='Enter')fecha_vigencia.focus()"></span>
    </div>






    <div class="botones">
        <button onclick="guardar()">
            💾 Guardar cambios
        </button>

        <button onclick="location.href='menu-general.html'">
            &#8617;  Volver
        </button>

		<button
			class="boton-redondeado"
			onclick="abrirModalHorarios()">
			🕒 Configurar Horarios
		</button>

    </div>

    <div class="msg" id="msg"></div>

</div>

<script>

verificarSesion();

/*
if (parseInt(localStorage.getItem("usuarioId")) != 1) {
    window.location.href = "index.html";
}
*/

cargarEmpresa();
nombre.focus();

const diasSemana = [
    {id:1,nombre:"Lunes"},
    {id:2,nombre:"Martes"},
    {id:3,nombre:"Miércoles"},
    {id:4,nombre:"Jueves"},
    {id:5,nombre:"Viernes"},
    {id:6,nombre:"Sábado"},
    {id:7,nombre:"Domingo"}
];

let horariosActuales = [];



// ======================================
// CARGAR EMPRESA
// ======================================
async function cargarEmpresa(){

    try{
        const resp = await fetch('/api/empresa');
        const emp = await resp.json();

        document.getElementById("nombre").value = emp.nombre || '';
        document.getElementById("domicilio").value = emp.domicilio || '';
        document.getElementById("telefono").value = emp.telefono || '';
        document.getElementById("alias").value = emp.alias || '';
        document.getElementById("alias_nombre").value = emp.alias_nombre || '';

    }catch(err){
        console.error(err);
        alert("Error cargando empresa");
    }
}

// ======================================
// GUARDAR
// ======================================
async function guardar(){

    try{

        const body = {

            nombre: document.getElementById("nombre").value,
            domicilio: document.getElementById("domicilio").value,
            telefono: normalizarTelefono(document.getElementById("telefono").value),
            alias: document.getElementById("alias").value,
            alias_nombre: document.getElementById("alias_nombre").value
        };

        const resp = await fetch('/api/empresa', {
            method:'PUT',
            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(body)
        });

        const data = await resp.json();

        if(!data.ok){
            alert(data.error || 'Error guardando');
            return;
        }

        document.getElementById("msg").innerHTML = "✅ Datos guardados correctamente";

    }catch(err){
        console.error(err);
        alert("Error guardando");
    }
}


async function cargarHorarios(){
    const tipo = document.getElementById("tipoHorario").value;
    const resp = await fetch(`/api/horarios/${tipo}`);
    const data = await resp.json();
    horariosActuales = data.horarios || [];
    renderHorarios();
}

async function abrirModalHorarios(){
    document.getElementById("modalHorarios").style.display="flex";
    await cargarHorarios();
}

async function cerrarModalHorarios(){
    document.getElementById("modalHorarios").style.display="none";
}


function renderHorarios(){

    const cont = document.getElementById("horariosContainer");

    cont.innerHTML = "";

    diasSemana.forEach(dia => {

        const horariosDia = horariosActuales.filter(
                h => Number(h.dia) === dia.id
            );

        let html = `<div class="dia-card">
            <h3>${dia.nombre}</h3>
            <div id="dia_${dia.id}">
        `;

        horariosDia.forEach((h,idx)=>{
            html += `
            <div class="franja">
                <input
                    type="time"
                    value="${h.desde.substring(0,5)}"
                    class="desde">
                <input
                    type="time"
                    value="${h.hasta.substring(0,5)}"
                    class="hasta">
                <button style="width:90px;
						height:24px;
						width:44px;
						padding:0 4px;
						font-size:13px;
						background: #C1C1C8;"
                    onclick="eliminarFranja(${dia.id},${idx})">
                    ❌
                </button>
            </div>
            `;
        });

        html += `
            <br>
            </div>
            <button style="background: #14BD55"
                onclick="agregarFranja(${dia.id})">
                ➕ Agregar horario
            </button>

        </div>
        `;
        cont.innerHTML += html;

    });
}

function agregarFranja(dia){

	actualizarHorariosDesdePantalla();

    horariosActuales.push({
        dia,
        desde:"11:00",
        hasta:"22:00"
    });
    renderHorarios();
}

function eliminarFranja(dia,idx){

	actualizarHorariosDesdePantalla();

    const lista =
        horariosActuales.filter(
            h => Number(h.dia) === dia
        );

    const item = lista[idx];

    horariosActuales =
        horariosActuales.filter(
            h => h !== item
        );
    renderHorarios();
}

function actualizarHorariosDesdePantalla(){

    const nuevo = [];

    diasSemana.forEach(dia => {

        const cont = document.getElementById(`dia_${dia.id}`);

        if (!cont) return;

        const franjas = cont.querySelectorAll(".franja");

        franjas.forEach(f => {
            nuevo.push({
                dia: dia.id,
                desde: f.querySelector(".desde").value,
                hasta: f.querySelector(".hasta").value
            });
        });
    });

    horariosActuales = nuevo;
}


async function guardarHorarios(){

    const nuevo = [];

    diasSemana.forEach(dia => {

        const cont = document.getElementById(`dia_${dia.id}`);

        const franjas = cont.querySelectorAll(".franja");

        franjas.forEach(f => {
            nuevo.push({
                dia: dia.id,
                desde: f.querySelector(".desde").value,
                hasta: f.querySelector(".hasta").value
            });
        });
    });

    const tipo = document.getElementById("tipoHorario").value;

    const resp = await fetch(`/api/horarios/${tipo}`,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                horarios:nuevo
            })
        });

    const data = await resp.json();

    if(data.ok){
		await mostrarAlerta({mensaje: `Horarios guardados correctamente`,icono:`&#10004;`});
    }
}


// =====================================================
// VALIDACION TELEFONO
// =====================================================
function validarTelefonoUI(input){

  const msg = document.getElementById("telefonoMsg");

  let valor = input.value.replace(/\D/g,"");

  if (valor.length >= 2 && valor.length <= 6){
    input.value =
      valor.slice(0,2)
      + (valor.length > 2
          ? " " + valor.slice(2)
          : "");
  } else if (valor.length > 6){
    input.value =
      valor.slice(0,2)
      + " "
      + valor.slice(2,6)
      + " "
      + valor.slice(6);
  }

  const ok = normalizarTelefono(input.value);

  if (ok){
    input.style.borderColor = "green";
    msg.style.color = "green";
    msg.innerText = "✓ Número válido → " + ok;
  } else {
    input.style.borderColor = "red";
    msg.style.color = "#b00";
    msg.innerText = "Formato inválido. Ej: 54 9113 456 7890";
  }
}

// =====================================================
// NORMALIZAR TELEFONO
// =====================================================
function normalizarTelefono(tel){

  tel = tel.replace(/\D/g,"");

  if (tel.startsWith("54911") && tel.length === 13) {return "+" + tel;}
  if (tel.startsWith("911") && tel.length === 11) {return "+54" + tel;}
  if (tel.startsWith("11") && tel.length === 10) {return "+549" + tel;}
  return null;
}



</script>

<script src="JS/modal.js"></script>


<div id="modalHorarios" class="modal-horarios">
    <div class="modal-horarios-box">
        <h2>🕒 Configuración de Horarios</h2>
        <div style="margin-bottom:15px">
            <span <label><b>Tipo de Horario </b></label>
			<select
				id="tipoHorario"
				onchange="cargarHorarios()"
				style="
					width:180px;
					height:35px;
					font-size:16px;
					font-weight:bold;
					border-radius:10px;
					border:2px solid #8AC0FF;
					background:#f8fbff;
					padding:0 10px;
				">
				<option value="L">🏠 Local</option>
				<option value="P">🌐 Pedidos Online</option>
				<option value="D">🚀 Delivery</option>
			</select></span>
			<button
                class="boton-redondeado2"
                onclick="cerrarModalHorarios()">
                &#8617; Cerrar
            </button>
		<div id="mensajeTipo" class="alert-modern">Debe guardar los cambios ANTES de cambiar de tipo de horario</div>

	</div>
        <div id="horariosContainer"></div>
        <div style="margin-top:20px;text-align:center;">
            <button
                class="boton-redondeado"
                onclick="guardarHorarios()">
                💾 Guardar cambios
            </button>
            <button
                class="boton-redondeado2"
                onclick="cerrarModalHorarios()">
                &#8617; Cerrar
            </button>
        </div>
    </div>
</div>

</body>
</html>
