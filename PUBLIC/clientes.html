function volver() {
    const back = localStorage.getItem("paginaAnterior");
    if (back) {
		localStorage.removeItem("paginaAnterior"); // ← la borro acá
        window.location.href = back;
    } else {
        history.back(); // por si no hay nada guardado
    }
}

<script>

// control de permisos
window.aplicarPermisos = function() {
    const btn = document.getElementById("btnAlta");
    const btn2 = document.getElementById("btnModificar");

    if (!tienePermiso(13)) {
		if (btn) btn.disabled = true;
		btn.title = "No tiene permiso para usar esta funcion";
		if (btn2) btn2.disabled = true;
		btn2.title = "No tiene permiso para usar esta funcion";
    }
};

const idCliente = document.getElementById("id_cliente");
    const nombre = document.getElementById("nombre");
    const domicilio = document.getElementById("domicilio");
    const telefono = document.getElementById("telefono");

    // --- Verificar existencia ---
    document.getElementById("btnVerificar").onclick = async () => {

	  const msg = document.getElementById("msgValidacionDom");
	  msg.textContent = "";

	  const codigo = parseInt(idCliente.value);

	  if (!codigo) {
		return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});
	  }

	  const resp = await fetch(`/api/clientes/${codigo}`);

	  if (!resp.ok) {
		await mostrarAlerta({mensaje: `Cliente no encontrado`});
		limpiarCampos();
		return;
	  }

	  const data = await resp.json();

	  nombre.value = data.nombre;
	  domicilio.value = data.domicilio;
	  telefono.value = data.telefono;

	  document.getElementById("deshabili").checked =
		(data.deshabilitado === 1);

	  nota.value = data.nota || "";
	};


//-------------------------------------------
// ---------------- Eliminar ----------------
//-------------------------------------------
document.getElementById("btnEliminar").onclick = async () => {

		const id = parseInt(idCliente.value);

		if (!id)
			return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});

  		const confirmar = await mostrarConfirm({
		  mensaje: "¿Eliminar definitivamente el Cliente # " + id + " ?",
		  textoAceptar: "Sí, eliminarlo",
		  textoCancelar: "No"
		});
		if (!confirmar) {
		  return;
		}	


		const resp = await fetch(`/api/clientes/${id}`,
			{
				method: 'DELETE'
			}
		);

		const data = await resp.json();

		if (data.ok) {
			await mostrarAlerta({mensaje: `Cliente eliminado`,icono:`&#10004;`});
		} else {
			await mostrarAlerta({mensaje: data.mensaje + "\n Si el Cliente esta asignado a alguna Venta"
			+ " no puede eliminarlo."});
			return;
		}

	  limpiarCampos();
}

    // --- Alta ---
	document.getElementById("btnAlta").onclick = async () => {

	  if (idCliente.value) {
		return await mostrarAlerta({mensaje: `Para dar de alta NO debe ingresar el codigo.\n
				Este se genera automaticamente.\n
				Borrar el codigo, cargar los demas campos y volver a presionar ALTA
		`});
		return;
    }
	  if (!await validarCampos()) return;

	  if (!validarFormatoDomicilio(domicilio.value)) {
		await mostrarAlerta({mensaje: `El domicilio debe terminar en 'Bs As' o 'CABA'`});
		return;
	  }

	  const direccionValida = await validarDireccion(domicilio.value.trim());

	  if (!direccionValida) {

		const seguir = confirm(
		  "La dirección no fue validada.\n¿Desea continuar igualmente?"
		);

		if (!seguir) return;
	  }

	  const resp = await fetch('/api/clientes', {
		method: 'POST',
		headers: {
		  'Content-Type': 'application/json'
		},
		body: JSON.stringify({
		  nombre: nombre.value.trim(),
		  domicilio: domicilio.value.trim(),
		  telefono: telefono.value.trim(),
		  nota: nota.value.trim(),
		  deshabilitado:
			document.getElementById("deshabili").checked ? 1 : 0
		})
	  });

	  const data = await resp.json();

	  await mostrarAlerta({mensaje: `Cliente agregado con código ${data.id_cliente}`,icono:`&#10004;`});

	  limpiarCampos();
	};    

    // --- Modificar ---
	document.getElementById("btnModificar").onclick = async () => {

	  const codigo = parseInt(idCliente.value);

	  if (!codigo) {
		return await mostrarAlerta({mensaje: `Ingrese un codigo valido`});
	  }

	  if (!await validarCampos()) return;

	  if (!validarFormatoDomicilio(domicilio.value)) {
		await mostrarAlerta({mensaje: `El domicilio debe terminar en 'Bs As' o 'CABA'`});
		return;
	  }

	  const direccionValida = await validarDireccion(domicilio.value.trim());

	  if (!direccionValida) {

		const seguir = confirm(
		  "La dirección no fue validada.\n¿Desea continuar igualmente?"
		);

		if (!seguir) return;
	  }

	  const resp = await fetch(`/api/clientes/${codigo}`, {
		method: 'PUT',
		headers: {
		  'Content-Type': 'application/json'
		},
		body: JSON.stringify({
		  nombre: nombre.value.trim(),
		  domicilio: domicilio.value.trim(),
		  telefono: telefono.value.trim(),
		  nota: nota.value.trim(),
		  deshabilitado: document.getElementById("deshabili").checked ? 1 : 0
		})
	  });

	  if (!resp.ok) {
		alert("Error modificando cliente");
		return;
	  }

	  await mostrarAlerta({mensaje: `Cliente actualizado correctamente`,icono:`&#10004;`});

	  limpiarCampos();
	};    

    async function validarCampos() {
      if (!nombre.value.trim()) { 
		  await mostrarAlerta({mensaje: `Ingrese el nombre`});
		  return false; 
	  }
      if (!domicilio.value.trim()) { 
			await mostrarAlerta({mensaje: `Ingrese el domicilio`});
			return false; 
	  }
      if (!telefono.value.trim()) { 
		await mostrarAlerta({mensaje: `Ingrese el telefono`});

		return false; 
	  }
      return true;
    }

    function limpiarCampos() {
      idCliente.value = "";
      nombre.value = "";
      domicilio.value = "";
      telefono.value = "";
      document.getElementById("deshabili").checked = false;
      nota.value = "";
    }

function validarFormatoDomicilio(dom) {
  const d = dom.trim().toLowerCase();
  return d.endsWith("bs as") || d.endsWith("caba");
}


async function validarDireccion(direccion) {
    try {
        const resp = await fetch("/api/verificar-direccion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ direccion })
        });

        const data = await resp.json();
        return data.ok && data.resultados.length > 0;

    } catch (err) {
        console.error("Error verificando dirección:", err);
        return false;
    }
}

// mostrar el mapa del domicilio del cliente
async function distancia() {

    // Espera el resultado ANTES de seguir
    const info = await obtenerDatosEmpresa();
    if (!info) {
        alert("No se pudo obtener el domicilio de la empresa");
        return;
    }

    const origen = info.domicilio;
    const destino = document.getElementById('domicilio').value;

//mostrarMapaDistancia('liniers 89, CABA', 'av albarellos 2500, Buenos Aires');
mostrarMapaDistancia(origen, destino);
    };

async function obtenerDatosEmpresa() {

  try {

    const resp = await fetch('/api/empresa');

    if (!resp.ok) {
      return null;
    }
    const data = await resp.json();

//alert('data.nombre:' + data.nombre);	
//alert('data.domicilio:' + data.domicilio);	
    return {
      nombre: data.nombre || "",
      domicilio: data.domicilio || ""
    };

  } catch (err) {

    console.error(err);

    return null;
  }
}

    // --- Modal búsqueda ---
    const modal = document.getElementById("modalBusqueda");
    document.getElementById("btnBuscar").onclick = () => modal.style.display = "flex";
    document.getElementById("btnCerrarModal").onclick = () => modal.style.display = "none";

	document.getElementById("btnBuscarCliente").onclick = async () => {

	  const texto =
		document.getElementById("txtBuscarNombre")
		  .value
		  .trim()
		  .toLowerCase();

	  if (!texto) {
		return await mostrarAlerta({mensaje: `Ingrese texto a buscar`});
	  }

	  const tablaBody =
		document.querySelector("#tablaResultados tbody");

	  tablaBody.innerHTML = "";

	  const resp = await fetch('/api/clientes');

	  const clientes = await resp.json();

	  clientes.forEach(data => {

		if ((data.nombre || '')
		  .toLowerCase()
		  .includes(texto)) {

		  const fila = document.createElement("tr");

		  fila.innerHTML = `
			<td>${data.id_cliente}</td>
			<td>${data.nombre}</td>
		  `;

		  fila.onclick = () => {

			idCliente.value = data.id_cliente;
			nombre.value = data.nombre;
			domicilio.value = data.domicilio;
			telefono.value = data.telefono;

			document.getElementById("deshabili").checked = (data.deshabilitado === 1);

			nota.value = data.nota || "";

			modal.style.display = "none";
		  };

		  tablaBody.appendChild(fila);
		}
	  });
	};    
	
  </script>
