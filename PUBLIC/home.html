<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Heladería</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f7f8fb;
}

/* HEADER */
header {
  position: sticky;
  top:0;
  background:white;
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:12px 20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  z-index:1000;
}

.logo {
  font-size:20px;
  font-weight:bold;
}

.btn-pedido {
  background:#ff4d4d;
  color:white;
  padding:10px 16px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* HERO */
.hero {
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  color:white;
  padding:40px 20px;
  text-align:center;
}

.hero h1 {
  margin:0;
  font-size:28px;
}

/* PROMOS */
.promos {
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.promo {
  background:#fff3cd;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* PRODUCTOS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  border: 1px solid #ddd;
  border-radius: 8px;
  overflow: hidden;
  background: white;
  transition: 0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.card-body {
  padding: 8px;
}

.precio {
  color: green;
  font-weight: bold;
}

/* SECCIONES */
.seccion-grupo {
  padding: 10px;
}

/* TABS (estilo PedidosYa) */
.tabs {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  gap: 8px;
  overflow-x: auto;
  background: #fff;
  padding: 10px;
  border-top: 1px solid #ddd;
  z-index: 1000;
}

.tab {
  padding: 10px 16px;
  border-radius: 20px;
  background: #eee;
  cursor: pointer;
  white-space: nowrap;
  font-size: 14px;
}

.tab.active {
  background: #007bff;
  color: #fff;
  font-weight: bold;
}

/* BOTON FLOTANTE */
.flotante {
  position:fixed;
  bottom:70px;
  right:20px;
  background:#2ecc71;
  color:white;
  padding:14px 18px;
  border-radius:50px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<header>
  <div class="logo">🍦 Mi Heladería</div>
  <a href="https://donado-2.web.app/pedidos-online.html" class="btn-pedido">Hacer pedido</a>
</header>

<div class="hero">
  <h1>El mejor helado de la zona 😍</h1>
  <p>Elegí tus sabores favoritos y pedí online</p>
</div>

<div class="promos">
  <h2>🔥 Promociones</h2>
  <div class="promo">2kg al precio de 1.5kg</div>
  <div class="promo">Envío gratis en tu primera compra</div>
</div>

<!-- CONTENEDOR PRODUCTOS -->
<div id="contenedorProductos"></div>

<!-- BOTON PEDIDO -->
<a href="https://donado-2.web.app/pedidos-online.html" class="flotante">🛒 Pedir</a>

<!-- TABS -->
<div id="tabsCategorias" class="tabs"></div>

<script>
const API_BASE =
  location.hostname === "localhost"
    ? "http://localhost:3000"
    : "https://whatsapp-backend-tp21.onrender.com";

let productos = [];
let grupos = [];

// ===================== CARGA =====================
async function cargarProductos() {

  const [resProd, resGrupos] = await Promise.all([
    fetch(`${API_BASE}/api/productos`),
    fetch(`${API_BASE}/api/grupos`)
  ]);

  productos = await resProd.json();
  grupos = await resGrupos.json();

  grupos.sort((a,b) => a.id_grupo - b.id_grupo);

  renderUI();
}

// ===================== RENDER =====================
function renderUI() {

  const contTabs = document.getElementById("tabsCategorias");
  const contProd = document.getElementById("contenedorProductos");

  contTabs.innerHTML = "";
  contProd.innerHTML = "";

  grupos.forEach(g => {

    const lista = productos.filter(p => p.id_grupo == g.id_grupo);
    if (lista.length === 0) return;

    // TAB
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = g.descripcion;
    tab.dataset.id = g.id_grupo;

    tab.onclick = () => {
      document.getElementById("grupo_" + g.id_grupo)
        .scrollIntoView({ behavior: "smooth" });
      activarTab(g.id_grupo);
    };

    contTabs.appendChild(tab);

    // SECCION
    const seccion = document.createElement("div");
    seccion.id = "grupo_" + g.id_grupo;
    seccion.className = "seccion-grupo";

    seccion.innerHTML = `<h2>${g.descripcion}</h2>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    lista.forEach(p => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.imagen || 'img/no-image.jpg'}"
             onerror="this.src='img/no-image.jpg'">
        <div class="card-body">
          <div><b>${p.descripcion}</b></div>
          <div class="precio">$${p.precio}</div>
        </div>
      `;

      grid.appendChild(card);
    });

    seccion.appendChild(grid);
    contProd.appendChild(seccion);
  });

  if (grupos.length > 0) activarTab(grupos[0].id_grupo);
}

// ===================== TAB ACTIVA =====================
function activarTab(idGrupo) {
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.id == idGrupo);
  });
}

// ===================== SCROLL AUTO =====================
window.addEventListener("scroll", () => {
  let actual = null;

  document.querySelectorAll(".seccion-grupo").forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top <= 120) {
      actual = sec.id.replace("grupo_", "");
    }
  });

  if (actual) activarTab(actual);
});

// ===================== INIT =====================
cargarProductos();
</script>

</body>
</html>
