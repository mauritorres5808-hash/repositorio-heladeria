<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anulación de Compras</title>

<script src="JS/auth.js"></script>  <!-- ?? Aquí se verifica la autenticacion-->
<script src="js/utils.js"></script>

  <style>
    body {
      font-family: Arial;
      background-color: #8AC0FF;
      margin: 0;
      padding: 20px;
    }

    .contenedor {
      background: #fff;
      border-radius: 10px;
      max-width: 900px;
      margin: 0 auto;
      padding: 25px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    }
 	label { font-weight: bold; margin-right: 10px; }
 
    h2 {
      text-align: center;
      background-color: #8AC0FF;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 25px;
    }

    .filtros {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    input[type="number"] {
      padding: 6px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      padding: 8px 14px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background-color: red;
      color: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 13px;
    }

    th, td {
      border: 1px solid #0E0D0C;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #BDC2CB;
    }

    .botones-accion {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 25px;
    }

    .total {
      font-weight: bold;
      background-color: #e8f5e9;
    }

    .mensaje {
      text-align: center;
      margin-top: 15px;
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h2>🚫 Anulación de Compras (sin cierre)</h2>

    <div class="filtros">
      <label>Nro de Compra: <input type="number" id="nroCompra" placeholder="Ingrese N° de compra"></label>
      <button onclick="buscarCompra()">&#128269; Buscar</button>
      <button onclick="window.location.href='menu-compras.html'">&#8617; Volver</button>
    </div>

    <div id="resultadoCabecera"></div>
    <div id="resultadoDetalle"></div>
    <div class="botones-accion" id="acciones" style="display:none;">
      <button onclick="anularCompra()">&#10060; Anular Compra</button>
    </div>
    <div class="mensaje" id="mensaje"></div>
  </div>

  <script>

verificarSesion();

		let idCompraActual = null;
		let docIdCompra = null;
		let docFechaCompra = null;
		let docFPCompra = null;
		let docTotalCompra = null;

		let MAP_FP = {};

		async function cargarFormasPago() {

			try {

				const resp = await fetch('/api/fpago');
				const data = await resp.json();

				MAP_FP = {};

				data.formasPago.forEach(fp => {

					MAP_FP[fp.id_fpago] = fp.descripcion;

				});

			} catch (error) {

				console.error("Error cargando formas de pago:", error);

			}
		}

	cargarFormasPago();

		async function buscarCompra() {

			const nro = parseInt(document.getElementById("nroCompra").value);

			const resultadoCabecera =
				document.getElementById("resultadoCabecera");

			const resultadoDetalle =
				document.getElementById("resultadoDetalle");

			const acciones =
				document.getElementById("acciones");

			const mensaje =
				document.getElementById("mensaje");

			resultadoCabecera.innerHTML = "";
			resultadoDetalle.innerHTML = "";
			acciones.style.display = "none";
			mensaje.innerHTML = "";

			if (isNaN(nro) || nro <= 0) {

				mensaje.innerText =
					"Debe ingresar un numero de compra valido.";

				return;
			}

			try {

				const resp = await fetch(`/api/compras/${nro}`);
				const data = await resp.json();

				if (!data.ok) {

					mensaje.innerText =
						"No se encontro la compra indicada.";

					return;
				}

				const compra = data.compra;

				idCompraActual = compra.id_compra;
				docIdCompra = compra.id_compra;
				docFechaCompra = compra.fecha;
				docFPCompra = compra.f_pago1;
				docTotalCompra = compra.total;

				resultadoCabecera.innerHTML = `
					<h3>Cabecera de la Compra</h3>

					<table>

						<tr>
							<th>Fecha</th>
							<th>Hora</th>
							<th>Total</th>
							<th>Forma de Pago</th>
						</tr>

						<tr>
							<td>${convertirFechaOK(compra.fecha)}</td>
							<td>${compra.hora}</td>
							<td>${Formatea_Moneda(compra.total || 0)}</td>
							<td>${MAP_FP[compra.f_pago1] || ""}</td>
						</tr>

					</table>
				`;

				// DETALLE
				const respDet =
					await fetch(`/api/compras/${idCompraActual}/detalle`);

				const dataDet =
					await respDet.json();

				if (!dataDet.ok || dataDet.detalle.length === 0) {

					resultadoDetalle.innerHTML =
						"<p>No se encontraron productos para esta compra.</p>";

				} else {

					let html = `
						<h3>Detalle de Productos</h3>

						<table>

							<tr>
								<th>Cod. Producto</th>
								<th>Descripcion</th>
								<th>Cantidad</th>
								<th>Precio</th>
								<th>Subtotal</th>
							</tr>
					`;

					dataDet.detalle.forEach(det => {

						html += `
							<tr>
								<td>${det.id_producto}</td>
								<td>${det.descripcion}</td>
								<td>${det.cantidad}</td>
								<td>${Formatea_Moneda(det.precio || 0)}</td>
								<td>${Formatea_Moneda(det.subtotal || 0)}</td>
							</tr>
						`;

					});

					html += `</table>`;

					resultadoDetalle.innerHTML = html;
				}

				if (compra.anulada === 1) {

					mensaje.innerText =
						"!! Esta compra ya se encuentra anulada !!";

					return;
				}

				if (compra.id_cierre && compra.id_cierre !== 0) {

					mensaje.innerText =
						"!! Esta compra ya no se puede anular porque tiene un cierre de caja !!";

					return;
				}

				acciones.style.display = "flex";

			} catch (error) {

				console.error(error);

				mensaje.innerText =
					"Error al buscar compra: " + error.message;
			}
		}



		async function anularCompra() {

			const mensaje =
				document.getElementById("mensaje");

			if (!idCompraActual) {

				mensaje.innerText =
					"Debe buscar una compra valida antes de anular.";

				return;
			}

			const confirmar = await mostrarConfirm({
			  mensaje: "¿Está seguro que desea anular esta compra?",
			  textoAceptar: "Sí, anular",
			  textoCancelar: "Cancelar"
			});
			if (!confirmar) {
			  return;
			}

			try {

				// ANULAR
				const resp = await fetch(
					`/api/compras/${idCompraActual}/anular`,
					{
						method: 'PUT'
					}
				);

				const data = await resp.json();

				if (!data.ok) {

					throw new Error("No se pudo anular");

				}

				// AUDITORIA
				try {

					const idUsuario =
						parseInt(localStorage.getItem("usuarioId")) || 0;

					const usuarioData =
						JSON.parse(localStorage.getItem("usuarioData") || "{}");

					const nombreUsuario =
						usuarioData.nombre || "";

					const ahora = new Date();

					const fechaAuditoria =
						ahora.getFullYear() + "-" +
						String(ahora.getMonth() + 1).padStart(2, '0') + "-" +
						String(ahora.getDate()).padStart(2, '0');

					const horaAuditoria =
						String(ahora.getHours()).padStart(2, '0') + ":" +
						String(ahora.getMinutes()).padStart(2, '0') + ":" +
						String(ahora.getSeconds()).padStart(2, '0');

					const auditoriaData = {

						fecha: fechaAuditoria,
						hora: horaAuditoria,
						fecha_compra: convertirFechaMysql(docFechaCompra),
						id_compra: idCompraActual,
						id_usuario: idUsuario,
						usuario: nombreUsuario,
						tipo: "ANU",
						valor_anterior: docFPCompra,
						valor_nuevo: docFPCompra,
					};

					await fetch('/api/compras/auditoria/fpago', {

						method: 'POST',

						headers: {
							'Content-Type': 'application/json'
						},

						body: JSON.stringify(auditoriaData)

					});

				} catch (errAud) {

					console.error(
						"Error registrando auditoría:",
						errAud
					);
				}

				mensaje.style.color = "green";

				mensaje.innerText =
					">> La compra fue anulada correctamente <<";

				document.getElementById("acciones").style.display = "none";

			} catch (error) {

				console.error(error);

				mensaje.style.color = "red";

				mensaje.innerText =
					"Error al anular compra: " + error.message;
			}
		}


// Convertir yyyy-mm-dd → dd/mm/yyyy
function convertirFechaOK(f) {
  if (!f) return "";
  // Si viene como objeto Date
  if (typeof f === "object") {
    f = f.toISOString().split("T")[0];
  }
  // Si viene como string ISO
  if (String(f).includes("T")) {
    f = String(f).split("T")[0];
  }
  const [yyyy, mm, dd] = String(f).split("-");
  return `${dd}/${mm}/${yyyy}`;
}

// 2026-05-13T03:00:00.000Z )formato ISO)  →  yyyy-mm-dd
function convertirFechaMysql(fechaStr) {
/*
	if (!fechaStr) return null;
	if (fechaStr.includes("-")) {
		const [dia, mes, anio] = fechaStr.split("-");
		return `${anio}-${mes.padStart(2, '0')}-${dia.padStart(2, '0')}`;
	}
	return fechaStr;
*/
return fechaStr.substring(0,10);
}


  </script>
<script src="JS/modal.js"></script>

</body>
</html>
