<body>
  <div class="contenedor">

  <h2 align=center style="background-color: #8AC0FF;">Consulta de Stock por Grupo de Productos</h2>
  <div id="resultado2"></div>

<div class="contenedor-botones" align=center >
  <label for="grupo">Seleccione un grupo:</label>
  <select id="grupo"></select>
</div>
  <br>

<div class="contenedor-botones2">
  <button class="boton-redondeado" onclick="buscarStock()">&#128269; Buscar</button>
  <button class="boton-redondeado" onclick="window.location.href='menu-tablas.html'">&#8617; Volver</button>
</div>

  <div id="resultado"></div>
</div>
  <script>
   

verificarSesion();


const formateadorMonedaArgentina = new Intl.NumberFormat('es-AR', {
  style: 'currency',
  currency: 'ARS',
});

    // Cargar los grupos en el combo
    function cargarGrupos() {
      const select = document.getElementById("grupo");
      db.collection("GRUPOS")
	  .where("deshabilitado","==","N")
	  .get()
	  .then((querySnapshot) => {
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const option = document.createElement("option");
          option.value = data.id_grupo;
          option.textContent = data.descripcion;
          select.appendChild(option);
        });
      }).catch((error) => {
        console.error("Error cargando grupos: ", error);
      });
    }

    // Buscar el stock filtrado por grupo
    function buscarStock() {
	
		const grupoId = parseInt(document.getElementById("grupo").value);

		// 1. Obtener el elemento select
		const selectElement = document.getElementById("grupo");
		// 2. Obtener el índice de la opción seleccionada
		const selectedIndex = selectElement.selectedIndex;
		// 3. Obtener el textContent de la opción seleccionada
		const textoSeleccionado = selectElement.options[selectedIndex].text;	  

      if (!grupoId) {
        alert("Seleccione un grupo válido.");
        return;
      }

      db.collection("PRODUCTOS")
		.where("id_grupo", "==", grupoId).get()
        .then((querySnapshot) => {
          let html = "<h3 align=center>--- Stock del grupo (" + textoSeleccionado + ") ---</h3>";
		html += ` <div id="mensajeTipo" class="alert-modern">los productos en ROJO indican que estan por debajo del stock minimo.</div>`

        if (querySnapshot.empty) {
            html += "<p>No se encontraron productos en este grupo.</p>";
          } else {
            html += "<table><tr><th>Codigo</th><th>Nombre</th><th>Stock</th><th>Minimo</th><th>Precio</th><th>Stock valorizado</th><th>Deshabilitado</th></tr>";
			let totalValor = 0;
            querySnapshot.forEach((doc) => {
              const data = doc.data();
			if (data.stock < data.stock_min) {
              html += `<tr>
                <td>${data.id_producto}</td>
                <td style="background-color: #FF6467; color: white;">${data.descripcion}</td>
                <td>${data.stock}</td>
                <td>${data.stock_min}</td>
               <td>${formateadorMonedaArgentina.format(data.precio) || ""}</td>
               <td>${formateadorMonedaArgentina.format(data.precio*data.stock) || ""}</td>
                <td>${data.deshabilitado || "N"}</td>
              </tr>`;
			}else{
              html += `<tr>
                <td>${data.id_producto}</td>
                <td>${data.descripcion}</td>
                <td>${data.stock}</td>
                <td>${data.stock_min}</td>
               <td>${formateadorMonedaArgentina.format(data.precio) || ""}</td>
               <td>${formateadorMonedaArgentina.format(data.precio*data.stock) || ""}</td>
                <td>${data.deshabilitado || "N"}</td>
              </tr>`;
			}
			totalValor += Number(data.precio*data.stock);
            });
	html += `<tr class="total-row">
	  <td colspan="1">TOTAL GENERAL </td>
	  <td></td>
	  <td></td>
	  <td></td>
	  <td></td>
	  <td>${formateadorMonedaArgentina.format(totalValor) || ""}</td>
	</tr>`;

            html += "</table>";
          }
          document.getElementById("resultado").innerHTML = html;
        })
        .catch((error) => {
          console.error("Error buscando stock: ", error);
        });
    }

// Función que se ejecutará cuando la página cargue
function ejecutarTodas() {
  cargarGrupos(); // Inicializar combo
}

// Asigna la función lanzadera al evento onload
window.onload = ejecutarTodas;

  </script>
