  <script>


verificarSesion(); 

// Cargar usuario actual
document.getElementById("userLabel").textContent = localStorage.getItem("usuarioEmail");

// Cargar fecha actual
const hoy = new Date();
const yyyy = hoy.getFullYear();
const mm = String(hoy.getMonth() + 1).padStart(2, '0');
const dd = String(hoy.getDate()).padStart(2, '0');
const fechaHoy = `${dd}-${mm}-${yyyy}`;
document.getElementById("FechaHoy").textContent = fechaHoy;


function mostrarEmpresa(data) {
    let html = `<h2 style="background:#FFF7B8; font-style:italic; border-radius:54px; padding:15px; max-width:650px;
					margin:auto; box-shadow:0 8px 20px rgba(0,0,0,.15);">`;
    if (!data) {
		html += `<span style='color:red'>No se encontraron los datos de la empresa</span></h2>`;
		} else {
			html += `<span style="color: black;"> ${data.nombre} 🍦</span></h2>`;
		}

    document.getElementById("resultado").innerHTML = html;
}

async function buscarDatosEmpresa() {

    try {
        const empresaGuardada = localStorage.getItem("empresaData");

        // =====================================
        // SI EXISTE EN LOCALSTORAGE
        // =====================================
        if (
            empresaGuardada &&
            empresaGuardada !== "undefined"
        ) {
            mostrarEmpresa(JSON.parse(empresaGuardada));
            return;
        }

        // =====================================
        // BUSCAR DESDE API
        // =====================================
        const resp = await fetch('/api/empresa');
        const data = await resp.json();

        if (!data) {
            mostrarEmpresa(null);
            return;
        }

        // =====================================
        // GUARDAR EMPRESA
        // =====================================
        localStorage.setItem(
            "empresaData",
            JSON.stringify(data)
        );
        mostrarEmpresa(data);

    } catch (error) {
        console.error(error);
        localStorage.removeItem("empresaData");
        mostrarEmpresa(null);
    }
}


function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}

	// Inicializar datos al cargar la página
    window.onload = buscarDatosEmpresa;


// Obtener los elementos del DOM
var modal = document.getElementById("miModal");
var img = document.querySelector("logo2"); // Selecciona la imagen
var span = document.getElementsByClassName("close")[0];

// Cuando el usuario hace clic en la imagen, abrir el modal
function contacto() {
  modal.style.display = "block";
}

// Cuando el usuario hace clic en el span (X), cerrar el modal
span.onclick = function() {
  modal.style.display = "none";
}

// Cierra el modal si el usuario hace clic fuera de él
window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
